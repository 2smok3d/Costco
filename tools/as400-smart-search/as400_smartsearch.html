<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS400 Quick Reference — Costco Warehouse</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; }

  header {
    background: linear-gradient(135deg, #003087 0%, #0055a5 100%);
    color: white; padding: 22px 28px 18px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 3px 12px rgba(0,0,0,0.25);
  }
  header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.5px; }
  header p { font-size: 0.82rem; opacity: 0.8; margin-top: 3px; }

  .search-bar {
    margin: 16px 28px 0;
    position: relative;
  }
  .search-bar input {
    width: 100%; padding: 12px 16px 12px 42px;
    font-size: 1rem; border: none; border-radius: 8px;
    background: rgba(255,255,255,0.15);
    color: white; outline: none;
    transition: background 0.2s;
  }
  .search-bar input::placeholder { color: rgba(255,255,255,0.65); }
  .search-bar input:focus { background: rgba(255,255,255,0.22); }
  .search-bar .icon {
    position: absolute; left: 13px; top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem; opacity: 0.75;
  }
  #result-count {
    font-size: 0.78rem; opacity: 0.75; margin-top: 6px; padding-bottom: 4px;
  }

  .filters {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 14px 28px 10px;
  }
  .filter-btn {
    padding: 5px 14px; border-radius: 20px;
    border: 2px solid transparent;
    font-size: 0.78rem; font-weight: 600; cursor: pointer;
    transition: all 0.15s; letter-spacing: 0.3px;
  }
  .filter-btn.active { color: white; }
  .filter-btn:not(.active) { background: white; }

  .main { padding: 0 28px 40px; }

  .section-header {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: #666;
    margin: 20px 0 10px; padding-left: 4px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }

  .card {
    background: white; border-radius: 10px;
    padding: 16px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border-left: 4px solid #ccc;
    transition: box-shadow 0.15s, transform 0.1s;
    cursor: default;
  }
  .card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.13);
    transform: translateY(-1px);
  }
  .card.hidden { display: none; }

  .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .cmd-badge {
    font-size: 0.78rem; font-weight: 700;
    padding: 3px 9px; border-radius: 5px;
    color: white; white-space: nowrap; flex-shrink: 0;
    letter-spacing: 0.5px; margin-top: 1px;
  }
  .card-title { font-size: 0.97rem; font-weight: 700; color: #1a1a2e; line-height: 1.3; }
  .card-desc { font-size: 0.84rem; color: #555; line-height: 1.55; }
  .card-steps {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid #f0f0f0;
  }
  .card-steps-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: #999; margin-bottom: 5px; }
  .card-steps ul { padding-left: 16px; }
  .card-steps li { font-size: 0.82rem; color: #444; line-height: 1.5; margin-bottom: 2px; }
  .fkey { display: inline-block; background: #e8ecf0; color: #333; font-size: 0.72rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin: 0 1px; }
  .tip { font-size: 0.78rem; background: #fffbe6; border-left: 3px solid #f0c040; padding: 6px 10px; border-radius: 0 5px 5px 0; margin-top: 8px; color: #6b5700; }

  .no-results { text-align: center; padding: 60px 20px; color: #888; font-size: 1rem; }

  /* Category colors */
  .cat-intro    { border-color: #6c757d; }
  .cat-passwords{ border-color: #dc3545; }
  .cat-items    { border-color: #fd7e14; }
  .cat-trans    { border-color: #ffc107; }
  .cat-merch    { border-color: #198754; }
  .cat-sales    { border-color: #0dcaf0; }
  .cat-labor    { border-color: #6f42c1; }
  .cat-member   { border-color: #d63384; }
  .cat-account  { border-color: #20c997; }
  .cat-reports  { border-color: #0d6efd; }
  .cat-ancill   { border-color: #adb5bd; }
  .cat-rf       { border-color: #e76f51; }

  .bg-intro    { background: #6c757d; }
  .bg-passwords{ background: #dc3545; }
  .bg-items    { background: #fd7e14; }
  .bg-trans    { background: #c99400; }
  .bg-merch    { background: #198754; }
  .bg-sales    { background: #0897b5; }
  .bg-labor    { background: #6f42c1; }
  .bg-member   { background: #d63384; }
  .bg-account  { background: #20c997; color: #000 !important; }
  .bg-reports  { background: #0d6efd; }
  .bg-ancill   { background: #6c757d; }
  .bg-rf       { background: #e76f51; }

  .fbtn-intro    { border-color: #6c757d; color: #6c757d; }
  .fbtn-passwords{ border-color: #dc3545; color: #dc3545; }
  .fbtn-items    { border-color: #fd7e14; color: #fd7e14; }
  .fbtn-trans    { border-color: #c99400; color: #c99400; }
  .fbtn-merch    { border-color: #198754; color: #198754; }
  .fbtn-sales    { border-color: #0897b5; color: #0897b5; }
  .fbtn-labor    { border-color: #6f42c1; color: #6f42c1; }
  .fbtn-member   { border-color: #d63384; color: #d63384; }
  .fbtn-account  { border-color: #20c997; color: #20c997; }
  .fbtn-reports  { border-color: #0d6efd; color: #0d6efd; }
  .fbtn-ancill   { border-color: #6c757d; color: #6c757d; }
  .fbtn-rf       { border-color: #e76f51; color: #e76f51; }

  .filter-btn.active.fbtn-intro    { background: #6c757d; }
  .filter-btn.active.fbtn-passwords{ background: #dc3545; }
  .filter-btn.active.fbtn-items    { background: #fd7e14; }
  .filter-btn.active.fbtn-trans    { background: #c99400; }
  .filter-btn.active.fbtn-merch    { background: #198754; }
  .filter-btn.active.fbtn-sales    { background: #0897b5; }
  .filter-btn.active.fbtn-labor    { background: #6f42c1; }
  .filter-btn.active.fbtn-member   { background: #d63384; }
  .filter-btn.active.fbtn-account  { background: #20c997; color: #000; }
  .filter-btn.active.fbtn-reports  { background: #0d6efd; }
  .filter-btn.active.fbtn-ancill   { background: #6c757d; }
  .filter-btn.active.fbtn-rf       { background: #e76f51; }
</style>
</head>
<body>

<header>
  <h1>📦 AS400 Quick Reference</h1>
  <p>Costco Warehouse Operations · February 2026</p>
  <div class="search-bar">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search by command, description, or keyword…" oninput="filterCards()">
  </div>
  <div id="result-count"></div>
</header>

<div class="filters" id="filterRow">
  <button class="filter-btn active fbtn-all" onclick="setFilter('all',this)" style="border-color:#003087;color:#003087;">All</button>
  <button class="filter-btn fbtn-intro" onclick="setFilter('intro',this)">Navigation</button>
  <button class="filter-btn fbtn-passwords" onclick="setFilter('passwords',this)">Passwords</button>
  <button class="filter-btn fbtn-items" onclick="setFilter('items',this)">Item Lookup</button>
  <button class="filter-btn fbtn-trans" onclick="setFilter('trans',this)">Transactions</button>
  <button class="filter-btn fbtn-merch" onclick="setFilter('merch',this)">Merchandising</button>
  <button class="filter-btn fbtn-sales" onclick="setFilter('sales',this)">Warehouse Sales</button>
  <button class="filter-btn fbtn-labor" onclick="setFilter('labor',this)">Labor Scheduling</button>
  <button class="filter-btn fbtn-member" onclick="setFilter('member',this)">Membership</button>
  <button class="filter-btn fbtn-account" onclick="setFilter('account',this)">Accounting</button>
  <button class="filter-btn fbtn-reports" onclick="setFilter('reports',this)">Reports</button>
  <button class="filter-btn fbtn-ancill" onclick="setFilter('ancill',this)">Ancillary</button>
  <button class="filter-btn fbtn-rf" onclick="setFilter('rf',this)">RF Scanner</button>
</div>

<div class="main" id="mainContent"></div>

function buildCard(item) {
  const stepsHtml = item.steps && item.steps.length
    ? `<div class="card-steps">
        <div class="card-steps-title">How to use</div>
        <ul>${item.steps.map(s => `<li>${s}</li>`).join('')}</ul>
       </div>` : '';
  const tipHtml = item.tip
    ? `<div class="tip">💡 ${item.tip}</div>` : '';
  return `
    <div class="card cat-${item.cat}" data-cat="${item.cat}" data-search="${(item.cmd + ' ' + item.title + ' ' + item.desc + ' ' + (item.steps||[]).join(' ')).toLowerCase()}">
      <div class="card-top">
        <span class="cmd-badge bg-${item.cat}">${item.cmd}</span>
        <span class="card-title">${item.title.replace(/^[A-Z0-9/\s]+ — /, '')}</span>
      </div>
      <div class="card-desc">${item.desc}</div>
      ${stepsHtml}
      ${tipHtml}
    </div>`;
}

function render() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const main = document.getElementById('mainContent');

  const groups = {};
  let total = 0;

  data.forEach(item => {
    if (activeFilter !== 'all' && item.cat !== activeFilter) return;
    if (query && !item['data-search'] && !(item.cmd + ' ' + item.title + ' ' + item.desc + ' ' + (item.steps||[]).join(' ')).toLowerCase().includes(query)) return;
    if (query) {
      const searchable = (item.cmd + ' ' + item.title + ' ' + item.desc + ' ' + (item.steps||[]).join(' ')).toLowerCase();
      if (!searchable.includes(query)) return;
    }
    if (!groups[item.cat]) groups[item.cat] = [];
    groups[item.cat].push(item);
    total++;
  });

  if (total === 0) {
    main.innerHTML = '<div class="no-results">No results found. Try a different search term.</div>';
    document.getElementById('result-count').textContent = '0 results';
    return;
  }

  document.getElementById('result-count').textContent = `${total} option${total !== 1 ? 's' : ''} found`;

  const catOrder = ['intro','passwords','items','trans','merch','sales','labor','member','account','reports','ancill','rf'];
  let html = '';
  catOrder.forEach(cat => {
    if (!groups[cat] || groups[cat].length === 0) return;
    html += `<div class="section-header">${categoryNames[cat]}</div><div class="cards-grid">`;
    groups[cat].forEach(item => { html += buildCard(item); });
    html += `</div>`;
  });
  main.innerHTML = html;
}

function filterCards() { render(); }

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (cat === 'all') {
    btn.style.background = '#003087';
    btn.style.color = 'white';
    document.querySelectorAll('.filter-btn:not(.fbtn-all)').forEach(b => {
      b.style.background = '';
      b.style.color = '';
    });
  }
  render();
}

// init
render();
</script>
</body>
</html>
