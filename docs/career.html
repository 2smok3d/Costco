<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Career — Costco #436</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--sf:#111;--bd:#1e1e1e;--tx:#fff;--dm:#ccc;--mt:#888;--r:10px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;height:100dvh}
    header{position:relative;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;height:58px;background:#0a0a0a;border-bottom:1px solid #1e1e1e;flex-shrink:0}
    .bk{color:#666;font-family:'JetBrains Mono',monospace;font-size:11px;text-decoration:none;padding:5px 10px;border:1px solid #2a2a2a;border-radius:4px;white-space:nowrap;flex-shrink:0}
    .hc{position:absolute;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;min-width:160px}
    .ht{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:#fff;letter-spacing:2px;text-transform:uppercase;line-height:1.1}
    .hs{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;letter-spacing:1.5px;margin-top:2px}
    .clogo{background:#8b0000;border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:3px 8px;text-align:center;flex-shrink:0;line-height:1.2}
    .cl1{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:#fff;letter-spacing:.08em}
    .cl2{font-size:7px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.2em;text-transform:uppercase;margin-top:1px}
    #main{flex:1;display:flex;flex-direction:column;padding:16px 14px;min-height:0;gap:12px}
    .tile{background:var(--sf);border:1px solid var(--bd);border-left:4px solid;border-radius:var(--r);padding:22px 18px;text-decoration:none;color:var(--tx);display:flex;align-items:center;gap:16px;flex:1;transition:transform .12s;min-height:0}
    .tile:active{transform:scale(.98)}
    .ti{font-size:32px;flex-shrink:0}
    .tile-text{flex:1}
    .tn{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;letter-spacing:2px;text-transform:uppercase;line-height:1}
    .td{font-size:13px;color:var(--dm);margin-top:4px;line-height:1.4}
    .arr{color:#333;font-size:20px;flex-shrink:0}
  </style>
</head>
<body>
<header>
  <a class="bk" href="index.html">← Hub</a>
  <div class="hc"><div class="ht">Career</div><div class="hs">#436 TEMPE</div></div>
  <div class="clogo"><div class="cl1">COSTCO</div><div class="cl2">WHOLESALE</div></div>
</header>
<div id="main">
  <a class="tile" style="border-left-color:#8850c8" href="advancement.html">
    <span class="ti">🎯</span>
    <div class="tile-text">
      <div class="tn">Advancement</div>
      <div class="td">SIT path · Milestones · Interview prep · AS400 goals · Daily habits</div>
    </div>
    <span class="arr">›</span>
  </a>
  <a class="tile" style="border-left-color:#8b1a2a" href="schedule.html">
    <span class="ti">📅</span>
    <div class="tile-text">
      <div class="tn">Schedule</div>
      <div class="td">UKG Pro · View shifts · Calendar sync · Screenshot import</div>
    </div>
    <span class="arr">›</span>
  </a>
</div>
<script>window.addEventListener('beforeinstallprompt',e=>e.preventDefault())</script>
</body>
</html>
