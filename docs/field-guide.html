<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#cc1020">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Costco%20Field%20Guide%22,%22short_name%22:%22Field%20Guide%22,%22description%22:%22Costco%20meat%20dept%20PLU%2C%20AS400%20commands%2C%20and%20blue%20book%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230d0f14%22,%22theme_color%22:%22%23cc1020%22,%22orientation%22:%22portrait%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20512%20512'%3E%3Crect%20width%3D'512'%20height%3D'512'%20rx%3D'80'%20fill%3D'%23cc1020'%2F%3E%3Ctext%20x%3D'256'%20y%3D'340'%20text-anchor%3D'middle'%20font-family%3D'serif'%20font-style%3D'italic'%20font-weight%3D'700'%20font-size%3D'260'%20fill%3D'%23ffd700'%3EFG%3C%2Ftext%3E%3C%2Fsvg%3E%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%20maskable%22}]}">
<title>Costco Field Guide v1.3</title>
<style>
:root{
  --red:#cc1020;--red2:#e8192c;--blue:#005dab;
  --bg:#0d0f14;--surface:#161a22;--surface2:#1e2330;
  --border:#2a3044;--text:#eaecf2;--muted:#7a8499;
  --accent:#3b82f6;--good:#22c55e;--warn:#f59e0b;
  --gold:#d4af37;--gold2:#f5d76e;
  --radius:10px;--nav-h:58px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text);font-size:15px;line-height:1.5}

/* APP SHELL */
#app{display:flex;flex-direction:column;height:100dvh;width:100%;max-width:640px;margin:0 auto;overflow:hidden;will-change:height}

/* HEADER */
#header{flex-shrink:0;background:var(--red);padding:0;position:relative;z-index:200;-webkit-transform:translateZ(0)}

/* BRAND BAR */
#header-brand{display:flex;align-items:center;gap:10px;padding:8px 12px 6px 12px}
#back-hub{display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:rgba(255,255,255,.85);font-size:11px;font-weight:700;letter-spacing:.06em;padding:5px 9px;text-decoration:none;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
#back-hub:active{background:rgba(0,0,0,.6)}
.brand-badge{background:rgba(68,4,4,.9);border:1px solid rgba(255,255,255,.18);border-radius:7px;padding:4px 9px;text-align:center;flex-shrink:0;line-height:1.2}
.badge-line1{font-size:14px;font-weight:900;color:#fff;letter-spacing:.08em}
.badge-line2{font-size:8px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.18em;text-transform:uppercase;margin-top:1px}
.brand-wordmark{flex:1;overflow:hidden;min-width:0}
.brand-version{align-self:flex-start;padding-top:4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.38);letter-spacing:.06em;flex-shrink:0}

/* SEARCH */
#search-wrap{position:relative;margin:0 12px 8px;z-index:10}
#search-input{width:100%;background:rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.25);border-radius:10px;color:#fff;font-size:16px;padding:10px 38px 10px 40px;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s,background .15s;touch-action:manipulation;position:relative;z-index:10;cursor:text}
#search-input:focus{border-color:rgba(255,255,255,.7);background:rgba(0,0,0,.55)}
#search-input::placeholder{color:rgba(255,255,255,.45)}
#search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:rgba(255,255,255,.5);pointer-events:none}
#clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;color:#fff;width:22px;height:22px;border-radius:50%;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center}

/* SUBBAR */
#subbar{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;border-top:1px solid rgba(255,255,255,.15)}
#subbar::-webkit-scrollbar{display:none}
.sb-btn{flex-shrink:0;padding:9px 14px;background:none;border:none;border-bottom:2.5px solid transparent;color:rgba(255,255,255,.65);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;touch-action:manipulation;transition:all .12s}
.sb-btn.active{color:#fff;border-bottom-color:#fff}
.sb-btn:active{background:rgba(255,255,255,.1)}

/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;isolation:isolate}

/* BOTTOM NAV */
#tab-bar{flex-shrink:0;display:flex;background:var(--surface);border-top:1px solid var(--border);z-index:200;-webkit-transform:translateZ(0)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 4px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;min-height:var(--nav-h);touch-action:manipulation;transition:color .12s}
.tab-btn svg{width:22px;height:22px;stroke-width:1.8;opacity:.6;transition:opacity .12s}
.tab-btn.active{color:var(--red2)}
.tab-btn.active svg{opacity:1}
.tab-btn:active{background:rgba(255,255,255,.04)}

/* TAB PAGES */
.tab-page{display:none}
.tab-page.active{display:block;animation:fadein .1s ease}
@keyframes fadein{from{opacity:.4}to{opacity:1}}

/* SEARCH RESULTS */
#search-results{padding:8px 12px 80px}
.rg-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:14px 0 7px}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:7px;cursor:pointer;touch-action:manipulation}
.result-card:active{background:var(--surface2)}
.r-plu{font-size:28px;font-weight:800;color:var(--red2);letter-spacing:.02em;line-height:1.1}
.r-name{font-size:15px;font-weight:600;color:var(--text);margin-top:2px}
.r-sub{font-size:12px;color:var(--muted);margin-top:2px}
.r-cmd{display:inline-block;background:var(--red);color:#fff;border-radius:5px;font-size:12px;font-weight:700;padding:2px 8px;margin-right:6px;letter-spacing:.04em;font-family:monospace}
.r-desc{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.4}
mark{background:rgba(255,210,0,.4);color:#fff;border-radius:2px;padding:0 1px}
.no-results{text-align:center;padding:52px 20px;color:var(--muted)}

/* PLU */
#plu-page{padding:0}
.plu-section{display:none;padding-bottom:80px}
.plu-section.active{display:block}
.ov-choice{background:rgba(204,16,32,.07)}
.ov-prime{background:rgba(212,175,55,.07)}
.ov-wagyu{background:rgba(217,119,6,.07)}
.ov-pork{background:rgba(255,100,120,.07)}
.ov-poultry{background:rgba(234,179,8,.07)}
.ov-grinds{background:rgba(180,80,20,.07)}
.ov-seafood{background:rgba(59,130,246,.08)}
.plu-group{margin-bottom:20px;padding:0 12px}
.plu-group:first-child{padding-top:10px}
.plu-group-title{font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text);margin-bottom:8px;padding:8px 0 7px;border-bottom:2px solid var(--red);position:sticky;top:0;background:var(--bg);z-index:10}
.plu-protein-hdr{font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text);margin:18px 12px 8px;padding:8px 0 7px;border-bottom:2px solid var(--red);position:sticky;top:0;background:var(--bg);z-index:10}
.plu-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 13px;gap:10px;margin-bottom:5px;cursor:pointer;touch-action:manipulation;min-height:48px}
.plu-row:active{background:var(--surface2)}
.plu-name{font-size:14px;color:var(--text);flex:1;line-height:1.3}
.plu-num{font-size:26px;font-weight:800;color:var(--red2);letter-spacing:.02em;flex-shrink:0;min-width:56px;text-align:right;font-variant-numeric:tabular-nums}
/* Shelf life card */
.shelf-toggle{margin:10px 12px 8px}
.shelf-sum{list-style:none;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 13px;display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;cursor:pointer;touch-action:manipulation}
.shelf-sum::-webkit-details-marker{display:none}
details.shelf-toggle[open] .shelf-sum{border-radius:var(--radius) var(--radius) 0 0;border-bottom-color:transparent}
.shelf-chev{width:16px;height:16px;color:var(--muted);transition:transform .2s;flex-shrink:0}
details.shelf-toggle[open] .shelf-chev{transform:rotate(180deg)}
.shelf-body{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:8px 13px 12px}
.shelf-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.shelf-row:last-child{border:none}
.shelf-item{color:var(--text);flex:1}
.shelf-days{font-size:16px;font-weight:800;color:var(--red2);flex-shrink:0;min-width:36px;text-align:right}

/* AS400 */
#as400-page{padding:8px 12px 80px}
.as400-group{display:none}
.as400-group.visible{display:block}
.cat-label{font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text);margin:14px 0 8px;padding:8px 0 7px;border-bottom:2px solid var(--red);position:sticky;top:0;background:var(--bg);z-index:10}
.cat-label:first-child{margin-top:0}
details.cmd-detail{margin-bottom:7px}
details.cmd-detail summary{list-style:none;cursor:pointer;touch-action:manipulation}
details.cmd-detail summary::-webkit-details-marker{display:none}
.cmd-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;display:flex;flex-direction:column;gap:4px}
details.cmd-detail[open] .cmd-summary{border-radius:var(--radius) var(--radius) 0 0;border-bottom-color:transparent}
.cmd-summary:active{background:var(--surface2)}
.cmd-top{display:flex;align-items:flex-start;gap:8px}
.cmd-badge{background:var(--red);color:#fff;border-radius:5px;font-size:12px;font-weight:800;padding:2px 7px;flex-shrink:0;letter-spacing:.04em;font-family:monospace;white-space:nowrap;margin-top:1px}
.cmd-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;flex:1}
.cmd-chevron{flex-shrink:0;width:16px;height:16px;color:var(--muted);transition:transform .2s;margin-top:2px}
details.cmd-detail[open] .cmd-chevron{transform:rotate(180deg)}
.cmd-desc{font-size:12.5px;color:var(--muted);line-height:1.45}
.cmd-body{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:10px 13px 12px;font-size:12.5px;color:#9ba8bf;line-height:1.55}
.cmd-body b{color:var(--text)}
.cmd-body code{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:11.5px;font-family:monospace;color:#7dd3fc}
.cmd-tip{margin-top:7px;padding:6px 10px;background:rgba(245,158,11,.08);border-left:2.5px solid var(--warn);border-radius:0 5px 5px 0;font-size:12px;color:#d4a843}
.rf-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
.rf-table th{text-align:left;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 8px;border-bottom:1px solid var(--border)}
.rf-table td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.rf-table tr:last-child td{border:none}
.rf-table td:first-child{font-family:monospace;font-weight:800;color:var(--red2);width:42px;font-size:14px}
.rf-table td:nth-child(2){color:var(--text);font-weight:600;width:38%}
.rf-table td:last-child{color:var(--muted)}

/* BLUE BOOK */
#bluebook-page{padding:0 12px 80px}
.bb-section{display:none;padding-top:10px}
.bb-section.visible{display:block}
.bb-section-title{font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text);margin:14px 0 8px;padding:8px 0 7px;border-bottom:2px solid var(--red);position:sticky;top:0;background:var(--bg);z-index:10}
.bb-section-title:first-child{margin-top:0}
details.bb-detail{margin-bottom:7px}
details.bb-detail summary{list-style:none;cursor:pointer;touch-action:manipulation}
details.bb-detail summary::-webkit-details-marker{display:none}
.bb-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;color:var(--text)}
details.bb-detail[open] .bb-summary{border-radius:var(--radius) var(--radius) 0 0;border-bottom-color:transparent}
.bb-summary:active{background:var(--surface2)}
.bb-chevron{width:16px;height:16px;color:var(--muted);transition:transform .2s;flex-shrink:0}
details.bb-detail[open] .bb-chevron{transform:rotate(180deg)}
.bb-body{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:10px 14px 13px;font-size:13px;color:#9ba8bf;line-height:1.6}
.bb-body b{color:var(--text)}
.kc{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-family:monospace;font-size:12px;color:var(--text);white-space:nowrap}
.info-table{width:100%;border-collapse:collapse;margin-top:4px;font-size:12.5px}
.info-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.info-table td:first-child{color:var(--muted);font-weight:600;white-space:nowrap;width:45%}
.info-table td:last-child{color:var(--text)}
.info-table tr:last-child td{border:none}
.phone-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.phone-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
.phone-label{font-size:10px;color:var(--muted);margin-bottom:2px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.phone-num{font-size:14px;font-weight:700;color:var(--accent)}
.phone-num a{color:inherit;text-decoration:none}
.reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.reg-row{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:7px 10px;display:flex;justify-content:space-between;align-items:center}
.reg-name{font-size:12px;color:var(--muted)}
.reg-range{font-size:14px;font-weight:700;color:var(--text)}
.dept-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.dept-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:7px 9px}
.dept-num{font-size:18px;font-weight:800;color:var(--red2)}
.dept-name{font-size:11px;color:var(--muted);line-height:1.3;margin-top:1px}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--nav-h) + 10px);left:50%;transform:translateX(-50%) translateY(6px);background:#22c55e;color:#fff;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:600;opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* PWA INSTALL BANNER */
#install-banner{position:fixed;bottom:calc(var(--nav-h) + 10px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:1000;box-shadow:0 4px 24px rgba(0,0,0,.5);max-width:340px;width:calc(100% - 24px);animation:slideup .25s ease}
@keyframes slideup{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#install-banner{display:none!important}
.ib-icon{width:40px;height:40px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.ib-text{flex:1;min-width:0}
.ib-title{font-size:13px;font-weight:700;color:var(--text)}
.ib-sub{font-size:11px;color:var(--muted);margin-top:1px}
.ib-actions{display:flex;gap:6px;flex-shrink:0}
.ib-btn{border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer}
.ib-install{background:var(--red);color:#fff}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="app">

<header id="header">
  <div id="header-brand">
    <a id="back-hub" href="index.html">← Hub</a>
    <div class="brand-badge">
      <div class="badge-line1">COSTCO</div>
      <div class="badge-line2">WHOLESALE</div>
    </div>
    <div class="brand-wordmark">
      <svg width="100%" height="52" viewBox="0 0 230 52" preserveAspectRatio="xMidYMid meet" style="display:block;overflow:visible">
        <defs>
          <linearGradient id="gFG" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#ffe060"/>
            <stop offset="22%"  stop-color="#fffbe0"/>
            <stop offset="52%"  stop-color="#ffc820"/>
            <stop offset="80%"  stop-color="#fff5c0"/>
            <stop offset="100%" stop-color="#ffe060"/>
          </linearGradient>
          <linearGradient id="uFG" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="rgba(255,200,40,0)"/>
            <stop offset="50%"  stop-color="rgba(255,225,80,.95)"/>
            <stop offset="100%" stop-color="rgba(255,200,40,0)"/>
          </linearGradient>
          <linearGradient id="uField" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="rgba(255,200,40,0)"/>
            <stop offset="50%"  stop-color="rgba(255,225,80,.85)"/>
            <stop offset="100%" stop-color="rgba(255,200,40,0)"/>
          </linearGradient>
          <filter id="glFG" x="-20%" y="-80%" width="140%" height="260%">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <text x="14" y="16"
          font-family="'Amanda Black','Amanda',Palatino,'Palatino Linotype','Book Antiqua',serif"
          font-style="italic" font-weight="700" font-size="18"
          fill="url(#gFG)" letter-spacing="1.5" filter="url(#glFG)">Field</text>
        <rect x="14" y="19" width="46" height="1.2" fill="url(#uField)" rx="1"/>
        <text x="55" y="47"
          font-family="'Amanda Black','Amanda',Palatino,'Palatino Linotype','Book Antiqua',serif"
          font-style="italic" font-weight="700" font-size="34"
          fill="url(#gFG)" filter="url(#glFG)">GUIDE</text>
        <rect x="55" y="50" width="150" height="1.5" fill="url(#uFG)" rx="1"/>
      </svg>
    </div>
    <div class="brand-version">v1.3</div>
  </div>
  <div id="search-wrap">
    <svg id="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-input" type="search" inputmode="search" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Search PLU, command, policy…">
    <button id="clear-btn" aria-label="Clear" onclick="clearSearch()">✕</button>
  </div>
  <div id="subbar"></div>
</header>

<div id="content">
  <div id="search-results" class="tab-page" style="display:none"><div id="result-inner"></div></div>
  <div id="plu-page" class="tab-page active"><div id="plu-sections"></div></div>
  <div id="as400-page" class="tab-page"><div id="as400-inner"></div></div>
  <div id="bluebook-page" class="tab-page"><div id="bluebook-inner"></div></div>
</div>

<nav id="tab-bar">
  <button class="tab-btn active" data-tab="plu-page">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="13" y2="13"/></svg>PLU

function pluRow(name, plu) {
  return `<div class="plu-row" onclick="tapPLU(${plu})"><div class="plu-name">${name}</div><div class="plu-num">${plu}</div></div>`;
}
function renderGroups(groups) {
  return groups.map(g =>
    `<div class="plu-group"><div class="plu-group-title">${g.title}</div>${g.items.map(([n,p])=>pluRow(n,p)).join('')}</div>`
  ).join('');
}

function renderPLU() {
  const c = document.getElementById('plu-sections');
  let html = '';

  // ALL section — shelf life card open + all cuts sorted A→Z
  const _allItems = [];
  for (const key of ['beef-choice','beef-prime','beef-wagyu','pork','poultry','grinds','seafood','logs']) {
    const cat = PLU[key];
    if (cat) cat.groups.forEach(g => g.items.forEach(item => _allItems.push(item)));
  }
  _allItems.sort((a, b) => a[0].localeCompare(b[0]));
  html += `<div id="plu-all" class="plu-section${_activePLUCat === 'all' ? ' active' : ''}">${SHELF_HTML}<div class="plu-group" style="padding-top:6px">`;
  for (const [name, plu] of _allItems) html += pluRow(name, plu);
  html += '</div></div>';

  // Individual protein sections (with overlay)
  for (const [key, cat] of Object.entries(PLU)) {
    const ov = OVERLAYS[key] ? ' ' + OVERLAYS[key] : '';
    const active = key === _activePLUCat ? ' active' : '';
    html += `<div id="plu-${key}" class="plu-section${active}${ov}">${renderGroups(cat.groups)}</div>`;
  }

  // CRYO cross-section
  const xOrder = ['beef-choice','beef-prime','beef-wagyu','pork','seafood'];
  html += `<div id="plu-cryo" class="plu-section">`;
  for (const key of xOrder) {
    const cat = PLU[key];
    const items = cat.groups.flatMap(g => g.items).filter(([n]) => /cryo/i.test(n));
    if (!items.length) continue;
    html += `<div class="plu-group"><div class="plu-group-title">${cat.label}</div>${items.map(([n,p])=>pluRow(n,p)).join('')}</div>`;
  }
  html += '</div>';

  // CASE cross-section
  const CASE_INFO_HTML = `<details class="shelf-toggle">
  <summary class="shelf-sum">How to Sell a Case <svg class="shelf-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></summary>
  <div class="shelf-body" style="font-size:13px;line-height:1.8;color:var(--text)">
    <div style="display:flex;flex-direction:column;gap:4px">
      <div><span style="color:var(--muted);font-weight:700;margin-right:6px">1.</span>Member requests case — pull product from back</div>
      <div><span style="color:var(--muted);font-weight:700;margin-right:6px">2.</span>Scan into production (RF Option 67)</div>
      <div><span style="color:var(--muted);font-weight:700;margin-right:6px">3.</span>Bring to Toledo scale</div>
      <div><span style="color:var(--muted);font-weight:700;margin-right:6px">4.</span>Select <b>Category 690</b> PLU on scale</div>
      <div><span style="color:var(--muted);font-weight:700;margin-right:6px">5.</span>Enter PLU number → enter weight</div>
      <div><span style="color:var(--muted);font-weight:700;margin-right:6px">6.</span>Press <b>PRINT INHIBITS</b> to remove sell-by date</div>
      <div><span style="color:var(--muted);font-weight:700;margin-right:6px">7.</span>Tab <b>SELL BY DATE</b> until field is blank → print label</div>
    </div>
  </div>
</details>`;
  html += `<div id="plu-case" class="plu-section">${CASE_INFO_HTML}`;
  for (const key of xOrder) {
    const cat = PLU[key];
    const items = cat.groups.flatMap(g => g.items).filter(([n]) => /case/i.test(n));
    if (!items.length) continue;
    html += `<div class="plu-group"><div class="plu-group-title">${cat.label}</div>${items.map(([n,p])=>pluRow(n,p)).join('')}</div>`;
  }
  html += '</div>';

  c.innerHTML = html;
}

            <svg class="cmd-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </summary>
        <div class="cmd-body" style="padding:0;overflow:hidden">
          <table class="rf-table"><tr><th>Opt</th><th>Function</th><th>Quick Use</th></tr>`;
      for (const cmd of cmds) {
        html += `<tr><td>${cmd.cmd}</td><td>${cmd.name}</td><td>${cmd.desc.split('.')[0]}</td></tr>`;
      }
      html += `</table></div></details>`;
    }
    for (const cmd of cmds) html += cmdCard(cmd);
    html += '</div>';
  }
  c.innerHTML = html;
}

      <div class="reg-row"><span class="reg-name">Food Court</span><span class="reg-range">501–508</span></div>
      <div class="reg-row"><span class="reg-name">Control</span><span class="reg-range">800</span></div>
    </div>
  </div>
  `;
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
const ALIASES = {
  'rib eye':'ribeye','ny':'new york','bs':'b/s','bi':'bone-in',
  'bsr':'boneless short rib','sr':'short rib','loin tip':'flap meat',
  'skirt':'skirt steak','scan in':'scan into production',
};

function scoreMatch(text, q) {
  if (!text || !q) return 0;
  const t = text.toLowerCase(), query = q.toLowerCase();
  if (t === query) return 100;
  if (t.startsWith(query)) return 88;
  if (t.includes(query)) return 72;
  const words = query.split(/\s+/).filter(Boolean);
  if (words.length > 1) {
    if (words.every(w => t.includes(w))) return 65;
    const hits = words.filter(w => t.includes(w)).length;
    if (hits) return 35 + hits * 8;
  }
  return 0;
}
function hl(text, q) {
  if (!q || !text) return String(text || '');
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return String(text).replace(new RegExp('(' + esc + ')', 'gi'), '<mark>$1</mark>');
}

function doSearch(raw) {
  const q = raw.trim();
  const sp = document.getElementById('search-results');
  const ri = document.getElementById('result-inner');
  if (!q) {
    sp.style.display = 'none';
    document.getElementById(_activeTab).classList.add('active');
    return;
  }
  document.querySelectorAll('.tab-page').forEach(p => { if (p.id !== 'search-results') p.classList.remove('active'); });
  sp.style.display = 'block';

  const expanded = ALIASES[q.toLowerCase()] || q;
  const isNum = /^\d+$/.test(q);
  const pluRes = [], cmdRes = [], polRes = [];

  for (const [catKey, cat] of Object.entries(PLU)) {
    for (const grp of cat.groups) {
      for (const [name, plu] of grp.items) {
        const ps = String(plu);
        let s = 0;
        if (isNum) {
          if (ps === q) s = 300;
          else if (ps.startsWith(q)) s = 200;
          else if (ps.includes(q)) s = 150;
        }
        const ts = Math.max(
          scoreMatch(name, q), scoreMatch(name, expanded),
          scoreMatch(ps, q), scoreMatch(cat.label, q), scoreMatch(grp.title, q)
        );
        s = Math.max(s, ts);
        if (s > 0) pluRes.push({name, plu, catLabel: cat.label, grp: grp.title, s});
      }
    }
  }
  pluRes.sort((a, b) => b.s - a.s);

  for (const c of CMDS) {
    const s = Math.max(
      scoreMatch(c.cmd, q), scoreMatch(c.name, q), scoreMatch(c.name, expanded),
      scoreMatch(c.desc || '', q), scoreMatch(c.steps || '', q)
    );
    if (s > 0) cmdRes.push({...c, s});
  }
  cmdRes.sort((a, b) => b.s - a.s);

  for (const p of POLICIES) {
    const s = Math.max(scoreMatch(p.title, q), scoreMatch(p.tags || '', q), scoreMatch(p.body || '', q));
    if (s > 0) polRes.push({...p, s});
  }
  polRes.sort((a, b) => b.s - a.s);

  let html = '';
  if (pluRes.length) {
    html += `<div class="rg-title">PLU Numbers (${pluRes.length})</div>`;
    pluRes.slice(0, 20).forEach(r => {
      html += `<div class="result-card" onclick="tapPLU(${r.plu})">
        <div class="r-plu">${hl(String(r.plu), q)}</div>
        <div class="r-name">${hl(r.name, q)}</div>
        <div class="r-sub">${hl(r.catLabel, q)} · ${hl(r.grp, q)}</div>
      </div>`;
    });
  }
  if (cmdRes.length) {
    html += `<div class="rg-title">AS400 Commands (${cmdRes.length})</div>`;
    cmdRes.slice(0, 10).forEach(r => {
      html += `<div class="result-card" onclick="jumpToCmd('cmd-${r.cmd.replace(/\s/g, '-')}')">
        <div><span class="r-cmd">${hl(r.cmd, q)}</span><span style="font-weight:600">${hl(r.name, q)}</span></div>
        <div class="r-desc">${hl(r.desc, q)}</div>
      </div>`;
    });
  }
  if (polRes.length) {
    html += `<div class="rg-title">Policies (${polRes.length})</div>`;
    polRes.slice(0, 5).forEach(r => {
      html += `<div class="result-card">
        <div class="r-name">${hl(r.title, q)}</div>
        <div class="r-desc" style="margin-top:4px">${hl(r.body.substring(0, 120), q)}…</div>
      </div>`;
    });
  }
  if (!html) html = `<div class="no-results">No results for "<b>${q}</b>"<br><span style="font-size:13px;color:var(--muted)">Try a cut name, PLU number, or AS400 command</span></div>`;
  ri.innerHTML = html;
}

// ── SUBBAR ────────────────────────────────────────────────────────────────────
function renderSubbar(tabId) {
  const items = SUBBARS[tabId] || [];
  const activeKey = tabId === 'plu-page' ? _activePLUCat
    : tabId === 'as400-page' ? _activeAS400Cat : _activeBBSec;
  document.getElementById('subbar').innerHTML = items.map(item =>
    `<button class="sb-btn${item.key === activeKey ? ' active' : ''}" onclick="subbarClick('${tabId}','${item.key}')">${item.label}</button>`
  ).join('');
}

function subbarClick(tabId, key) {
  if (tabId === 'plu-page') {
    _activePLUCat = key;
    document.querySelectorAll('.plu-section').forEach(s => s.classList.remove('active'));
    const sec = document.getElementById('plu-' + key);
    if (sec) sec.classList.add('active');
    document.getElementById('content').scrollTop = 0;
  } else if (tabId === 'as400-page') {
    _activeAS400Cat = key;
    document.querySelectorAll('.as400-group').forEach(g => {
      g.classList.toggle('visible', key === 'all' || g.dataset.cat === key);
    });
    document.getElementById('content').scrollTop = 0;
  } else {
    _activeBBSec = key;
    document.querySelectorAll('.bb-section').forEach(s => {
      s.classList.toggle('visible', s.dataset.sec === key);
    });
    document.getElementById('content').scrollTop = 0;
  }
  renderSubbar(tabId);
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
function switchTab(tabId) {
  clearSearch();
  _activeTab = tabId;
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  const btn = document.querySelector(`[data-tab="${tabId}"]`);
  if (btn) btn.classList.add('active');
  document.getElementById('content').scrollTop = 0;
  renderSubbar(tabId);
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById(_activeTab).classList.add('active');
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function tapPLU(plu) {
  if (navigator.vibrate) navigator.vibrate(30);
  if (navigator.clipboard) navigator.clipboard.writeText(String(plu)).catch(() => {});
  showToast('PLU ' + plu + ' — copied!');
}
function jumpToCmd(id) {
  switchTab('as400-page');
  setTimeout(() => {
    const el = document.getElementById(id);
    if (el) { el.open = true; el.scrollIntoView({behavior: 'smooth', block: 'start'}); }
  }, 80);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ── KEYBOARD / VIEWPORT FIX ───────────────────────────────────────────────────
let _lockedVH = 0;
function applyVH(force) {
  const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  // On first call (page load), lock the height so browser chrome show/hide
  // never causes the layout to jump. Only update if the keyboard is open
  // (height shrinks significantly = soft keyboard) or forced.
  if (!_lockedVH || force) {
    _lockedVH = h;
    document.getElementById('app').style.height = h + 'px';
    return;
  }
  // Allow resize only when the soft keyboard is clearly involved
  // (height drops by more than 150px = keyboard opened/closed)
  const delta = _lockedVH - h;
  if (delta > 150) {
    // Keyboard open: shrink app so content isn't hidden behind it
    document.getElementById('app').style.height = h + 'px';
  } else {
    // Browser chrome toggle: restore locked height, don't jump
    document.getElementById('app').style.height = _lockedVH + 'px';
  }
}
function resetScroll() {
  window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderPLU();
  renderAS400();
  renderBluebook();
  renderSubbar('plu-page');

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  const inp = document.getElementById('search-input');
  const clr = document.getElementById('clear-btn');
  let st;
  inp.addEventListener('input', () => {
    const v = inp.value;
    clr.style.display = v ? 'flex' : 'none';
    clearTimeout(st);
    st = setTimeout(() => doSearch(v), v.length < 3 ? 0 : 50);
  });
  inp.addEventListener('focus', () => {
    // Don't call resetScroll on focus — it fights the browser's
    // auto-scroll-to-input behavior and causes the field to lose focus
  });
  inp.addEventListener('blur', () => setTimeout(() => {
    if (_lockedVH) document.getElementById('app').style.height = _lockedVH + 'px';
  }, 100));
  document.getElementById('header').addEventListener('touchmove', e => {
    // Only block touchmove on the subbar scroll, not on the search input area
    if (!e.target.closest('#subbar') && !e.target.closest('#search-wrap')) e.preventDefault();
  }, {passive: false});

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      if (document.activeElement === inp) return; // keyboard open — don't touch layout
      applyVH();
      resetScroll();
    });
    window.visualViewport.addEventListener('scroll', resetScroll);
  }
  applyVH();
  window.addEventListener('resize', () => {
    if (document.activeElement === inp) return;
    applyVH();
  });

  // ── PWA INSTALL ──────────────────────────────────────────────────────────────
  let _deferredPrompt = null;
  const banner = document.getElementById('install-banner');
  const ibSub  = document.getElementById('ib-sub-text');
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
  const isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isAndroid = /android/i.test(navigator.userAgent);

  if (!isStandalone && !sessionStorage.getItem('install-dismissed')) {
    // Android Chrome: catch native install prompt
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      _deferredPrompt = e;
      ibSub.textContent = 'Tap Install to run full-screen, no address bar';
      banner.classList.remove('hidden');
    });

    // Show banner immediately for all non-standalone users
    // with platform-appropriate instructions
    if (isIOS) {
      ibSub.textContent = 'Tap Share ↑ → "Add to Home Screen"';
    } else if (isAndroid) {
      ibSub.textContent = 'Tap ⋮ → "Add to Home Screen" for full-screen';
    } else {
      ibSub.textContent = 'Add to Home Screen to hide the address bar';
    }
    setTimeout(() => banner.classList.remove('hidden'), 500);

    document.getElementById('ib-install-btn').addEventListener('click', async () => {
      if (_deferredPrompt) {
        _deferredPrompt.prompt();
        const { outcome } = await _deferredPrompt.userChoice;
        _deferredPrompt = null;
        banner.classList.add('hidden');
      } else if (isIOS) {
        showToast('Tap Share ↑ then "Add to Home Screen"');
        banner.classList.add('hidden');
      } else {
        showToast('Tap ⋮ menu → "Add to Home Screen"');
        banner.classList.add('hidden');
      }
    });

    document.getElementById('ib-dismiss-btn').addEventListener('click', () => {
      banner.classList.add('hidden');
      sessionStorage.setItem('install-dismissed', '1');
    });
  }

  // Register service worker for offline support (inline worker via blob)
  if ('serviceWorker' in navigator) {
    const swCode = `
const CACHE = 'cfg-v1';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.open(CACHE).then(cache =>
      cache.match(e.request).then(hit => {
        const fresh = fetch(e.request).then(r => { cache.put(e.request, r.clone()); return r; }).catch(() => hit);
        return hit || fresh;
      })
    )
  );
});`;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    const swURL = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swURL, {scope: './'}).catch(() => {});
  }
});
</script>
