<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Production — Dept 61</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0a;--sf:#141414;--s2:#1e1e1e;--s3:#252525;
      --bd:#2a2a2a;--bd-lite:#222;
      --tx:#fff;--dm:#ccc;--mt:#999;--ft:#666;--xt:#444;
      --brand:#8b0000;
      --red:#cc0000;--red-dk:#8b1010;--amber:#e07b00;--amber-dk:#8a6020;
      --green:#00c87a;--green-dk:#2e7d42;--blue:#1a6bb5;--blue-lt:#4a90d9;
      --teal:#007a6e;--purple:#8850c8;--purple-dk:#5a3a8a;--pink:#c05878;
      --gold:#c8a000;--gold-lt:#e8c97a;--brown:#8a5a35;
      --prime:#c8960c;--choice:#4a7fbf;--wagyu:#9b4dca;
      --beef-cryo:#7a1c1c;--pork-clr:#c05878;--poultry:#c9a000;--turkey:#8a6800;
      --seafood:#1a6bb5;--grinds:#6a5a4a;--lamb-clr:#8a5a35;
      --st-dw:#e07b00;--st-lt:#c8a000;--st-oos:#cc0000;--st-na:#555;
      --sp-xs:4px;--sp-sm:8px;--sp-md:12px;--sp-lg:16px;--sp-xl:24px;
      --r-sm:6px;--r:8px;--r-lg:12px;--r-pill:999px;
      --sh-sm:0 1px 4px rgba(0,0,0,.4);--sh:0 2px 10px rgba(0,0,0,.5);
      --header-h:58px;
      --font-body:'Montserrat',sans-serif;--font-mono:'JetBrains Mono',monospace;
      --accent:#cc0000;--accent-bg:rgba(204,0,0,.10);--accent-bd:rgba(204,0,0,.25);
    }
    :root{--accent:var(--amber);--accent-bg:rgba(224,123,0,.10);--accent-bd:rgba(224,123,0,.25)}

    /* ─── UNIFIED HEADER ─── */
    header{position:relative;display:flex;align-items:center;height:var(--header-h);padding:0 14px;background:var(--bg);border-bottom:1px solid var(--bd);gap:10px;flex-shrink:0}
    .bk{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:1px solid var(--bd);border-radius:var(--r-sm);color:var(--ft);font-size:18px;line-height:1;text-decoration:none;flex-shrink:0;transition:background .15s}
    .bk:active{background:var(--sf)}
    .hc{flex:1;text-align:center;pointer-events:none}
    .ht{font-family:var(--font-body);font-weight:700;font-size:15px;font-style:italic;color:var(--tx);letter-spacing:.02em;line-height:1.1}
    .hs{font-family:var(--font-body);font-weight:500;font-size:10px;color:var(--xt);letter-spacing:.08em;margin-top:2px}
    .clogo{background:var(--brand);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 9px;text-align:center;flex-shrink:0;line-height:1.2;box-shadow:0 0 14px rgba(139,0,0,.55),0 0 4px rgba(139,0,0,.9)}
    .cl1{font-family:var(--font-body);font-weight:800;font-size:15px;color:#fff;letter-spacing:.05em;text-shadow:0 0 10px rgba(255,150,150,.45)}
    .cl2{font-family:var(--font-body);font-weight:600;font-size:7px;color:rgba(255,255,255,.5);letter-spacing:.22em;text-transform:uppercase;margin-top:2px}

    /* ─── RESET ─── */
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--tx);font-family:var(--font-body);display:flex;flex-direction:column;height:100dvh;overflow:hidden}

    /* ─── CTRL BAR ─── */
    .ctrl-bar{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 12px;height:44px;flex-shrink:0;display:flex;align-items:center;gap:8px}
    .ctrl-bar input[type="date"],
    .ctrl-bar select{height:30px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r-sm);color:var(--tx);font-family:var(--font-mono);font-size:12px;padding:0 8px;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer}
    .ctrl-bar input[type="date"]{min-width:128px;flex-shrink:0}
    .ctrl-bar select{min-width:86px;flex-shrink:0}
    .ctrl-bar input[type="date"]:focus,
    .ctrl-bar select:focus{border-color:var(--accent)}
    .spacer{flex:1}
    .btn-report{height:30px;padding:0 14px;background:var(--accent);border:none;border-radius:var(--r-sm);color:#fff;font-family:var(--font-body);font-size:12px;font-weight:700;letter-spacing:.04em;cursor:pointer;white-space:nowrap;transition:opacity .15s}
    .btn-report:active{opacity:.8}

    /* ─── TAB BAR ─── */
    .tbr{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
    .tb{flex:1;padding:10px 4px 9px;border:none;background:none;color:var(--mt);font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
    .tb.on{color:var(--accent);border-bottom-color:var(--accent)}

    /* ─── SCROLL ─── */
    #scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

    /* ─── PANELS ─── */
    .pn{display:none;padding:8px 0 60px}
    .pn.on{display:block}

    /* ─── ACCORDION SECTION ─── */
    .acc-sect{margin:6px 12px;border:1px solid var(--bd);border-radius:var(--r-lg);overflow:hidden}
    .acc-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;-webkit-user-select:none;background:var(--sf);transition:background .12s}
    .acc-hd:active{background:var(--s2)}
    .acc-bar{width:4px;height:22px;border-radius:2px;flex-shrink:0}
    .acc-title{font-family:var(--font-body);font-weight:800;font-style:italic;font-size:13px;letter-spacing:.04em;text-transform:uppercase;flex:1}
    .acc-meta{font-family:var(--font-mono);font-size:10px;color:var(--ft);letter-spacing:.5px}
    .acc-count{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.5px;opacity:.8;min-width:24px;text-align:right}
    .acc-chevron{color:var(--ft);font-size:12px;transition:transform .22s;flex-shrink:0}
    .acc-sect.open .acc-chevron{transform:rotate(180deg)}
    .acc-body{display:none;border-top:1px solid var(--bd-lite)}
    .acc-sect.open .acc-body{display:block}

    /* ─── INPUT ROW (Cases / Cuts) ─── */
    .inp-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--bd-lite);gap:10px;background:var(--bg)}
    .inp-row:last-child{border-bottom:none}
    .inp-name{flex:1;font-size:13px;color:var(--dm);line-height:1.3;min-width:0}
    .inp-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .inp-unit{font-family:var(--font-mono);font-size:9px;color:var(--ft);letter-spacing:.5px;min-width:18px;text-align:right}
    .num-inp{width:62px;height:32px;background:var(--s3);border:1px solid var(--bd);border-radius:var(--r-sm);color:var(--tx);font-family:var(--font-mono);font-size:14px;font-weight:500;text-align:center;outline:none;-webkit-appearance:none;appearance:none;padding:0}
    .num-inp:focus{border-color:var(--accent);background:var(--s2)}
    .num-inp::-webkit-inner-spin-button,.num-inp::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

    /* ─── SHIFT SECTION ─── */
    .sh-sect{margin:6px 12px;border:1px solid var(--bd);border-radius:var(--r-lg);overflow:hidden}
    .sh-hd{display:flex;align-items:center;gap:10px;padding:10px 14px 9px;background:var(--sf);border-bottom:1px solid var(--bd-lite)}
    .sh-bar{width:4px;height:22px;border-radius:2px;flex-shrink:0}
    .sh-title{font-family:var(--font-body);font-weight:800;font-style:italic;font-size:13px;letter-spacing:.04em;text-transform:uppercase;flex:1}
    .sh-unit{font-family:var(--font-mono);font-size:9px;color:var(--ft);letter-spacing:.5px;margin-right:2px}
    .sh-total{font-family:var(--font-mono);font-size:12px;font-weight:600;min-width:28px;text-align:right}

    /* ─── STEPPER ROW ─── */
    .step-row{display:flex;align-items:center;padding:7px 14px;border-bottom:1px solid var(--bd-lite);gap:10px;background:var(--bg)}
    .step-row:last-child{border-bottom:none}
    .step-name{flex:1;font-size:13px;color:var(--dm);line-height:1.3;min-width:0}
    .stepper{display:flex;align-items:center;flex-shrink:0}
    .step-btn{background:var(--s2);border:1px solid var(--bd);color:var(--dm);font-size:16px;font-weight:700;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;user-select:none;-webkit-user-select:none;transition:background .1s,color .1s;flex-shrink:0}
    .step-btn.minus{border-radius:var(--r-sm) 0 0 var(--r-sm)}
    .step-btn.plus{border-radius:0 var(--r-sm) var(--r-sm) 0}
    .step-btn:active{background:var(--s3);color:#fff}
    .step-num{background:var(--s3);border:1px solid var(--bd);border-left:none;border-right:none;color:var(--tx);font-family:var(--font-mono);font-size:14px;font-weight:600;width:42px;height:32px;text-align:center;outline:none;-webkit-appearance:none;appearance:none;padding:0}
    .step-num:focus{background:var(--s2);border-top-color:var(--accent);border-bottom-color:var(--accent)}
    .step-num::-webkit-inner-spin-button,.step-num::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

    /* ─── MODAL ─── */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:300;align-items:flex-end}
    .modal-bg.open{display:flex}
    .modal{background:var(--sf);border-radius:var(--r-lg) var(--r-lg) 0 0;padding:20px 16px 40px;width:100%;max-height:82dvh;display:flex;flex-direction:column;gap:12px;box-shadow:var(--sh)}
    .modal-title{font-family:var(--font-body);font-weight:800;font-style:italic;font-size:18px;letter-spacing:.04em;color:var(--accent)}
    .modal-sub{font-family:var(--font-mono);font-size:10px;color:var(--ft);letter-spacing:.06em;margin-top:3px}
    .report-box{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);font-family:var(--font-mono);font-size:11.5px;line-height:1.85;padding:14px;white-space:pre-wrap;color:var(--tx);overflow-y:auto;flex:1}
    .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0}
    .btn-copy{background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:var(--font-body);font-size:13px;font-weight:700;letter-spacing:.04em;padding:13px;cursor:pointer;transition:background .2s}
    .btn-copy.copied{background:var(--green-dk)}
    .btn-close{background:transparent;border:1px solid var(--bd);border-radius:var(--r);color:var(--mt);font-family:var(--font-body);font-size:13px;font-weight:600;letter-spacing:.04em;padding:13px;cursor:pointer}
    .btn-close:active{background:var(--s2)}
  </style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
  <a class="bk" href="tools.html">&#8592;</a>
  <div class="hc"><div class="ht">Production</div><div class="hs">#436 &middot; TEMPE</div></div>
  <div class="clogo"><div class="cl1">COSTCO</div><div class="cl2">WHOLESALE</div></div>
</header>

<!-- ─── CTRL BAR ─── -->
<div class="ctrl-bar">
  <input type="date" id="prod-date">
  <select id="prod-shift">
    <option value="open">Open</option>
    <option value="close">Close</option>
    <option value="middy">Middy</option>
  </select>
  <div class="spacer"></div>
  <button class="btn-report" onclick="openReport()">Report</button>
</div>

<!-- ─── TAB BAR ─── -->
<div class="tbr">
  <button class="tb on" id="tb-cases" onclick="switchTab('cases')">Cases</button>
  <button class="tb" id="tb-cuts" onclick="switchTab('cuts')">Cuts</button>
  <button class="tb" id="tb-shift" onclick="switchTab('shift')">Shift</button>
</div>

<!-- ─── SCROLL AREA ─── -->
<div id="scroll">
  <div class="pn on" id="pn-cases"></div>
  <div class="pn" id="pn-cuts"></div>
  <div class="pn" id="pn-shift"></div>
</div>

<!-- ─── REPORT MODAL ─── -->
<div class="modal-bg" id="modal-bg" onclick="handleModalBgClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div>
      <div class="modal-title" id="modal-title">Production Report</div>
      <div class="modal-sub" id="modal-sub"></div>
    </div>
    <div class="report-box" id="report-box"></div>
    <div class="modal-btns">
      <button class="btn-copy" id="btn-copy" onclick="copyReport()">Copy</button>
      <button class="btn-close" onclick="closeReport()">Close</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  DATA DEFINITIONS
// ─────────────────────────────────────────────

var CASES_SECTS = [
  { id:'grinds',    label:'Grinds',    color:'var(--grinds)',    unit:'cs',
    items:['OG Beef','Wagyu','Bison','Butterball Grinds','OG Turkey Grinds'] },
  { id:'beef-cryo', label:'Beef Cryo', color:'var(--beef-cryo)', unit:'cs',
    items:['Tenderloin','Ribeye','New York','Brisket','Ribs'] },
  { id:'pork-cryo', label:'Pork Cryo', color:'var(--pork-clr)', unit:'cs',
    items:['Tenderloin','Boneless Loin','Back Ribs','Spare Ribs','Belly','Butt'] },
  { id:'poultry',   label:'Poultry',   color:'var(--poultry)',   unit:'cs',
    items:['Whole Birds','B/S Breasts','Tenders','B/S Thighs','Drumsticks','Thighs','Wings',
           'OG Whole Birds','OG B/S Breasts','OG Tenders','OG B/S Thighs','OG Drumsticks'] },
  { id:'seafood',   label:'Seafood',   color:'var(--seafood)',   unit:'cs',
    items:['Crab','Lobster','Atlantic Salmon','Steelhead','Tuna','Sea Bass',
           'Catfish','Tilapia','Shrimp Bags','Shrimp Tray Pack'] }
];

var CUTS_SECTS = [
  { id:'beef', label:'Beef', color:'var(--red)', unit:'ea',
    items:['Chuck Steak','Top Sirloin','New York','Ribeye','Tenderloin','Flap','Flank','Stew',
           'Eye of Round','Rib Roast','Shabu-Shabu','Tri-Tip','Milanese',
           'Prime Ribeye','Prime NY','Prime Tenderloin','Prime Tri-Tip','Prime Top Sirloin','Prime Tomahawk'] },
  { id:'pork', label:'Pork', color:'var(--pork-clr)', unit:'ea',
    items:['Bone-In Chops','Boneless Chops','Thin Chops','Belly','Boneless Country-Style','Rib-Tips'] },
  { id:'lamb', label:'Lamb', color:'var(--brown)', unit:'ea',
    items:['Ribs','Leg','Loin Chops'] }
];

var SHIFT_SECTS = [
  { id:'sh-poultry',  label:'Poultry',   color:'var(--poultry)',   unit:'case',
    items:['B/S Breast','Wings','Drumsticks','B/I Thigh','B/S Thigh','Tenders',
           'Whole Bird','OG Whole Bird','OG B/S Breast','OG B/S Thigh','OG Tenders','OG Drumstick'] },
  { id:'sh-turkey',   label:'Turkey',    color:'var(--turkey)',    unit:'case',
    items:['Butterball Grinds','OG Grinds'] },
  { id:'sh-pork',     label:'Pork Cryo', color:'var(--pork-clr)', unit:'case',
    items:['Belly','Back Ribs','Spare Ribs','Pork Loin','Shoulder','Tenderloin'] },
  { id:'sh-beef-cryo',label:'Beef Cryo', color:'var(--beef-cryo)',unit:'case',
    items:['Beef Ribs','Tenderloin','Brisket'] },
  { id:'sh-beef',     label:'Beef',      color:'var(--red)',       unit:'ea',
    items:['Chuck','Ribeye','New York','Brisket'] },
  { id:'sh-lamb',     label:'Lamb',      color:'var(--lamb-clr)', unit:'case',
    items:['Leg','Rib'] },
  { id:'sh-grinds',   label:'Grinds',    color:'var(--grinds)',    unit:'case',
    items:['OG Grinds','Wagyu Grinds','Bison Grinds'] }
];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────

var activeTab = 'cases';

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────

function todayISO() {
  var d = new Date();
  var y = d.getFullYear();
  var m = String(d.getMonth()+1).padStart(2,'0');
  var dd = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}

function getDate()  { return document.getElementById('prod-date').value  || todayISO(); }
function getShift() { return document.getElementById('prod-shift').value; }

function storeKey(tab) {
  if (tab === 'shift') return 'prod_shift_'+getDate()+'_'+getShift();
  return 'prod_'+tab+'_'+getDate();
}

function loadData(tab) {
  try { return JSON.parse(localStorage.getItem(storeKey(tab))) || {}; }
  catch(e) { return {}; }
}

function saveVal(tab, key, val) {
  var data = loadData(tab);
  data[key] = val;
  localStorage.setItem(storeKey(tab), JSON.stringify(data));
}

function ikey(sectId, itemName) { return sectId+'::'+itemName; }

function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g,'-');
}

function sectionTotal(tab, sectId, items) {
  var data = loadData(tab);
  return items.reduce(function(sum, item) {
    return sum + (parseInt(data[ikey(sectId, item)]) || 0);
  }, 0);
}

// ─────────────────────────────────────────────
//  TAB SWITCHING
// ─────────────────────────────────────────────

function switchTab(tab) {
  activeTab = tab;
  ['cases','cuts','shift'].forEach(function(t) {
    document.getElementById('pn-'+t).classList.toggle('on', t === tab);
    document.getElementById('tb-'+t).classList.toggle('on', t === tab);
  });
  renderTab(tab);
}

function renderTab(tab) {
  if      (tab === 'cases') renderCases();
  else if (tab === 'cuts')  renderCuts();
  else if (tab === 'shift') renderShift();
}

// ─────────────────────────────────────────────
//  RENDER: CASES & CUTS (accordion + number inputs)
// ─────────────────────────────────────────────

function buildAccordion(tab, sect, data) {
  var total = sectionTotal(tab, sect.id, sect.items);
  var accId = 'acc-'+slugify(tab)+'-'+slugify(sect.id);

  var rows = sect.items.map(function(item) {
    var key = ikey(sect.id, item);
    var val = parseInt(data[key]) || 0;
    var inputId = 'inp_'+slugify(tab)+'_'+slugify(sect.id)+'_'+slugify(item);
    return '<div class="inp-row">'
      + '<div class="inp-name">'+escHtml(item)+'</div>'
      + '<div class="inp-wrap">'
      + '<span class="inp-unit">'+sect.unit+'</span>'
      + '<input class="num-inp" type="number" id="'+inputId+'" min="0"'
      + ' value="'+(val||'')+'" placeholder="0"'
      + ' data-tab="'+tab+'" data-sect="'+sect.id+'" data-item="'+escAttr(item)+'"'
      + ' oninput="handleNumInput(this)">'
      + '</div></div>';
  }).join('');

  return '<div class="acc-sect" id="'+accId+'">'
    + '<div class="acc-hd" onclick="toggleAcc(\''+accId+'\')">'
    + '<div class="acc-bar" style="background:'+sect.color+'"></div>'
    + '<div class="acc-title" style="color:'+sect.color+'">'+sect.label+'</div>'
    + '<span class="acc-count" id="'+accId+'-cnt" style="color:'+sect.color+'">'+(total||'')+'</span>'
    + '<span class="acc-meta">'+sect.unit+'</span>'
    + '<span class="acc-chevron">&#9660;</span>'
    + '</div>'
    + '<div class="acc-body">'+rows+'</div>'
    + '</div>';
}

function renderCases() {
  var data = loadData('cases');
  document.getElementById('pn-cases').innerHTML =
    CASES_SECTS.map(function(s){ return buildAccordion('cases',s,data); }).join('');
}

function renderCuts() {
  var data = loadData('cuts');
  document.getElementById('pn-cuts').innerHTML =
    CUTS_SECTS.map(function(s){ return buildAccordion('cuts',s,data); }).join('');
}

function toggleAcc(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function handleNumInput(el) {
  var tab  = el.dataset.tab;
  var sect = el.dataset.sect;
  var item = el.dataset.item;
  var val  = Math.max(0, parseInt(el.value) || 0);
  saveVal(tab, ikey(sect, item), val);

  // Update count badge
  var sects = tab === 'cases' ? CASES_SECTS : CUTS_SECTS;
  var sectDef = sects.find(function(s){ return s.id === sect; });
  if (sectDef) {
    var total = sectionTotal(tab, sect, sectDef.items);
    var cntEl = document.getElementById('acc-'+slugify(tab)+'-'+slugify(sect)+'-cnt');
    if (cntEl) cntEl.textContent = total || '';
  }
}

// ─────────────────────────────────────────────
//  RENDER: SHIFT (steppers, no accordion)
// ─────────────────────────────────────────────

function renderShift() {
  var data = loadData('shift');

  var html = SHIFT_SECTS.map(function(sect) {
    var total = sectionTotal('shift', sect.id, sect.items);
    var rows = sect.items.map(function(item) {
      var key   = ikey(sect.id, item);
      var val   = parseInt(data[key]) || 0;
      var numId = 'stp_'+slugify(sect.id)+'_'+slugify(item);
      // escape item for inline JS attribute
      var itemEsc = escAttr(item);
      var sectEsc = escAttr(sect.id);
      return '<div class="step-row">'
        + '<div class="step-name">'+escHtml(item)+'</div>'
        + '<div class="stepper">'
        + '<div class="step-btn minus" onclick="stepChange(\''+sectEsc+'\',\''+itemEsc+'\',-1,\''+numId+'\')">&#8722;</div>'
        + '<input class="step-num" type="number" id="'+numId+'" min="0" value="'+val+'"'
        + ' data-sect="'+sectEsc+'" data-item="'+itemEsc+'"'
        + ' oninput="handleStepInput(this)">'
        + '<div class="step-btn plus" onclick="stepChange(\''+sectEsc+'\',\''+itemEsc+'\',1,\''+numId+'\')">&#43;</div>'
        + '</div></div>';
    }).join('');

    return '<div class="sh-sect">'
      + '<div class="sh-hd">'
      + '<div class="sh-bar" style="background:'+sect.color+'"></div>'
      + '<div class="sh-title" style="color:'+sect.color+'">'+sect.label+'</div>'
      + '<span class="sh-unit">'+sect.unit+'</span>'
      + '<span class="sh-total" style="color:'+sect.color+'" id="sht-'+slugify(sect.id)+'">'+total+'</span>'
      + '</div>'
      + rows
      + '</div>';
  }).join('');

  document.getElementById('pn-shift').innerHTML = html;
}

function stepChange(sectId, item, delta, numId) {
  var el = document.getElementById(numId);
  if (!el) return;
  var next = Math.max(0, (parseInt(el.value) || 0) + delta);
  el.value = next;
  saveVal('shift', ikey(sectId, item), next);
  updateShiftTotal(sectId);
}

function handleStepInput(el) {
  var sect = el.dataset.sect;
  var item = el.dataset.item;
  var val  = Math.max(0, parseInt(el.value) || 0);
  el.value = val;
  saveVal('shift', ikey(sect, item), val);
  updateShiftTotal(sect);
}

function updateShiftTotal(sectId) {
  var sectDef = SHIFT_SECTS.find(function(s){ return s.id === sectId; });
  if (!sectDef) return;
  var total = sectionTotal('shift', sectId, sectDef.items);
  var el = document.getElementById('sht-'+slugify(sectId));
  if (el) el.textContent = total;
}

// ─────────────────────────────────────────────
//  REPORT MODAL
// ─────────────────────────────────────────────

var reportText = '';

function openReport() {
  reportText = buildReport();
  var shiftStr = getShift().charAt(0).toUpperCase() + getShift().slice(1);
  document.getElementById('modal-title').textContent = 'Production Report';
  document.getElementById('modal-sub').textContent   = getDate() + '  ·  ' + shiftStr + '  ·  ' + activeTab.toUpperCase();
  document.getElementById('report-box').textContent  = reportText;
  var btn = document.getElementById('btn-copy');
  btn.textContent = 'Copy';
  btn.classList.remove('copied');
  document.getElementById('modal-bg').classList.add('open');
}

function closeReport() {
  document.getElementById('modal-bg').classList.remove('open');
}

function handleModalBgClick(e) {
  if (e.target === document.getElementById('modal-bg')) closeReport();
}

function copyReport() {
  var btn = document.getElementById('btn-copy');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(reportText).then(function() {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent='Copy'; btn.classList.remove('copied'); }, 2400);
    }).catch(function(){ fallbackCopy(btn); });
  } else {
    fallbackCopy(btn);
  }
}

function fallbackCopy(btn) {
  var ta = document.createElement('textarea');
  ta.value = reportText;
  ta.style.cssText = 'position:fixed;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e){}
  document.body.removeChild(ta);
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(function(){ btn.textContent='Copy'; btn.classList.remove('copied'); }, 2400);
}

function pad(str, n) { return String(str).padEnd(n,' '); }
function rpad(str, n) { return String(str).padStart(n,' '); }

function buildReport() {
  var dateStr  = getDate();
  var shiftStr = getShift().charAt(0).toUpperCase() + getShift().slice(1);
  var div = '─'.repeat(34);
  var lines = [
    'COSTCO #436 — DEPT 61 MEAT',
    'Production ' + activeTab.toUpperCase() + ' Report',
    dateStr + '  |  ' + shiftStr,
    div
  ];

  function appendSects(sects, tab) {
    var data = loadData(tab);
    sects.forEach(function(sect) {
      var sLines = [], hasAny = false;
      sect.items.forEach(function(item) {
        var v = parseInt(data[ikey(sect.id, item)]) || 0;
        if (v > 0) {
          sLines.push('  ' + pad(item, 24) + rpad(v, 3) + ' ' + sect.unit);
          hasAny = true;
        }
      });
      if (hasAny) {
        lines.push('');
        lines.push(sect.label.toUpperCase());
        sLines.forEach(function(l){ lines.push(l); });
      }
    });
  }

  if      (activeTab === 'cases') appendSects(CASES_SECTS, 'cases');
  else if (activeTab === 'cuts')  appendSects(CUTS_SECTS,  'cuts');
  else if (activeTab === 'shift') appendSects(SHIFT_SECTS, 'shift');

  // Grand total
  var grand = 0;
  var unit  = 'units';
  var sects = activeTab === 'cases' ? CASES_SECTS : activeTab === 'cuts' ? CUTS_SECTS : SHIFT_SECTS;
  var data  = loadData(activeTab);
  sects.forEach(function(sect) {
    sect.items.forEach(function(item) {
      grand += parseInt(data[ikey(sect.id, item)]) || 0;
    });
    if (activeTab === 'cases') unit = 'cs';
    else if (activeTab === 'cuts') unit = 'ea';
  });

  lines.push('');
  lines.push(div);
  lines.push('Total: ' + grand + ' ' + unit);
  lines.push('Generated: ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}));
  return lines.join('\n');
}

// ─────────────────────────────────────────────
//  ESCAPE HELPERS
// ─────────────────────────────────────────────

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function escAttr(str) {
  // Safe for single-quote delimited onclick attributes
  return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}
