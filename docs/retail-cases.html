<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Retail Case Log — #436</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--sf:#111;--s2:#191919;--bd:#242424;--tx:#fff;--dm:#ccc;--mt:#888;--ft:#555;--r:8px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;height:100dvh}
    
    
    
    
    
    
    

    /* DATE NAV */
    .datenav{background:var(--sf);border-bottom:1px solid var(--bd);padding:8px 12px;flex-shrink:0;display:flex;align-items:center;gap:8px}
    .date-arrow{background:none;border:1px solid #333;border-radius:5px;color:var(--dm);font-size:16px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    #rc-date{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:14px;padding:7px 10px;outline:none;text-align:center}
    .btn-today{background:#333;border:none;border-radius:5px;color:var(--dm);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 12px;cursor:pointer;flex-shrink:0}
    .btn-rpt{background:#e07b00;border:none;border-radius:5px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:7px 12px;cursor:pointer;flex-shrink:0}

    /* TAB BAR */
    .tabbar{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0}
    .tab{flex:1;border:none;background:none;color:var(--mt);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:9px 4px;cursor:pointer;border-bottom:3px solid transparent}
    .tab.on{color:var(--tx);border-bottom-color:#e07b00}

    /* SCROLL */
    #scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 10px 50px}
    #hist-pane{display:none}

    /* SECTION */
    .sec{background:var(--sf);border:1px solid var(--bd);border-left:4px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
    .sec-hd{padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:9px;-webkit-user-select:none;user-select:none}
    .sec-hd:active{background:rgba(255,255,255,.03)}
    .sec-ico{font-size:18px;flex-shrink:0}
    .sec-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;flex:1}
    .sec-total{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--mt);flex-shrink:0}
    .sec-chev{color:var(--ft);font-size:11px;transition:transform .2s;flex-shrink:0}
    .sec.op .sec-chev{transform:rotate(180deg)}
    .sec-body{display:none;border-top:1px solid var(--bd)}
    .sec.op .sec-body{display:block}

    /* ITEM ROW */
    .irow{display:flex;align-items:center;padding:9px 13px;border-bottom:1px solid var(--bd);gap:10px}
    .irow:last-child{border-bottom:none}
    .iname{font-size:14px;color:var(--dm);flex:1}
    .stepper{display:flex;align-items:center;gap:0;flex-shrink:0}
    .st-btn{background:var(--s2);border:1px solid var(--bd);color:var(--dm);font-size:17px;font-weight:700;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-user-select:none;user-select:none}
    .st-btn.minus{border-radius:5px 0 0 5px}
    .st-btn.plus{border-radius:0 5px 5px 0}
    .st-btn:active{background:#2a2a2a}
    .st-num{background:var(--s2);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);border-left:none;border-right:none;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;width:42px;height:34px;text-align:center;outline:none;-webkit-appearance:none;padding:0}
    .unit{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ft);margin-left:6px;flex-shrink:0}

    /* HISTORY */
    .hist-day{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer}
    .hist-date{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--mt);letter-spacing:1px}
    .hist-sum{font-size:14px;color:var(--dm);margin-top:3px}
    .hist-empty{text-align:center;padding:40px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ft);letter-spacing:1px}

    /* REPORT MODAL */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:flex-end}
    .modal-bg.op{display:flex}
    .modal{background:#111;border-radius:14px 14px 0 0;padding:16px 14px 40px;width:100%;max-height:85dvh;display:flex;flex-direction:column;gap:10px}
    .modal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#e07b00}
    .rbox{background:#0a0a0a;border:1px solid #333;border-radius:var(--r);font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.9;padding:12px;white-space:pre-wrap;color:var(--tx);overflow-y:auto;flex:1}
    .m-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .m-btn{border:none;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:12px;cursor:pointer}
      /* ─── UNIFIED HEADER ─── */
    header{position:relative;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;height:58px;background:#0a0a0a;border-bottom:1px solid #1e1e1e;flex-shrink:0}
    .bk{color:#666;font-family:'JetBrains Mono',monospace;font-size:11px;text-decoration:none;padding:5px 10px;border:1px solid #2a2a2a;border-radius:4px;white-space:nowrap;flex-shrink:0}
    .bk:active{background:#1a1a1a;color:#999}
    .hc{position:absolute;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;min-width:160px}
    .ht{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:#fff;letter-spacing:2px;text-transform:uppercase;line-height:1.1}
    .hs{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;letter-spacing:1.5px;margin-top:2px}
    .clogo{background:#8b0000;border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:3px 8px;text-align:center;flex-shrink:0;line-height:1.2}
    .cl1{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:#fff;letter-spacing:.08em}
    .cl2{font-size:7px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.2em;text-transform:uppercase;margin-top:1px}
  </style>
</head>
<body>
<header>
  <a class="bk" href="tools.html">← Back</a>
  <div class="hc"><div class="ht">Retail Cases</div><div class="hs">#436 TEMPE</div></div>
  <div class="clogo"><div class="cl1">COSTCO</div><div class="cl2">WHOLESALE</div></div>
</header>

<div class="datenav">
  <button class="date-arrow" onclick="shiftDay(-1)">‹</button>
  <input type="date" id="rc-date">
  <button class="date-arrow" onclick="shiftDay(1)">›</button>
  <button class="btn-today" onclick="goToday()">Today</button>
  <button class="btn-rpt" onclick="showReport()">Report</button>
</div>

<div class="tabbar">
  <button class="tab on" data-t="entry" onclick="switchTab(this)">Entry</button>
  <button class="tab" data-t="history" onclick="switchTab(this)">History</button>
</div>

<div id="scroll">
  <div id="entry-pane"><div id="sec-list"></div></div>
  <div id="hist-pane"></div>
</div>

<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">Retail Cases</div>
    <div class="rbox" id="rbox"></div>
    <div class="m-btns">
      <button class="m-btn" style="background:#e07b00;color:#fff" id="btn-copy" onclick="copyRpt()">Copy</button>
      <button class="m-btn" style="background:#222;color:#888" onclick="document.getElementById('modal').classList.remove('op')">Close</button>
    </div>
  </div>
</div>

<script>
const SECS = [
  {id:'grinds',name:'Grinds',ico:'⚙️',color:'#6a5a4a',unit:'cs',
   items:['OG','Wagyu','Bison']},
  {id:'beef-cuts',name:'Beef Cuts',ico:'🥩',color:'#8b1c1c',unit:'ea',
   items:['Chuck Steak','Top Sirloin','New York','Ribeye','Tenderloin','Flap','Flank','Stew','Eye of Round','Rib Roast','Shabu-Shabu','Tri-Tip','Milanese','Prime Ribeye','Prime NY','Prime Tenderloin','Prime Tri-Tip','Prime Top Sirloin','Prime Tomahawk']},
  {id:'beef-cryo',name:'Beef Cryo',ico:'📦',color:'#7a2020',unit:'cs',
   items:['Tenderloin','Ribeye','New York','Brisket','Ribs']},
  {id:'pork-cuts',name:'Pork Cuts',ico:'🐷',color:'#c05878',unit:'ea',
   items:['Bone-In Chops','Boneless Chops','Thin Chops','Belly','Boneless Country-Style','Rib-Tips']},
  {id:'pork-cryo',name:'Pork Cryo',ico:'📦',color:'#a03a58',unit:'cs',
   items:['Tenderloin','Boneless Loin','Back Ribs','Spare Ribs','Belly','Butt']},
  {id:'lamb',name:'Lamb',ico:'🐑',color:'#8a5a35',unit:'ea',
   items:['Ribs','Leg','Loin Chops']},
  {id:'chicken',name:'Chicken',ico:'🐔',color:'#c9a000',unit:'cs',
   items:['Whole Birds','B/S Breast','Tenders','B/S Thighs','Thighs','Drumsticks','Wings','OG Whole Bird','OG Breast','OG B/S Thighs','OG Drumstick','OG Tenders']},
  {id:'turkey',name:'Turkey',ico:'🦃',color:'#8a6800',unit:'cs',
   items:['Butterball Grinds','OG Grinds']},
  {id:'seafood',name:'Seafood',ico:'🐟',color:'#1a6bb5',unit:'cs',
   items:['Crab','Lobster','Atlantic Salmon','Steelhead','Tuna','Sea Bass','Catfish','Tilapia','Shrimp Bags','Shrimp Tray Pack']},
];

function today(){const d=new Date();return d.toISOString().slice(0,10);}
function storeKey(d){return 'retail_cases_'+(d||curDate());}
function curDate(){return document.getElementById('rc-date').value||today();}

document.getElementById('rc-date').value = today();
document.getElementById('rc-date').addEventListener('change', () => { render(); if(document.getElementById('hist-pane').style.display!=='none') renderHistory(); });

let DATA = {};

function load(){try{DATA=JSON.parse(localStorage.getItem(storeKey())||'{}');}catch{DATA={};}}
function save(){localStorage.setItem(storeKey(), JSON.stringify(DATA));}
function get(secId, name){return parseInt(DATA[secId+'::'+name]||0);}
function set(secId, name, val){DATA[secId+'::'+name]=Math.max(0,val);save();updateSecTotal(secId);}

function shiftDay(n){
  const d = new Date(curDate()+'T12:00:00');
  d.setDate(d.getDate()+n);
  document.getElementById('rc-date').value = d.toISOString().slice(0,10);
  load(); render();
}
function goToday(){document.getElementById('rc-date').value=today();load();render();}

function switchTab(btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  const t = btn.dataset.t;
  document.getElementById('entry-pane').style.display = t==='entry'?'block':'none';
  document.getElementById('hist-pane').style.display = t==='history'?'block':'none';
  if(t==='history') renderHistory();
}

function updateSecTotal(secId){
  const sec = SECS.find(s=>s.id===secId);
  if(!sec) return;
  const total = sec.items.reduce((s,n)=>s+get(secId,n),0);
  const el = document.getElementById('total-'+secId);
  if(el) el.textContent = total ? total+sec.unit : '';
}

function render(){
  load();
  const list = document.getElementById('sec-list');
  list.innerHTML = SECS.map(sec => {
    const total = sec.items.reduce((s,n)=>s+get(sec.id,n),0);
    const rows = sec.items.map(name => {
      const v = get(sec.id, name);
      const rowId = 'r-'+sec.id+'-'+name.replace(/\W/g,'_');
      return `<div class="irow" id="${rowId}">
        <span class="iname">${name}</span>
        <div class="stepper">
          <div class="st-btn minus" onpointerdown="adj('${sec.id}','${name}',-1)">−</div>
          <input class="st-num" type="number" min="0" value="${v}" onchange="set('${sec.id}','${name}',parseInt(this.value)||0)">
          <div class="st-btn plus" onpointerdown="adj('${sec.id}','${name}',1)">+</div>
        </div>
        <span class="unit">${sec.unit}</span>
      </div>`;
    }).join('');
    return `<div class="sec" style="border-left-color:${sec.color}">
      <div class="sec-hd" onclick="this.closest('.sec').classList.toggle('op')">
        <span class="sec-ico">${sec.ico}</span>
        <span class="sec-name">${sec.name}</span>
        <span class="sec-total" id="total-${sec.id}">${total?total+sec.unit:''}</span>
        <span class="sec-chev">▼</span>
      </div>
      <div class="sec-body">${rows}</div>
    </div>`;
  }).join('');
}

function adj(secId, name, delta){
  const input = document.querySelector(`#r-${secId}-${name.replace(/\W/g,'_')} .st-num`);
  const newVal = Math.max(0, get(secId, name) + delta);
  if(input) input.value = newVal;
  set(secId, name, newVal);
}

function renderHistory(){
  const pane = document.getElementById('hist-pane');
  const keys = Object.keys(localStorage).filter(k=>k.startsWith('retail_cases_')).sort().reverse();
  if(!keys.length){pane.innerHTML='<div class="hist-empty">No logged days yet</div>';return;}
  pane.innerHTML = keys.map(k => {
    const dateStr = k.replace('retail_cases_','');
    let data = {};
    try{data=JSON.parse(localStorage.getItem(k)||'{}');}catch{}
    const totals = SECS.map(s=>{
      const t = s.items.reduce((sum,n)=>sum+parseInt(data[s.id+'::'+n]||0),0);
      return t?`${s.name} ${t}${s.unit}`:'';
    }).filter(Boolean);
    if(!totals.length) return '';
    const dFmt = new Date(dateStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    return `<div class="hist-day" onclick="loadDay('${dateStr}')">
      <div class="hist-date">${dFmt}</div>
      <div class="hist-sum">${totals.join(' · ')}</div>
    </div>`;
  }).filter(Boolean).join('') || '<div class="hist-empty">No data yet</div>';
}

function loadDay(dateStr){
  document.getElementById('rc-date').value = dateStr;
  switchTab(document.querySelector('[data-t="entry"]'));
  load(); render();
}

function showReport(){
  load();
  const d = curDate();
  const dFmt = new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  let lines = [`Retail Cases — ${dFmt}`, ''];
  let hasAny = false;
  SECS.forEach(sec => {
    const filled = sec.items.filter(n=>get(sec.id,n)>0);
    if(!filled.length) return;
    hasAny = true;
    const total = filled.reduce((s,n)=>s+get(sec.id,n),0);
    lines.push(`${sec.name.toUpperCase()} — ${total}${sec.unit} total`);
    filled.forEach(n => lines.push(`  ${n}: ${get(sec.id,n)}${sec.unit}`));
    lines.push('');
  });
  if(!hasAny) lines.push('No cases logged.');
  document.getElementById('rbox').textContent = lines.join('\n');
  document.getElementById('modal').classList.add('op');
}

function copyRpt(){
  const text = document.getElementById('rbox').textContent;
  const btn = document.getElementById('btn-copy');
  navigator.clipboard?.writeText(text).catch(()=>{});
  btn.textContent='✓ Copied'; btn.style.background='#2a7040';
  setTimeout(()=>{btn.textContent='Copy'; btn.style.background='#e07b00';},2000);
}

function closeModal(e){if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('op');}

render();
window.addEventListener('beforeinstallprompt',e=>e.preventDefault());
</script>
</body>
</html>
