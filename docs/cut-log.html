<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Cut Log — #436</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--sf:#111;--s2:#191919;--bd:#242424;--tx:#fff;--dm:#ccc;--mt:#888;--ft:#555;--r:8px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;height:100dvh}
    header{background:#0a0a0a;border-bottom:2px solid #222;padding:10px 14px 9px;flex-shrink:0;display:flex;align-items:center;gap:10px}
    .bk{color:var(--mt);font-family:'JetBrains Mono',monospace;font-size:11px;text-decoration:none;padding:5px 9px;border:1px solid #333;border-radius:4px;flex-shrink:0}
    .clogo{background:#8b0000;border:1px solid rgba(255,255,255,.18);border-radius:5px;padding:4px 8px;text-align:center;flex-shrink:0;line-height:1.2}
    .cl1{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:#fff;letter-spacing:.08em}
    .cl2{font-size:7px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.2em;text-transform:uppercase;margin-top:1px}
    .ht{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
    .hs{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mt);letter-spacing:1px}
    .datenav{background:var(--sf);border-bottom:1px solid var(--bd);padding:8px 12px;flex-shrink:0;display:flex;align-items:center;gap:8px}
    .d-arrow{background:none;border:1px solid #333;border-radius:5px;color:var(--dm);font-size:16px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    #cl-date{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:14px;padding:7px 10px;outline:none;text-align:center}
    .btn-today{background:#333;border:none;border-radius:5px;color:var(--dm);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 12px;cursor:pointer;flex-shrink:0}
    #scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 10px 50px}
    .banner{background:rgba(136,80,200,.12);border:1px solid rgba(136,80,200,.3);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;font-size:13px;color:#b890e8;line-height:1.5;text-align:center}
    .sec{background:var(--sf);border:1px solid var(--bd);border-left:4px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
    .sec-hd{padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:9px;-webkit-user-select:none;user-select:none}
    .sec-hd:active{background:rgba(255,255,255,.03)}
    .sec-ico{font-size:18px;flex-shrink:0}
    .sec-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;flex:1}
    .sec-chev{color:var(--ft);font-size:11px;transition:transform .2s;flex-shrink:0}
    .sec.op .sec-chev{transform:rotate(180deg)}
    .sec-body{display:none;border-top:1px solid var(--bd)}
    .sec.op .sec-body{display:block}
    .irow{display:flex;align-items:center;padding:8px 13px;border-bottom:1px solid var(--bd);gap:10px}
    .irow:last-child{border-bottom:none}
    .iname{font-size:14px;color:var(--dm);flex:1}
    .count-in{background:var(--s2);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:14px;width:60px;text-align:center;padding:6px 4px;outline:none;-webkit-appearance:none}
    .unit{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ft);margin-left:4px;flex-shrink:0}
  </style>
</head>
<body>
<header>
  <a class="bk" href="tools.html">← Tools</a>
  <div class="clogo"><div class="cl1">COSTCO</div><div class="cl2">WHOLESALE</div></div>
  <div><div class="ht">Cut Log</div><div class="hs">#436 TEMPE · DEPT 61</div></div>
</header>
<div class="datenav">
  <button class="d-arrow" onclick="shiftDay(-1)">‹</button>
  <input type="date" id="cl-date">
  <button class="d-arrow" onclick="shiftDay(1)">›</button>
  <button class="btn-today" onclick="goToday()">Today</button>
</div>
<div id="scroll">
  <div class="banner">📝 Cut Log — Coming Soon<br>Track daily cuts by item and weight. Log will persist per shift per day.</div>
  <div id="sec-list"></div>
</div>
<script>
const SECS = [
  {id:'beef-cuts',name:'Beef Cuts',ico:'🥩',color:'#8b1c1c',unit:'ea',
   items:['Chuck Steak','Top Sirloin','New York','Ribeye','Tenderloin','Flap','Flank','Stew','Eye of Round','Rib Roast','Shabu-Shabu','Tri-Tip','Milanese','Prime Ribeye','Prime NY','Prime Tenderloin','Prime Tri-Tip','Prime Top Sirloin','Prime Tomahawk']},
  {id:'beef-cryo',name:'Beef Cryo',ico:'📦',color:'#7a2020',unit:'cs',
   items:['Tenderloin','Ribeye','New York','Brisket','Ribs']},
  {id:'pork-cuts',name:'Pork Cuts',ico:'🐷',color:'#c05878',unit:'ea',
   items:['Bone-In Chops','Boneless Chops','Thin Chops','Belly','Boneless Country-Style','Rib-Tips']},
  {id:'pork-cryo',name:'Pork Cryo',ico:'📦',color:'#a03a58',unit:'cs',
   items:['Tenderloin','Boneless Loin','Back Ribs','Spare Ribs','Belly','Butt']},
  {id:'lamb',name:'Lamb',ico:'🐑',color:'#8a5a35',unit:'ea',
   items:['Ribs','Leg','Loin Chops']},
];
function today(){return new Date().toISOString().slice(0,10);}
document.getElementById('cl-date').value = today();
function shiftDay(n){const d=new Date(document.getElementById('cl-date').value+'T12:00:00');d.setDate(d.getDate()+n);document.getElementById('cl-date').value=d.toISOString().slice(0,10);render();}
function goToday(){document.getElementById('cl-date').value=today();render();}
function skey(){return 'cut_log_'+document.getElementById('cl-date').value;}
function load(){try{return JSON.parse(localStorage.getItem(skey())||'{}');}catch{return {};}}
function saveVal(secId,name,val){const d=load();d[secId+'::'+name]=val;localStorage.setItem(skey(),JSON.stringify(d));}
function render(){
  const data=load();
  document.getElementById('sec-list').innerHTML=SECS.map(s=>{
    const rows=s.items.map(n=>`<div class="irow">
      <span class="iname">${n}</span>
      <input class="count-in" type="number" min="0" value="${data[s.id+'::'+n]||''}" placeholder="0" oninput="saveVal('${s.id}','${n}',this.value)">
      <span class="unit">${s.unit}</span>
    </div>`).join('');
    return `<div class="sec" style="border-left-color:${s.color}">
      <div class="sec-hd" onclick="this.closest('.sec').classList.toggle('op')">
        <span class="sec-ico">${s.ico}</span><span class="sec-name">${s.name}</span><span class="sec-chev">▼</span>
      </div><div class="sec-body">${rows}</div>
    </div>`;
  }).join('');
}
render();
</script>
</body>
</html>
