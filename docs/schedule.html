<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Schedule — Dept 61</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--surface:#141414;--border:#222;--text:#fff;--dim:#aaa;--muted:#999;--red:#cc0000;--green:#2e7d42;--blue:#0055a5;--amber:#e07b00}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:60px}
    header{background:var(--surface);border-bottom:3px solid var(--green);padding:12px 16px 10px;display:flex;align-items:center;gap:14px}
    .back{color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:11px;text-decoration:none;letter-spacing:1px;padding:5px 9px;border:1px solid rgba(255,255,255,.25);border-radius:4px;white-space:nowrap}
    .htitle{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:3px;text-transform:uppercase}
    .hsub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px}
    .container{max-width:480px;margin:0 auto;padding:16px 12px;display:flex;flex-direction:column;gap:10px}
    .section-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#333;text-align:center;padding:4px 0}
    .tool-card{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--border);border-radius:8px;padding:20px 18px;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:16px;min-height:90px;transition:transform .12s;position:relative}
    .tool-card:active{transform:scale(.97)}
    .tool-card.green{border-left-color:var(--green)}
    .tool-card.blue{border-left-color:var(--blue)}
    .tool-card.amber{border-left-color:var(--amber)}
    .card-icon{font-size:32px;flex-shrink:0}
    .card-text{display:flex;flex-direction:column;gap:4px}
    .card-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase}
    .card-desc{font-size:13px;color:var(--dim);line-height:1.4}
    .card-tag{position:absolute;top:10px;right:12px;font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;letter-spacing:1px;text-transform:uppercase}
  </style>
</head>
<body>
<header>
  <a class="back" href="index.html">← Hub</a>
  <div>
    <div class="htitle">📅 Schedule</div>
    <div class="hsub">DEPT 61 &nbsp;·&nbsp; TEMPE</div>
  </div>
</header>
<div class="container">
  <div class="section-label">— Tools —</div>

  <a class="tool-card green" href="https://costcowhlsus-sso.prd.mykronos.com" target="_blank">
    <span class="card-icon">⏱</span>
    <div class="card-text">
      <span class="card-name">UKG Pro</span>
      <span class="card-desc">Shifts, time & attendance, punch in/out</span>
    </div>
  </a>

  <a class="tool-card blue" href="schedule-calendar.html">
    <span class="card-icon">📆</span>
    <div class="card-text">
      <span class="card-name">Calendar</span>
      <span class="card-desc">Work schedule — Gmail calendar view</span>
    </div>
  </a>

  <a class="tool-card amber" href="schedule-screenshots.html">
    <span class="card-icon">📸</span>
    <div class="card-text">
      <span class="card-name">Sync Schedule</span>
      <span class="card-desc">Upload screenshot → auto-fill calendar</span>
    </div>
  </a>

</div>
</body>
</html>
