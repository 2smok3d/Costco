<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Schedule — Dept 61</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0a;--sf:#141414;--s2:#1e1e1e;--s3:#252525;
      --bd:#2a2a2a;--bd-lite:#222;
      --tx:#fff;--dm:#ccc;--mt:#999;--ft:#666;--xt:#444;
      --brand:#8b0000;
      --red:#cc0000;--red-dk:#8b1010;--amber:#e07b00;--amber-dk:#8a6020;
      --green:#00c87a;--green-dk:#2e7d42;--blue:#1a6bb5;--blue-lt:#4a90d9;
      --teal:#007a6e;--purple:#8850c8;--purple-dk:#5a3a8a;--pink:#c05878;
      --gold:#c8a000;--gold-lt:#e8c97a;--brown:#8a5a35;
      --prime:#c8960c;--choice:#4a7fbf;--wagyu:#9b4dca;
      --beef-cryo:#7a1c1c;--pork-clr:#c05878;--poultry:#c9a000;--turkey:#8a6800;
      --seafood:#1a6bb5;--grinds:#6a5a4a;--lamb-clr:#8a5a35;
      --st-dw:#e07b00;--st-lt:#c8a000;--st-oos:#cc0000;--st-na:#555;
      --sp-xs:4px;--sp-sm:8px;--sp-md:12px;--sp-lg:16px;--sp-xl:24px;
      --r-sm:6px;--r:8px;--r-lg:12px;--r-pill:999px;
      --sh-sm:0 1px 4px rgba(0,0,0,.4);--sh:0 2px 10px rgba(0,0,0,.5);
      --header-h:58px;
      --font-body:'Montserrat',sans-serif;--font-mono:'JetBrains Mono',monospace;
      --accent:#8850c8;--accent-bg:rgba(136,80,200,.10);--accent-bd:rgba(136,80,200,.25);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--tx);font-family:var(--font-body);display:flex;flex-direction:column;height:100dvh}
    /* ─── UNIFIED HEADER ─── */
    header{position:relative;display:flex;align-items:center;height:var(--header-h);padding:0 14px;background:var(--bg);border-bottom:1px solid var(--bd);gap:10px;flex-shrink:0}
    .bk{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:1px solid var(--bd);border-radius:var(--r-sm);color:var(--ft);font-size:18px;line-height:1;text-decoration:none;flex-shrink:0;transition:background .15s}
    .bk:active{background:var(--sf)}
    .hc{position:absolute;left:0;right:0;text-align:center;pointer-events:none}
    .ht{font-family:var(--font-body);font-weight:700;font-size:15px;font-style:italic;color:var(--tx);letter-spacing:.02em;line-height:1.1}
    .hs{font-family:var(--font-body);font-weight:500;font-size:10px;color:var(--xt);letter-spacing:.08em;margin-top:2px}
    .clogo{background:var(--brand);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 9px;text-align:center;flex-shrink:0;line-height:1.2;box-shadow:0 0 14px rgba(139,0,0,.55),0 0 4px rgba(139,0,0,.9)}
    .cl1{font-family:var(--font-body);font-weight:800;font-size:15px;color:#fff;letter-spacing:.05em;text-shadow:0 0 10px rgba(255,150,150,.45)}
    .cl2{font-family:var(--font-body);font-weight:600;font-size:7px;color:rgba(255,255,255,.5);letter-spacing:.22em;text-transform:uppercase;margin-top:2px}
    /* ─── CONTENT ─── */
    #main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px 30px;display:flex;flex-direction:column;gap:10px;max-width:480px;margin:0 auto;width:100%}
    .section-label{font-family:var(--font-body);font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--xt);text-align:center;padding:4px 0}
    .tool-card{background:var(--sf);border:1px solid var(--bd);border-left:4px solid var(--bd);border-radius:var(--r);padding:20px 18px;text-decoration:none;color:var(--tx);display:flex;align-items:center;gap:16px;min-height:90px;transition:transform .12s;position:relative}
    .tool-card:active{transform:scale(.97)}
    .tool-card.green{border-left-color:var(--green)}
    .tool-card.blue{border-left-color:var(--blue)}
    .tool-card.amber{border-left-color:var(--amber)}
    .card-icon{font-size:32px;flex-shrink:0}
    .card-text{display:flex;flex-direction:column;gap:4px}
    .card-name{font-family:var(--font-body);font-size:20px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase}
    .card-desc{font-size:13px;color:var(--dm);line-height:1.4}
    .card-tag{position:absolute;top:10px;right:12px;font-family:var(--font-mono);font-size:9px;color:var(--xt);letter-spacing:1px;text-transform:uppercase}
  </style>
</head>
<body>
<header>
  <a class="bk" href="career.html">←</a>
  <div class="hc"><div class="ht">Schedule</div><div class="hs">#436 · TEMPE</div></div><div class="cl2">WHOLESALE</div></div>
</header>
<div id="main">
  <div class="section-label">— Tools —</div>

  <a class="tool-card green" href="https://costcowhlsus-sso.prd.mykronos.com" target="_blank">
    <span class="card-icon">⏱</span>
    <div class="card-text">
      <span class="card-name">UKG Pro</span>
      <span class="card-desc">Shifts, time &amp; attendance, punch in/out</span>
    </div>
    <span class="card-tag">↗ external</span>
  </a>

  <a class="tool-card blue" href="career/schedule-calendar.html">
    <span class="card-icon">📆</span>
    <div class="card-text">
      <span class="card-name">Calendar</span>
      <span class="card-desc">Work schedule — Google Calendar embed</span>
    </div>
  </a>

  <a class="tool-card amber" href="schedule-screenshots.html">
    <span class="card-icon">📸</span>
    <div class="card-text">
      <span class="card-name">Sync Schedule</span>
      <span class="card-desc">Upload screenshot → extract &amp; add shifts</span>
    </div>
  </a>

</div>
<script>window.addEventListener('beforeinstallprompt',e=>e.preventDefault())</script>
</body>
</html>
