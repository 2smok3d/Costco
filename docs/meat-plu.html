    .cat-bar::-webkit-scrollbar{display:none}
    .cat-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .15s}
    .cat-btn.active.all{background:#333;color:var(--text);border-color:#555}
    .cat-btn.active.beef{background:#8b2020;color:#fff;border-color:#8b2020}

    .cat-btn.active.grinds{background:#555;color:#fff;border-color:#777}

    #plu-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .plu-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);padding:6px 14px 2px;letter-spacing:1px}

    .group-header{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding:8px 14px 2px}

    .plu-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;gap:12px}
    .plu-row:active{background:var(--s2)}
    .plu-row.hidden{display:none}
    .plu-name{font-size:16px;color:var(--dim);flex:1;line-height:1.3}
    .plu-num{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;color:var(--red);flex-shrink:0;letter-spacing:-0.5px}

    .plu-row.flash{background:rgba(224,123,0,.12)}

// Sort by PLU number within each group
DATA.sort((a,b) => a.p - b.p);

let currentCat = 'all';
let query = '';

function render() {
  const list = document.getElementById('plu-list');
  const count = document.getElementById('plu-count');
  const q = query.toLowerCase();

  let html = '';
  let visible = 0;
  let lastGroup = '';

  const filtered = DATA.filter(d => {
    const catMatch = currentCat === 'all' || d.c === currentCat;
    const qMatch = !q || d.n.toLowerCase().includes(q) || String(d.p).includes(q);
    return catMatch && qMatch;
  });

  filtered.forEach(d => {
    if (d.g !== lastGroup) {
      html += `<div class="group-header">${d.g}</div>`;
      lastGroup = d.g;
    }
    html += `<div class="plu-row" onclick="copyPlu(this, '${d.p}')">
      <div class="plu-name">${d.n}</div>
      <div class="plu-num">${d.p}</div>
    </div>`;
    visible++;
  });

  if (!visible) html = '<div class="empty">No PLUs found</div>';

  list.innerHTML = `<div class="plu-count">${visible} item${visible!==1?'s':''}</div>` + html;
  list.scrollTop = 0;
}

function copyPlu(row, plu) {
  navigator.clipboard?.writeText(plu).catch(()=>{});
  row.classList.add('flash');
  setTimeout(() => row.classList.remove('flash'), 400);
}

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  render();
});

render();
window.addEventListener('beforeinstallprompt', e => e.preventDefault());
