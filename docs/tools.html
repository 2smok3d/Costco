<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Tools — Costco #436</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0a;--sf:#141414;--s2:#1e1e1e;--bd:#2a2a2a;
      --tx:#fff;--dm:#ccc;--mt:#999;--ft:#666;--xt:#444;
      --brand:#8b0000;--red:#cc0000;--amber:#e07b00;
      --r-sm:6px;--r:8px;--header-h:58px;
      --font-body:'Montserrat',sans-serif;--font-mono:'JetBrains Mono',monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--tx);font-family:var(--font-body);display:flex;flex-direction:column;height:100dvh}

    /* ─── HEADER ─── */
    header{display:flex;align-items:center;height:var(--header-h);padding:0 14px;background:var(--bg);border-bottom:1px solid var(--bd);gap:10px;flex-shrink:0}
    .bk{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:1px solid var(--bd);border-radius:var(--r-sm);color:var(--ft);font-size:18px;line-height:1;text-decoration:none;flex-shrink:0;transition:background .15s}
    .bk:active{background:var(--sf)}
    .hc{flex:1;text-align:center}
    .ht{font-weight:700;font-size:15px;font-style:italic;color:var(--tx);letter-spacing:.02em;line-height:1.1}
    .hs{font-weight:500;font-size:10px;color:var(--xt);letter-spacing:.08em;margin-top:2px}
    .clogo{background:var(--brand);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 9px;text-align:center;flex-shrink:0;line-height:1.2;box-shadow:0 0 14px rgba(139,0,0,.55),0 0 4px rgba(139,0,0,.9)}
    .cl1{font-weight:800;font-size:15px;color:#fff;letter-spacing:.05em;text-shadow:0 0 10px rgba(255,150,150,.45)}
    .cl2{font-weight:600;font-size:7px;color:rgba(255,255,255,.5);letter-spacing:.22em;text-transform:uppercase;margin-top:2px}

    /* ─── GRID ─── */
    #main{flex:1;display:flex;flex-direction:column;padding:12px 12px 10px;min-height:0;overflow:hidden}
    .grid{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr;gap:8px;min-height:0}

    /* ─── TILES — shared component ─── */
    .tile{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:10px 8px;text-decoration:none;color:var(--tx);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;transition:transform .12s;overflow:hidden;min-height:0}
    .tile:active{transform:scale(.97)}
    .ti{font-size:20px;line-height:1;flex-shrink:0;margin-bottom:14px}
    .tn{font-size:14px;font-weight:800;font-style:italic;letter-spacing:.06em;text-transform:uppercase;line-height:1.1;margin-bottom:8px}
    .td{font-size:10px;color:var(--dm);line-height:1.3}
  </style>
</head>
<body>
<header>
  <a class="bk" href="index.html">←</a>
  <div class="hc"><div class="ht">Tools</div><div class="hs">#436 · TEMPE</div></div>
  <div class="clogo"><div class="cl1">COSTCO</div><div class="cl2">WHOLESALE</div></div>
</header>
<div id="main">
  <div class="grid">
    <a class="tile" style="border-color:#cc1020;box-shadow:0 0 10px rgba(204,16,32,.12)" href="closing-template.html">
      <span class="ti">📋</span>
      <span class="tn">Closing</span>
      <span class="td">Nightly close report</span>
    </a>
    <a class="tile" style="border-color:#e07b00;box-shadow:0 0 10px rgba(224,123,0,.12)" href="retail-cases.html">
      <span class="ti">📦</span>
      <span class="tn">Production</span>
      <span class="td">Cases · Cuts · Shift</span>
    </a>
  </div>
</div>
<script>window.addEventListener('beforeinstallprompt',e=>e.preventDefault())</script>
</body>
</html>
