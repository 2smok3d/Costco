<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Tools — Costco Warehouse</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--sf:#111;--bd:#242424;--tx:#fff;--dm:#ccc;--mt:#888;--r:10px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;height:100dvh}
    
    
    
    
    
    
    
    #main{flex:1;display:flex;flex-direction:column;padding:12px 12px 10px;min-height:0;overflow:hidden}
    .grid{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:8px;min-height:0}
    .tile{background:var(--sf);border:1px solid var(--bd);border-left:4px solid;border-radius:var(--r);padding:14px 13px 10px;text-decoration:none;color:var(--tx);display:flex;flex-direction:column;gap:5px;transition:transform .12s;overflow:hidden;min-height:0}
    .tile:active{transform:scale(.97)}
    .ti{font-size:24px;line-height:1;flex-shrink:0}
    .tn{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;line-height:1.1}
    .td{font-size:12px;color:var(--dm);line-height:1.3;margin-top:auto}
      /* ─── UNIFIED HEADER ─── */
    header{position:relative;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;height:58px;background:#0a0a0a;border-bottom:1px solid #1e1e1e;flex-shrink:0}
    .bk{color:#666;font-family:'JetBrains Mono',monospace;font-size:11px;text-decoration:none;padding:5px 10px;border:1px solid #2a2a2a;border-radius:4px;white-space:nowrap;flex-shrink:0}
    .bk:active{background:#1a1a1a;color:#999}
    .hc{position:absolute;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;min-width:160px}
    .ht{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:#fff;letter-spacing:2px;text-transform:uppercase;line-height:1.1}
    .hs{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;letter-spacing:1.5px;margin-top:2px}
    .clogo{background:#8b0000;border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:3px 8px;text-align:center;flex-shrink:0;line-height:1.2}
    .cl1{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:#fff;letter-spacing:.08em}
    .cl2{font-size:7px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.2em;text-transform:uppercase;margin-top:1px}
  </style>
</head>
<body>
<header>
  <a class="bk" href="index.html">← Back</a>
  <div class="hc"><div class="ht">Tools</div><div class="hs">#436 TEMPE</div></div>
  <div class="clogo"><div class="cl1">COSTCO</div><div class="cl2">WHOLESALE</div></div>
</header>
<div id="main">
  <div class="grid">
    <a class="tile" style="border-left-color:#cc1020" href="closing-template.html">
      <span class="ti">📋</span><span class="tn">Closing Update</span><span class="td">Nightly close report</span>
    </a>
    <a class="tile" style="border-left-color:#e07b00" href="retail-cases.html">
      <span class="ti">📦</span><span class="tn">Retail Case Log</span><span class="td">Daily case counter</span>
    </a>
    <a class="tile" style="border-left-color:#cc0000" href="meat-plu.html">
      <span class="ti">🔢</span><span class="tn">PLU Lookup</span><span class="td">Beef · Pork · Poultry · Seafood</span>
    </a>
    <a class="tile" style="border-left-color:#1d8a7a" href="cut-specs.html">
      <span class="ti">🔪</span><span class="tn">Cut Specs</span><span class="td">Beef · Pork · Lamb · Seafood</span>
    </a>
    <a class="tile" style="border-left-color:#8850c8" href="cut-log.html">
      <span class="ti">📝</span><span class="tn">Cut Log</span><span class="td">Daily cut tracking</span>
    </a>
    <a class="tile" style="border-left-color:#2a7040" href="depts.html">
      <span class="ti">🏪</span><span class="tn">Departments</span><span class="td">Dept reference &amp; AS400</span>
    </a>
  </div>
</div>
<script>window.addEventListener('beforeinstallprompt',e=>e.preventDefault())</script>
</body>
</html>
