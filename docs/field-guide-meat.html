<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#8b0000">
<title>Meat Field Guide — Dept 61</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a; --sf:#111; --sf2:#181818; --bd:#222; --bd2:#1a1a1a;
  --tx:#eaecf2; --mt:#7a8499;
  --red:#cc1020; --red2:#e8192c;
  --r:10px;
  /* Animal colors — tuned for equal visual weight on dark bg */
  --beef-bg:#6e1515;   --beef-tx:#c04040;
  --pork-bg:#8f3060;   --pork-tx:#d06090;
  --lamb-bg:#6e3a28;   --lamb-tx:#b07060;
  --poultry-bg:#705800; --poultry-tx:#c8a800;
  --seafood-bg:#1a5a96; --seafood-tx:#4a9ae0;
  --grinds-bg:#782030; --grinds-tx:#c05060;
  --cryo-bg:#384f66;   --cryo-tx:#7aaac8;
  --cases-bg:#624830;  --cases-tx:#b88850;
  --logs-bg:#404858;   --logs-tx:#9aaab8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);overscroll-behavior:none}
body{font-family:'Barlow',sans-serif;color:var(--tx);font-size:15px;line-height:1.5}

#app{display:flex;flex-direction:column;height:100dvh;width:100%;max-width:640px;margin:0 auto;overflow:hidden}

/* HEADER */
#hdr{flex-shrink:0;background:#0a0a0a;border-bottom:2px solid #1e1e1e;padding:10px 14px 9px;display:flex;align-items:center;gap:10px;z-index:200;position:relative}
#back-btn{display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid #333;border-radius:5px;color:#888;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.06em;padding:5px 9px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .1s}
#back-btn:active{background:rgba(255,255,255,.06)}
#back-btn.hide{display:none}
.badge{background:rgba(80,0,0,.9);border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:4px 9px;text-align:center;flex-shrink:0;line-height:1.2}
.badge-l1{font-size:14px;font-weight:900;color:#fff;letter-spacing:.08em}
.badge-l2{font-size:8px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.18em;text-transform:uppercase;margin-top:1px}
#hdr-title{flex:1;min-width:0}
#page-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#fff;line-height:1}
#page-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.38);letter-spacing:1.5px;margin-top:2px}

/* SEARCH */
#srch-wrap{flex-shrink:0;position:relative;padding:8px 12px;background:#0a0a0a;border-bottom:1px solid #1a1a1a}
#srch-input{width:100%;background:rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.2);border-radius:10px;color:#fff;font-size:16px;padding:9px 36px 9px 38px;outline:none;-webkit-appearance:none;touch-action:manipulation}
#srch-input:focus{border-color:rgba(255,255,255,.55)}
#srch-input::placeholder{color:rgba(255,255,255,.32)}
.si{position:absolute;left:22px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:rgba(255,255,255,.38);pointer-events:none}
#srch-clr{position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.14);border:none;color:#fff;width:20px;height:20px;border-radius:50%;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center}

/* CONTENT */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}

/* VIEWS */
.view{display:none}
.view.active{display:block;animation:fi .12s ease}
@keyframes fi{from{opacity:.4}to{opacity:1}}

/* ── HUB ── */
#v-hub{padding:14px 12px 24px}
.hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hub-tile{background:var(--sf);border:1px solid #282828;border-radius:13px;padding:20px 12px 18px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;touch-action:manipulation;transition:background .12s}
.hub-tile:active{background:#1a1a1a}
.hub-icon{font-size:30px;line-height:1}
.hub-label{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:#fff}
.hub-sub{font-size:11px;color:var(--mt);text-align:center;line-height:1.3}
.hub-tile-sop{grid-column:1/-1;flex-direction:row;justify-content:center;gap:14px;padding:16px}
.hub-tile.plu{border-color:#3a1818}
.hub-tile.as4{border-color:#182030}
.hub-tile.sop{border-color:#182818}

/* ── PLU HUB ── */
#v-plu-hub{padding:12px 12px 24px}
.plu-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.pcat-btn{border:none;border-radius:12px;padding:18px 12px 16px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;touch-action:manipulation;transition:opacity .1s,transform .1s}
.pcat-btn:active{opacity:.8;transform:scale(.97)}
.pcat-icon{font-size:24px;line-height:1}
.pcat-label{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:.05em;text-transform:uppercase}
.pcat-count{font-size:10px;font-weight:700;letter-spacing:.07em;opacity:.75}
.pcat-logs{grid-column:1/-1;flex-direction:row;justify-content:center;gap:14px;padding:14px 16px;margin-top:2px}

/* ── PLU LIST ── */
#v-plu-list{padding-bottom:24px}
.plu-sec-hdr{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:9px 14px 7px;position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid #1a1a1a}
.plu-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #161616;cursor:pointer;touch-action:manipulation;min-height:48px;gap:10px}
.plu-row:active{background:#141414}
.plu-name{font-size:14px;font-weight:600;flex:1;line-height:1.3;color:var(--red)}
.plu-num{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;flex-shrink:0;min-width:52px;text-align:right}

/* Shelf life */
.shelf-wrap{margin:10px 12px}
details.shelf{overflow:hidden}
.shelf-sum{list-style:none;background:var(--sf2);border:1px solid #2a2a2a;border-radius:10px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mt);cursor:pointer;touch-action:manipulation}
.shelf-sum::-webkit-details-marker{display:none}
details.shelf[open] .shelf-sum{border-radius:10px 10px 0 0;border-bottom-color:transparent}
.shev{width:14px;height:14px;color:var(--mt);transition:transform .2s;flex-shrink:0}
details.shelf[open] .shev{transform:rotate(180deg)}
.shelf-body{background:var(--sf);border:1px solid #2a2a2a;border-top:none;border-radius:0 0 10px 10px;padding:6px 13px 10px}
.shelf-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
.shelf-row:last-child{border:none}
.shelf-item{color:var(--tx);flex:1}
.shelf-days{font-size:17px;font-weight:800;color:var(--red2);flex-shrink:0;min-width:34px;text-align:right}

/* Case info */
.case-card{margin:10px 12px;background:var(--sf);border:1px solid #282828;border-radius:10px;padding:12px 14px}
.case-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--mt);margin-bottom:10px}
.case-step{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:13px;line-height:1.4;color:var(--tx)}
.case-n{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--mt);flex-shrink:0;min-width:18px;margin-top:1px}

/* ── AS400 ── */
#v-as400{padding-bottom:24px}
.a4-sec{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:11px 14px 6px;border-bottom:1px solid #1a1a1a;position:sticky;top:0;background:var(--bg);z-index:10}
details.cmd{border-bottom:1px solid #181818;overflow:hidden}
.cmd-sum{list-style:none;padding:11px 14px;cursor:pointer;touch-action:manipulation;display:flex;flex-direction:column;gap:3px}
.cmd-sum::-webkit-details-marker{display:none}
.cmd-sum:active{background:#141414}
.cmd-top{display:flex;align-items:center;gap:8px}
.cbadge{background:var(--red);color:#fff;border-radius:5px;font-size:11px;font-weight:800;padding:2px 7px;flex-shrink:0;letter-spacing:.04em;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.cbadge.rf{background:#1a5a30}
.cmd-name{font-size:13px;font-weight:700;color:var(--tx);flex:1;line-height:1.3}
.cchev{width:14px;height:14px;color:var(--mt);transition:transform .2s;flex-shrink:0}
details.cmd[open] .cchev{transform:rotate(180deg)}
.cmd-desc{font-size:12px;color:var(--mt);line-height:1.4}
.cmd-body{padding:8px 14px 12px;background:#0d0d0d;font-size:12.5px;color:#9ba8bf;line-height:1.6;border-top:1px solid #1a1a1a}
.cmd-body b{color:var(--tx)}
.cmd-body code{background:#1a1a2a;border:1px solid #2a2a3a;border-radius:4px;padding:1px 5px;font-size:11px;font-family:'JetBrains Mono',monospace;color:#7dd3fc}
.cmd-tip{margin-top:7px;padding:6px 10px;background:rgba(245,158,11,.08);border-left:2.5px solid #f59e0b;border-radius:0 5px 5px 0;font-size:12px;color:#d4a843}
.rf-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.rf-table th{text-align:left;color:var(--mt);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 8px;border-bottom:1px solid #222}
.rf-table td{padding:6px 8px;border-bottom:1px solid #1a1a1a;vertical-align:top}
.rf-table tr:last-child td{border:none}
.rf-table td:first-child{font-family:'JetBrains Mono',monospace;font-weight:800;color:#1a8a50;font-size:14px;width:38px}
.rf-table td:last-child{color:var(--tx);font-weight:600}

/* ── SOP HUB ── */
#v-sop-hub{padding:12px 12px 24px}
.sop-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sop-btn{background:var(--sf);border:1px solid #2a2a2a;border-radius:12px;padding:18px 12px 16px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;touch-action:manipulation;transition:background .12s}
.sop-btn:active{background:#1a1a1a}
.sop-icon{font-size:26px;line-height:1}
.sop-label{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;color:#fff;text-align:center}
.sop-sub{font-size:10px;color:var(--mt);text-align:center;line-height:1.3}

/* ── SOP DETAIL ── */
#v-sop-detail{padding-bottom:24px}
.sop-sec{padding:12px 14px;border-bottom:1px solid #181818}
.sop-sec-title{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--mt);margin-bottom:8px}
.sop-step{display:flex;align-items:flex-start;gap:10px;padding:6px 0;font-size:13px;line-height:1.5;border-bottom:1px solid #141414}
.sop-step:last-child{border:none}
.sop-n{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--red);flex-shrink:0;min-width:22px;margin-top:1px}
.sop-body{flex:1;color:var(--tx)}
.sop-body b{color:#fff}
.sop-note{background:rgba(245,158,11,.07);border-left:2.5px solid #f59e0b;border-radius:0 6px 6px 0;padding:8px 12px;font-size:12px;color:#d4a843;margin:8px 0;line-height:1.5}
.sop-warn{background:rgba(204,16,32,.08);border-left:2.5px solid var(--red);border-radius:0 6px 6px 0;padding:8px 12px;font-size:12px;color:#e85060;margin:8px 0;line-height:1.5}

/* ── SEARCH ── */
#v-search{padding:8px 12px 24px}
.sr-hdr{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--mt);margin:14px 0 6px}
.sr-card{background:var(--sf);border:1px solid #222;border-radius:9px;padding:11px 13px;margin-bottom:6px;cursor:pointer;touch-action:manipulation}
.sr-card:active{background:#1a1a1a}
.sr-plu{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:800;line-height:1.1}
.sr-name{font-size:14px;font-weight:600;color:var(--red);margin-top:2px}
.sr-sub{font-size:11px;color:var(--mt);margin-top:2px}
.sr-cbadge{display:inline-block;background:var(--red);color:#fff;border-radius:4px;font-size:11px;font-weight:700;padding:1px 7px;margin-right:6px;font-family:'JetBrains Mono',monospace}
.sr-desc{font-size:12px;color:var(--mt);margin-top:3px;line-height:1.4}
mark{background:rgba(255,210,0,.3);color:#fff;border-radius:2px;padding:0 1px}
.no-res{text-align:center;padding:44px 20px;color:var(--mt)}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(6px);background:#22c55e;color:#fff;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:600;opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#282828;border-radius:2px}
</style>
</head>

<!-- PLU HUB -->

</div>

<!-- SEARCH RESULTS -->
<div id="v-search" class="view">

</div>

</div><!-- #content -->
</div><!-- #app -->
<div id="toast"></div>

});

}

// ── VIEW STATE ────────────────────────────────────────────────────────────────
const STACK=[{id:'hub',title:'Meat Field Guide',sub:'DEPT 61 · TEMPE'}];

function nav(id,title,sub){
  const el=document.getElementById('v-'+id);
  if(!el)return;
  STACK.push({id,title,sub});
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-title').textContent=title||'';
  document.getElementById('page-sub').textContent=sub||'';
  document.getElementById('back-btn').classList.toggle('hide',STACK.length<=1);
  document.getElementById('content').scrollTop=0;
}

function goBack(){
  if(STACK.length<=1)return;
  STACK.pop();
  const prev=STACK[STACK.length-1];
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-'+prev.id).classList.add('active');
  document.getElementById('page-title').textContent=prev.title||'';
  document.getElementById('page-sub').textContent=prev.sub||'';
  document.getElementById('back-btn').classList.toggle('hide',STACK.length<=1);
  document.getElementById('content').scrollTop=0;
}

// ── RENDER PLU LIST ───────────────────────────────────────────────────────────
function openPLU(key){
  const cat=CATS[key];
  if(!cat)return;
  let html='';
  if(cat.shelfLife) html+=SHELF_HTML;
  if(cat.caseInfo) html+=CASE_HTML;

  cat.sections.forEach(sec=>{
    const animalKey=sec.animal||((['beef','pork','lamb','poultry','seafood'].includes(key))?key:null);
    const clr=animalKey&&C[animalKey]?C[animalKey]:null;
    const titleTx=clr?clr.tx:'#7a8499';
    const titleBd=clr?clr.bg+'44':'#2a2a2a';

    if(sec.note){
      html+=`<div class="plu-sec-hdr" style="color:${titleTx};border-bottom-color:${titleBd}">${sec.title}</div>`;
      html+=`<div style="padding:10px 14px;font-size:12px;color:var(--mt);background:#0f0f0f">${sec.note}</div>`;
      return;
    }

    html+=`<div class="plu-sec-hdr" style="color:${titleTx};border-bottom-color:${titleBd}">${sec.title}</div>`;
    sec.items.forEach(item=>{
      const [name,plu,overrideAnimal]=item;
      const rowAnimal=overrideAnimal||(sec.animal||animalKey);
      const numClr=rowAnimal&&C[rowAnimal]?C[rowAnimal].tx:'#e8192c';
      if(plu===null){
        html+=`<div class="plu-row" style="opacity:.55;cursor:default">
          <div class="plu-name">${name}</div>
          <div class="plu-num" style="font-size:11px;color:var(--mt)">verify</div>
        </div>`;
      } else {
        html+=`<div class="plu-row" onclick="tapPLU(${plu})">
          <div class="plu-name">${name}</div>
          <div class="plu-num" style="color:${numClr}">${plu}</div>
        </div>`;
      }
    });
  });

  document.getElementById('plu-list-inner').innerHTML=html;
  nav('plu-list',cat.label+' PLUs',cat.label.toUpperCase());
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function sc(text,q){
  if(!text||!q)return 0;
  const t=text.toLowerCase(),qL=q.toLowerCase();
  if(t===qL)return 100;
  if(t.startsWith(qL))return 88;
  if(t.includes(qL))return 72;
  return 0;
}
function hl(text,q){
  if(!q)return String(text||'');
  return String(text).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}

function doSearch(raw){
  const q=raw.trim();
  if(!q){clearSearch();return;}
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-search').classList.add('active');
  const pluRes=[],cmdRes=[];
  const isNum=/^\d+$/.test(q);
  Object.entries(CATS).forEach(([key,cat])=>{
    cat.sections.forEach(sec=>{
      const ak=sec.animal||((['beef','pork','lamb','poultry','seafood'].includes(key))?key:null);
      sec.items.forEach(item=>{
        const [name,plu,overAnimal]=item;
        if(plu===null)return;
        const ps=String(plu);
        const rowAnimal=overAnimal||ak;
        let s=0;
        if(isNum){if(ps===q)s=300;else if(ps.startsWith(q))s=200;else if(ps.includes(q))s=100;}
        s=Math.max(s,sc(name,q),sc(ps,q),sc(cat.label,q));
        if(s>0)pluRes.push({name,plu,catLabel:cat.label,rowAnimal,s});
      });
    });
  });
  pluRes.sort((a,b)=>b.s-a.s);
  CMDS.forEach(c=>{
    const s=Math.max(sc(c.cmd,q),sc(c.name,q),sc(c.desc||'',q));
    if(s>0)cmdRes.push({...c,s});
  });
  cmdRes.sort((a,b)=>b.s-a.s);
  let html='';
  if(pluRes.length){
    html+=`<div class="sr-hdr">PLU Numbers (${pluRes.length})</div>`;
    pluRes.slice(0,20).forEach(r=>{
      const numClr=r.rowAnimal&&C[r.rowAnimal]?C[r.rowAnimal].tx:'#e8192c';
      html+=`<div class="sr-card" onclick="tapPLU(${r.plu})">
        <div class="sr-plu" style="color:${numClr}">${hl(String(r.plu),q)}</div>
        <div class="sr-name">${hl(r.name,q)}</div>
        <div class="sr-sub">${hl(r.catLabel,q)}</div>
      </div>`;
    });
  }
  if(cmdRes.length){
    html+=`<div class="sr-hdr">AS400 Commands (${cmdRes.length})</div>`;
    cmdRes.slice(0,10).forEach(r=>{
      html+=`<div class="sr-card">
        <div><span class="sr-cbadge">${hl(r.cmd,q)}</span><span style="font-weight:700">${hl(r.name,q)}</span></div>
        <div class="sr-desc">${hl(r.desc,q)}</div>
      </div>`;
    });
  }
  if(!html)html=`<div class="no-res">No results for "<b>${q}</b>"</div>`;
  document.getElementById('search-inner').innerHTML=html;
}

function clearSearch(){
  document.getElementById('srch-input').value='';
  document.getElementById('srch-clr').style.display='none';
  const cur=STACK[STACK.length-1];
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-'+cur.id).classList.add('active');
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function tapPLU(plu){
  if(navigator.vibrate)navigator.vibrate(30);
  if(navigator.clipboard)navigator.clipboard.writeText(String(plu)).catch(()=>{});
  showToast('PLU '+plu+' copied!');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

// ── VIEWPORT ──────────────────────────────────────────────────────────────────
let _vh=0;
function applyVH(){
  const h=window.visualViewport?window.visualViewport.height:window.innerHeight;
  if(!_vh)_vh=h;
  document.getElementById('app').style.height=((_vh-h>150)?h:_vh)+'px';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  renderPLUHub();
  renderAS400();
  renderSOPHub();

  const inp=document.getElementById('srch-input');
  const clr=document.getElementById('srch-clr');
  let st;
  inp.addEventListener('input',()=>{
    const v=inp.value;
    clr.style.display=v?'flex':'none';
    clearTimeout(st);
    st=setTimeout(()=>doSearch(v),v.length<3?0:50);
  });
  inp.addEventListener('blur',()=>{
    setTimeout(()=>{if(_vh)document.getElementById('app').style.height=_vh+'px';},100);
  });

  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',()=>{if(document.activeElement!==inp)applyVH();});
  }
  window.addEventListener('resize',()=>{if(document.activeElement!==inp)applyVH();});
  applyVH();
  window.addEventListener('beforeinstallprompt',e=>e.preventDefault());

  if('serviceWorker' in navigator){
    const sw=`const C='mg-v1';self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(caches.open(C).then(c=>c.match(e.request).then(h=>{const f=fetch(e.request).then(r=>{c.put(e.request,r.clone());return r}).catch(()=>h);return h||f}))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'./'}).catch(()=>{});
  }
});
</script>
