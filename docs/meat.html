<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Meat — Dept 61</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --text: #ffffff;
      --text-dim: #aaa;
      --red: #cc0000;
      --amber: #e07b00;
      --teal: #007a6e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding-bottom: 60px; }

    header {
      background: var(--surface);
      border-bottom: 3px solid var(--red);
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .back-btn {
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      text-decoration: none;
      letter-spacing: 1px;
      padding: 6px 10px;
      border: 1px solid #333;
      border-radius: 4px;
      white-space: nowrap;
    }
    .header-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .header-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .container { max-width: 480px; margin: 0 auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 10px; }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #333;
      text-align: center;
      padding: 4px 0;
    }

    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      border-radius: 8px;
      padding: 20px 18px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 90px;
      transition: transform 0.12s;
      position: relative;
    }
    .tool-card:active { transform: scale(0.97); }
    .tool-card.amber { border-left-color: var(--amber); }
    .tool-card.teal  { border-left-color: var(--teal); }
    .tool-card.red   { border-left-color: var(--red); }
    .tool-card.dim   { opacity: 0.5; }

    .card-icon { font-size: 32px; flex-shrink: 0; }
    .card-text { display: flex; flex-direction: column; gap: 4px; }
    .card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .card-desc { font-size: 13px; color: var(--text-dim); line-height: 1.4; }
    .card-tag {
      position: absolute;
      top: 10px; right: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #444;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<header>
  <a class="back-btn" href="index.html">← Hub</a>
  <div>
    <div class="header-title">🥩 Meat</div>
    <div class="header-sub">DEPT 61 &nbsp;·&nbsp; TEMPE</div>
  </div>
</header>

<div class="container">
  <div class="section-label">— Tools —</div>

  <a class="tool-card amber" href="closing-template.html">
    <span class="card-icon">📋</span>
    <div class="card-text">
      <span class="card-name">Closing Template</span>
      <span class="card-desc">Fill & text — nightly close report</span>
    </div>
  </a>

  <a class="tool-card red" href="meat-plu.html">
    <span class="card-icon">🔢</span>
    <div class="card-text">
      <span class="card-name">PLU Lookup</span>
      <span class="card-desc">Beef, pork, poultry, seafood — tap to copy</span>
    </div>
  </a>

  <a class="tool-card teal" href="cut-specs.html">
    <span class="card-icon">🔪</span>
    <div class="card-text">
      <span class="card-name">Cut Specs</span>
      <span class="card-desc">Beef & seafood — by grade, full steps</span>
    </div>
  </a>

</div>

</body>
</html>
