<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Meat — Dept 61</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--sf:#111;--bd:#1e1e1e;--tx:#fff;--dm:#ccc;--mt:#888;--r:10px;
      --red:#cc0000;--amber:#e07b00;--teal:#007a6e}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--tx);font-family:'Montserrat',sans-serif;display:flex;flex-direction:column;height:100dvh}
    #main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .container{max-width:480px;margin:0 auto;padding:16px 12px;display:flex;flex-direction:column;gap:10px}

    .section-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #333;
      text-align: center;
      padding: 4px 0;
    }

    .tool-card{background:var(--sf);border:1px solid var(--bd);
      border-left: 4px solid var(--bd);
      border-radius: 8px;
      padding: 20px 18px;
      text-decoration: none;
      color: var(--tx);
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 90px;
      transition: transform 0.12s;
      position: relative;
    }
    .tool-card:active { transform: scale(0.97); }
    .tool-card.amber { border-left-color: var(--amber); }
    .tool-card.teal  { border-left-color: var(--teal); }
    .tool-card.red   { border-left-color: var(--red); }
    .tool-card.dim   { opacity: 0.5; }

    .card-icon { font-size: 32px; flex-shrink: 0; }
    .card-text { display: flex; flex-direction: column; gap: 4px; }
    .card-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .card-desc{font-size:13px;color:var(--dm);line-height:1.4}
    .card-tag {
      position: absolute;
      top: 10px; right: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #444;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
      
    
    
    /* ─── UNIFIED HEADER ─── */
    header{display:flex;align-items:center;height:58px;padding:0 14px;background:#0a0a0a;border-bottom:1px solid #2a2a2a;gap:10px;flex-shrink:0}
    .bk{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:1px solid #2a2a2a;border-radius:6px;color:#666;font-size:18px;line-height:1;text-decoration:none;flex-shrink:0;transition:background .15s}
    .bk:active{background:#141414}
    .hc{flex:1;text-align:center;pointer-events:none}
    .ht{font-family:'Montserrat',sans-serif;font-weight:700;font-size:15px;font-style:italic;color:#fff;letter-spacing:.02em;line-height:1.1}
    .hs{font-family:'Montserrat',sans-serif;font-weight:500;font-size:10px;color:#444;letter-spacing:.08em;margin-top:2px}
    .clogo{background:#8b0000;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 9px;text-align:center;flex-shrink:0;line-height:1.2;box-shadow:0 0 14px rgba(139,0,0,.55),0 0 4px rgba(139,0,0,.9)}
    .cl1{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;color:#fff;letter-spacing:.05em;text-shadow:0 0 10px rgba(255,150,150,.45)}
    .cl2{font-family:'Montserrat',sans-serif;font-weight:600;font-size:7px;color:rgba(255,255,255,.5);letter-spacing:.22em;text-transform:uppercase;margin-top:2px}
  </style>
</head>
<body>

<header>
  <a class="bk" href="depts.html">←</a>
  <div class="hc"><div class="ht">Meat</div><div class="hs">Dept 61 · #436</div></div>
  <div class="clogo"><div class="cl1">COSTCO</div><div class="cl2">WHOLESALE</div></div>
</header>

<div id="main"><div class="container">
  <div class="section-label">— Tools —</div>

  <a class="tool-card amber" href="closing-template.html">
    <span class="card-icon">📋</span>
    <div class="card-text">
      <span class="card-name">Closing Template</span>
      <span class="card-desc">Fill & text — nightly close report</span>
    </div>
  </a>

  <a class="tool-card red" href="meat-plu.html">
    <span class="card-icon">🔢</span>
    <div class="card-text">
      <span class="card-name">PLU Lookup</span>
      <span class="card-desc">Beef, pork, poultry, seafood — tap to copy</span>
    </div>
  </a>

  <a class="tool-card" style="border-left-color:#6a5a8a" href="tracker.html">
    <span class="card-icon">📊</span>
    <div class="card-text">
      <span class="card-name">Production Tracker</span>
      <span class="card-desc">Poultry · Beef · Pork · Lamb · Grinds</span>
    </div>
  </a>

  <a class="tool-card teal" href="cut-specs.html">
    <span class="card-icon">🔪</span>
    <div class="card-text">
      <span class="card-name">Cut Specs</span>
      <span class="card-desc">Beef & seafood — by grade, full steps</span>
    </div>
  </a>

</div></div>

</body>
</html>
