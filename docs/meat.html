<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Meat — Dept 61</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --text: #ffffff;
      --text-dim: #aaa;
      --red: #cc0000;
      --amber: #e07b00;
      --teal: #007a6e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding-bottom: 60px; }

    header { background: #cc1020; padding: 11px 14px 9px; flex-shrink: 0; display: flex; align-items: center; gap: 12px; }
    .back-btn {
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      text-decoration: none;
      letter-spacing: 1px;
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px;
      white-space: nowrap;
    }
    .header-title { color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .header-sub { color: rgba(255,255,255,.55);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .container { max-width: 480px; margin: 0 auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 10px; }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #333;
      text-align: center;
      padding: 4px 0;
    }

    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      border-radius: 8px;
      padding: 20px 18px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 90px;
      transition: transform 0.12s;
      position: relative;
    }
    .tool-card:active { transform: scale(0.97); }
    .tool-card.amber { border-left-color: var(--amber); }
    .tool-card.teal  { border-left-color: var(--teal); }
    .tool-card.red   { border-left-color: var(--red); }
    .tool-card.dim   { opacity: 0.5; }

    .card-icon { font-size: 32px; flex-shrink: 0; }
    .card-text { display: flex; flex-direction: column; gap: 4px; }
    .card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .card-desc { font-size: 13px; color: var(--text-dim); line-height: 1.4; }
    .card-tag {
      position: absolute;
      top: 10px; right: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: #444;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
      
    
    
      /* ─── UNIFIED HEADER ─── */
    header{position:relative;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;height:58px;background:#0a0a0a;border-bottom:1px solid #1e1e1e;flex-shrink:0}
    .bk{color:#666;font-family:'JetBrains Mono',monospace;font-size:11px;text-decoration:none;padding:5px 10px;border:1px solid #2a2a2a;border-radius:4px;white-space:nowrap;flex-shrink:0}
    .bk:active{background:#1a1a1a;color:#999}
    .hc{position:absolute;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;min-width:160px}
    .ht{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:#fff;letter-spacing:2px;text-transform:uppercase;line-height:1.1}
    .hs{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;letter-spacing:1.5px;margin-top:2px}
    .clogo{background:#8b0000;border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:3px 8px;text-align:center;flex-shrink:0;line-height:1.2}
    .cl1{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:#fff;letter-spacing:.08em}
    .cl2{font-size:7px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.2em;text-transform:uppercase;margin-top:1px}
  </style>
</head>
<body>

<header>
  <a class="bk" href="depts.html">← Back</a>
  <div class="hc"><div class="ht">Meat</div><div class="hs">#436 TEMPE</div></div>
  <div class="clogo"><div class="cl1">COSTCO</div><div class="cl2">WHOLESALE</div></div>
</header>

<div class="container">
  <div class="section-label">— Tools —</div>

  <a class="tool-card amber" href="closing-template.html">
    <span class="card-icon">📋</span>
    <div class="card-text">
      <span class="card-name">Closing Template</span>
      <span class="card-desc">Fill & text — nightly close report</span>
    </div>
  </a>

  <a class="tool-card red" href="meat-plu.html">
    <span class="card-icon">🔢</span>
    <div class="card-text">
      <span class="card-name">PLU Lookup</span>
      <span class="card-desc">Beef, pork, poultry, seafood — tap to copy</span>
    </div>
  </a>

  <a class="tool-card" style="border-left-color:#6a5a8a" href="tracker.html">
    <span class="card-icon">📊</span>
    <div class="card-text">
      <span class="card-name">Production Tracker</span>
      <span class="card-desc">Poultry · Beef · Pork · Lamb · Grinds</span>
    </div>
  </a>

  <a class="tool-card teal" href="cut-specs.html">
    <span class="card-icon">🔪</span>
    <div class="card-text">
      <span class="card-name">Cut Specs</span>
      <span class="card-desc">Beef & seafood — by grade, full steps</span>
    </div>
  </a>

</div>

</body>
</html>
