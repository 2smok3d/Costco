<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Cut Specs — Dept 61</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:#252525;--text:#fff;--dim:#aaa;--muted:#999;--red:#cc0000;--prime:#c8960c;--choice:#4a7fbf;--wagyu:#9b4dca;--teal:#007a6e;--r:8px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;display:flex;flex-direction:column;height:100dvh}
    /* ─── UNIFIED HEADER ─── */
    header{display:flex;align-items:center;height:58px;padding:0 14px;background:#0a0a0a;border-bottom:1px solid #2a2a2a;gap:10px;flex-shrink:0}
    .bk{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:1px solid #2a2a2a;border-radius:6px;color:#666;font-size:18px;line-height:1;text-decoration:none;flex-shrink:0;transition:background .15s}
    .bk:active{background:#141414}
    .hc{flex:1;text-align:center;pointer-events:none}
    .ht{font-family:'Montserrat',sans-serif;font-weight:700;font-size:15px;font-style:italic;color:#fff;letter-spacing:.02em;line-height:1.1}
    .hs{font-family:'Montserrat',sans-serif;font-weight:500;font-size:10px;color:#444;letter-spacing:.08em;margin-top:2px}
    .clogo{background:#8b0000;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 9px;text-align:center;flex-shrink:0;line-height:1.2;box-shadow:0 0 14px rgba(139,0,0,.55),0 0 4px rgba(139,0,0,.9)}
    .cl1{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;color:#fff;letter-spacing:.05em;text-shadow:0 0 10px rgba(255,150,150,.45)}
    .cl2{font-family:'Montserrat',sans-serif;font-weight:600;font-size:7px;color:rgba(255,255,255,.5);letter-spacing:.22em;text-transform:uppercase;margin-top:2px}
    .hsub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px}
    .search-wrap{background:var(--surface);padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
    #search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:16px;padding:9px 12px;outline:none}
    #search::placeholder{color:var(--muted)}
    #search:focus{border-color:var(--red)}
    .sp-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
    .sp-tab{font-size:15px;flex:1;padding:10px 6px;border:none;background:none;color:var(--dim);font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s}
    .sp-tab.active{color:var(--text);border-bottom-color:var(--red)}
    .g-bar{display:flex;gap:6px;padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
    .g-bar::-webkit-scrollbar{display:none}
    .g-btn{font-size:13px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--dim);font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .15s}
    .g-btn.active.all{background:#333;color:var(--text);border-color:var(--muted)}
    .g-btn.active.prime{background:var(--prime);color:#000;border-color:var(--prime)}
    .g-btn.active.choice{background:var(--choice);color:#fff;border-color:var(--choice)}
    .g-btn.active.wagyu{background:var(--wagyu);color:#fff;border-color:var(--wagyu)}
    .g-btn.active.other{background:var(--teal);color:#fff;border-color:var(--teal)}
    #content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 30px}
    .cut-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;padding:0 2px 8px}
    .cut-card{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
    .cut-card.prime{border-left-color:var(--prime)}
    .cut-card.choice{border-left-color:var(--choice)}
    .cut-card.wagyu{border-left-color:var(--wagyu)}
    .cut-card.other{border-left-color:var(--teal)}
    .cut-header{padding:12px 14px 10px;cursor:pointer;display:flex;flex-direction:column;gap:6px}
    .cut-header:active{background:rgba(255,255,255,.03)}
    .cut-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .cut-name{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:800;letter-spacing:.5px;line-height:1.2}
    .cut-toggle{color:var(--muted);font-size:14px;flex-shrink:0;padding-top:1px;transition:transform .2s}
    .cut-card.open .cut-toggle{transform:rotate(180deg)}
    .cut-ids{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.5px}
    .plu{color:var(--red);font-weight:600}
    .cut-pills{display:flex;flex-wrap:wrap;gap:5px}
    .pill{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.5px;padding:3px 8px;border-radius:4px;white-space:nowrap}
    .pill.grade-prime{background:rgba(200,150,12,.15);color:var(--prime);border:1px solid rgba(200,150,12,.3)}
    .pill.grade-choice{background:rgba(74,127,191,.15);color:#7aaff5;border:1px solid rgba(74,127,191,.3)}
    .pill.grade-wagyu{background:rgba(155,77,202,.15);color:#c47eff;border:1px solid rgba(155,77,202,.3)}
    .pill.grade-other{background:rgba(0,122,110,.15);color:#4dcfc0;border:1px solid rgba(0,122,110,.3)}
    .pill.spec{background:rgba(255,255,255,.05);color:var(--dim);border:1px solid var(--border)}
    .pill.warn{background:rgba(255,80,80,.1);color:#ff8080;border:1px solid rgba(255,80,80,.25)}
    .cut-body{display:none;border-top:1px solid var(--border)}
    .cut-card.open .cut-body{display:block}
    /* IMAGE GALLERY — scrollable with snap + counter */
    .img-wrap{position:relative;padding:10px 14px 6px}
    .img-gallery{display:flex;gap:8px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch}
    .img-gallery::-webkit-scrollbar{display:none}
    .img-thumb{flex-shrink:0;width:calc(100% - 28px);max-width:360px;height:220px;object-fit:contain;border-radius:6px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;scroll-snap-align:start;transition:opacity .12s}
    .img-thumb:active{opacity:.8}
    .img-counter{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);text-align:right;padding:2px 0 0;letter-spacing:1px}
    .img-hint{font-family:'JetBrains Mono',monospace;font-size:9px;color:#555;text-align:center;padding:2px 0 0;letter-spacing:.5px}
    /* STEPS */
    .cut-steps{padding:0 14px 14px}
    .steps-list{list-style:none;display:flex;flex-direction:column;gap:6px;padding-top:2px}
    .steps-list li{display:flex;gap:10px;font-size:14px;line-height:1.5;color:var(--dim)}
    .snum{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--muted);flex-shrink:0;padding-top:2px;min-width:18px}
    .no-spec-note{padding:12px 14px;font-size:13px;color:var(--muted);font-style:italic}
    .empty{text-align:center;padding:48px 20px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:1px}
  </style>
</head>

let currentSp = "beef", currentG = "all", query = "";

function buildCard(cut) {
  const pillsHTML = [
    `<span class="pill grade-${cut.grade}">${cut.grade === 'wagyu' ? 'A5 WAGYU' : cut.grade.toUpperCase()}</span>`,
    ...cut.pills.map(p => `<span class="pill spec">${p}</span>`),
    ...cut.warn.map(w => `<span class="pill warn">⚠ ${w}</span>`)
  ].join("");

  const stepsHTML = cut.steps.map((s,i) =>
    `<li><span class="snum">${i+1}.</span><span>${s}</span></li>`
  ).join("");

  const noSpec = cut.grade === 'wagyu' && !cut.slug;
  const galHTML = cut.imgs > 0 ? `<div class="img-wrap">
      <div class="img-gallery" data-slug="${cut.slug}" data-imgs="${cut.imgs}"></div>
      <div class="img-counter">Tap photo to open full size</div>
      <div class="img-hint">← SCROLL →</div>
    </div>` : "";
  const noSpecNote = noSpec ? `<div class="no-spec-note">⚠ No official Costco spec sheet available — PLU/Item# data only</div>` : "";

  return `
    <div class="cut-card ${cut.grade}">
      <div class="cut-header" onclick="toggle(this.closest('.cut-card'))">
        <div class="cut-top">
          <div class="cut-name">${cut.name}</div>
          <div class="cut-toggle">▼</div>
        </div>
        <div class="cut-ids"><span class="plu">PLU #${cut.plu}</span> &nbsp;·&nbsp; Item #${cut.item}</div>
        <div class="cut-pills">${pillsHTML}</div>
      </div>
      <div class="cut-body">
        ${galHTML}
        ${noSpecNote}
        <div class="cut-steps"><ol class="steps-list">${stepsHTML}</ol></div>
      </div>
    </div>`;
}

function render() {
  const gradeOrder = ['choice','prime','wagyu','other'];
  const pluNum = p => (p === '—' || p === '' ? 99999 : parseInt(p));
  function getSorted(data, filterG) {
    if (filterG === 'all') {
      return gradeOrder.flatMap(g => data.filter(c => c.grade === g).sort((a,b) => pluNum(a.plu) - pluNum(b.plu)));
    }
    return data.filter(c => c.grade === filterG).sort((a,b) => pluNum(a.plu) - pluNum(b.plu));
  }
  const list = document.getElementById("cut-list");
  const empty = document.getElementById("empty");
  const count = document.getElementById("cut-count");
  const data = CUTS[currentSp] || [];
  const q = query.toLowerCase();
  let visible = 0, html = "";

  const sorted = getSorted(data, currentG);
  sorted.forEach(cut => {
    const matchQ = !q || cut.name.toLowerCase().includes(q) || cut.plu.includes(q) || cut.item.includes(q) || cut.pills.some(p => p.toLowerCase().includes(q));
    if (!matchQ) return;
    visible++;
    html += buildCard(cut);
  });

  list.innerHTML = html;
  count.textContent = `${visible} cut${visible !== 1 ? "s" : ""}`;
  empty.style.display = visible === 0 ? "block" : "none";
}

function loadGallery(card) {
  const wrap = card.querySelector(".img-wrap");
  if (!wrap || wrap.dataset.loaded) return;
  wrap.dataset.loaded = "1";
  const gal = wrap.querySelector(".img-gallery");
  const slug = gal.dataset.slug;
  const n = parseInt(gal.dataset.imgs);
  let loaded = 0;
  const counter = wrap.querySelector(".img-counter");
  const hint = wrap.querySelector(".img-hint");

  for (let i = 1; i <= n; i++) {
    const img = document.createElement("img");
    img.className = "img-thumb";
    img.src = `${IMG}${slug}_${i}.jpg`;
    img.alt = `Step ${i}`;
    img.onclick = () => window.open(img.src, "_blank");
    img.onload = () => { loaded++; if(counter) counter.textContent = `${loaded} photo${loaded!==1?'s':''}` };
    img.onerror = () => { img.remove(); };
    gal.appendChild(img);
  }

  // Update counter on scroll
  gal.addEventListener('scroll', () => {
    const imgs = gal.querySelectorAll('.img-thumb');
    const idx = Math.round(gal.scrollLeft / gal.offsetWidth);
    if (counter && imgs.length) counter.textContent = `${idx+1} / ${imgs.length}`;
  }, {passive:true});
}

function toggle(card) {
  card.classList.toggle("open");
  if (card.classList.contains("open")) loadGallery(card);
}

document.querySelectorAll(".sp-tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".sp-tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    currentSp = t.dataset.sp;
    currentG = "all";
    document.querySelectorAll(".g-btn").forEach(b => b.classList.remove("active"));
    document.querySelector(".g-btn.all").classList.add("active");
    // Hide grade bar for non-beef species
    const noGrade = ['seafood','pork','lamb'];
    document.getElementById('g-bar').style.display = noGrade.includes(currentSp) ? 'none' : 'flex';
    render();
  });
});

document.querySelectorAll(".g-btn").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".g-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    currentG = b.dataset.g;
    render();
  });
});

document.getElementById("search").addEventListener("input", e => {
  query = e.target.value;
  render();
});

render();
