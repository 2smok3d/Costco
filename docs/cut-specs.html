<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Cut Specs — Dept 61</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #252525;
      --text: #ffffff;
      --text-dim: #aaa;
      --text-muted: #555;
      --red: #cc0000;
      --prime: #c8960c;
      --choice: #4a7fbf;
      --teal: #007a6e;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; display: flex; flex-direction: column; height: 100dvh; }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 3px solid var(--red);
      padding: 10px 14px 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-decoration: none;
      letter-spacing: 1px;
      padding: 5px 9px;
      border: 1px solid #333;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .header-info { flex: 1; min-width: 0; }
    .header-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .header-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* SEARCH */
    .search-wrap {
      background: var(--surface);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 16px;
      padding: 9px 12px;
      outline: none;
    }
    #search::placeholder { color: var(--text-muted); }
    #search:focus { border-color: var(--red); }

    /* SPECIES TABS */
    .species-bar {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .species-bar::-webkit-scrollbar { display: none; }
    .sp-tab {
      flex: 1;
      padding: 10px 6px;
      border: none;
      background: none;
      color: var(--text-dim);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: all .15s;
    }
    .sp-tab.active { color: var(--text); border-bottom-color: var(--red); }

    /* GRADE TABS */
    .grade-bar {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .grade-bar::-webkit-scrollbar { display: none; }
    .g-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-dim);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }
    .g-btn.active.all   { background: #333; color: var(--text); border-color: #555; }
    .g-btn.active.prime { background: var(--prime); color: #000; border-color: var(--prime); }
    .g-btn.active.choice { background: var(--choice); color: #fff; border-color: var(--choice); }
    .g-btn.active.other { background: var(--teal); color: #fff; border-color: var(--teal); }

    /* SCROLL CONTENT */
    #content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 12px 30px; }

    /* CUT COUNT */
    .cut-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      padding: 0 2px 8px;
    }

    /* CUT CARD */
    .cut-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .cut-card.prime  { border-left-color: var(--prime); }
    .cut-card.choice { border-left-color: var(--choice); }
    .cut-card.other  { border-left-color: var(--teal); }
    .cut-card.hidden { display: none; }

    .cut-header {
      padding: 12px 14px 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .cut-header:active { background: rgba(255,255,255,.03); }

    .cut-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .cut-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: .5px;
      line-height: 1.2;
    }
    .cut-toggle {
      color: var(--text-muted);
      font-size: 14px;
      flex-shrink: 0;
      padding-top: 1px;
      transition: transform .2s;
    }
    .cut-card.open .cut-toggle { transform: rotate(180deg); }

    .cut-ids {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: .5px;
    }
    .plu { color: var(--red); font-weight: 600; }

    .cut-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .5px;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .pill.grade-prime  { background: rgba(200,150,12,.15); color: var(--prime); border: 1px solid rgba(200,150,12,.3); }
    .pill.grade-choice { background: rgba(74,127,191,.15); color: #7aaff5; border: 1px solid rgba(74,127,191,.3); }
    .pill.spec         { background: rgba(255,255,255,.05); color: var(--text-dim); border: 1px solid var(--border); }
    .pill.warn         { background: rgba(255,80,80,.1); color: #ff8080; border: 1px solid rgba(255,80,80,.25); }

    /* STEPS */
    .cut-steps {
      display: none;
      padding: 0 14px 14px;
      border-top: 1px solid var(--border);
    }
    .cut-card.open .cut-steps { display: block; }
    .steps-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-top: 12px;
    }
    .steps-list li {
      display: flex;
      gap: 10px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-dim);
    }
    .step-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      flex-shrink: 0;
      padding-top: 2px;
      min-width: 18px;
    }

    /* EMPTY */
    .empty {
      text-align: center;
      padding: 48px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
  </style>
</head>

let currentSpecies = "beef";
let currentGrade   = "all";
let searchQuery    = "";

function render() {
  const list  = document.getElementById("cut-list");
  const empty = document.getElementById("empty");
  const count = document.getElementById("cut-count");
  const data  = CUTS[currentSpecies] || [];
  const q     = searchQuery.toLowerCase();

  let visible = 0;
  const cards = list.querySelectorAll(".cut-card");

  // Remove old cards
  list.innerHTML = "";

  data.forEach((cut, i) => {
    const matchGrade  = currentGrade === "all" || cut.grade === currentGrade;
    const matchSearch = !q || cut.name.toLowerCase().includes(q)
                            || cut.plu.includes(q)
                            || cut.item.includes(q)
                            || cut.pills.some(p => p.toLowerCase().includes(q));
    if (!matchGrade || !matchSearch) return;

    visible++;
    const card = document.createElement("div");
    card.className = `cut-card ${cut.grade}`;

    const pillsHTML = [
      `<span class="pill grade-${cut.grade}">${cut.grade.toUpperCase()}</span>`,
      ...cut.pills.map(p => `<span class="pill spec">${p}</span>`),
      ...cut.warn.map(w => `<span class="pill warn">⚠ ${w}</span>`)
    ].join("");

    const stepsHTML = cut.steps.map((s, n) =>
      `<li><span class="step-num">${n+1}.</span><span>${s}</span></li>`
    ).join("");

    card.innerHTML = `
      <div class="cut-header" onclick="toggle(this.closest('.cut-card'))">
        <div class="cut-top">
          <div class="cut-name">${cut.name}</div>
          <div class="cut-toggle">▼</div>
        </div>
        <div class="cut-ids">
          <span class="plu">PLU #${cut.plu}</span> &nbsp;·&nbsp; Item #${cut.item}
        </div>
        <div class="cut-pills">${pillsHTML}</div>
      </div>
      <div class="cut-steps">
        <ol class="steps-list">${stepsHTML}</ol>
      </div>
    `;

    list.appendChild(card);
  });

  count.textContent = `${visible} cut${visible !== 1 ? "s" : ""}`;
  empty.style.display = visible === 0 ? "block" : "none";
}

function toggle(card) {
  card.classList.toggle("open");
}

// Species tabs
document.querySelectorAll(".sp-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".sp-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentSpecies = tab.dataset.sp;
    currentGrade   = "all";
    document.querySelectorAll(".g-btn").forEach(b => b.classList.remove("active"));
    document.querySelector(".g-btn.all").classList.add("active");
    render();
  });
});

// Grade tabs
document.querySelectorAll(".g-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".g-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentGrade = btn.dataset.g;
    render();
  });
});

// Search
document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  render();
});

render();
</script>
