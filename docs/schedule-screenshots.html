<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Sync Schedule — Dept 61</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--sf:#141414;--s2:#1c1c1c;--bd:#252525;--tx:#fff;--dm:#aaa;--mt:#999;--amber:#e07b00;--green:#2e7d42;--red:#cc0000;--r:8px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--tx);font-family:'Montserrat',sans-serif;min-height:100dvh;display:flex;flex-direction:column}
    /* ─── UNIFIED HEADER ─── */
    header{display:flex;align-items:center;height:58px;padding:0 14px;background:#0a0a0a;border-bottom:1px solid #2a2a2a;gap:10px;flex-shrink:0}
    .bk{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:1px solid #2a2a2a;border-radius:6px;color:#666;font-size:18px;line-height:1;text-decoration:none;flex-shrink:0;transition:background .15s}
    .bk:active{background:#141414}
    .hc{flex:1;text-align:center;pointer-events:none}
    .ht{font-family:'Montserrat',sans-serif;font-weight:700;font-size:15px;font-style:italic;color:#fff;letter-spacing:.02em;line-height:1.1}
    .hs{font-family:'Montserrat',sans-serif;font-weight:500;font-size:10px;color:#444;letter-spacing:.08em;margin-top:2px}
    .clogo{background:#8b0000;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 9px;text-align:center;flex-shrink:0;line-height:1.2;box-shadow:0 0 14px rgba(139,0,0,.55),0 0 4px rgba(139,0,0,.9)}
    .cl1{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;color:#fff;letter-spacing:.05em;text-shadow:0 0 10px rgba(255,150,150,.45)}
    .cl2{font-family:'Montserrat',sans-serif;font-weight:600;font-size:7px;color:rgba(255,255,255,.5);letter-spacing:.22em;text-transform:uppercase;margin-top:2px}
    /* ─── CONTENT ─── */
    #content{flex:1;overflow-y:auto;padding:14px 12px 40px;display:flex;flex-direction:column;gap:12px;max-width:480px;margin:0 auto;width:100%}
    .upload-zone{background:var(--sf);border:2px dashed #333;border-radius:var(--r);padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative}
    .upload-zone:active,.upload-zone.drag{border-color:var(--amber)}
    .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-icon{font-size:40px;margin-bottom:10px}
    .upload-title{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--amber)}
    .upload-sub{font-size:13px;color:var(--mt);margin-top:4px}
    #preview-wrap{display:none}
    #preview-img{width:100%;border-radius:var(--r);border:1px solid var(--bd);max-height:260px;object-fit:contain;background:var(--s2)}
    #results{display:none}
    .results-title{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
    .shift-card{background:var(--sf);border:1px solid var(--bd);border-left:3px solid var(--green);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
    .shift-date{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:900;letter-spacing:1px;color:var(--tx)}
    .shift-time{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--amber);margin-top:3px}
    .shift-type{font-size:12px;color:var(--dm);margin-top:2px}
    .shift-card.off{border-left-color:#333}
    .shift-card.off .shift-date{color:var(--dm)}
    .cal-section{margin-top:4px}
    .btn-gcal{display:block;background:transparent;border:2px solid var(--green);border-radius:var(--r);color:var(--green);font-family:'Montserrat',sans-serif;font-size:16px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;padding:13px;text-align:center;text-decoration:none;cursor:pointer;margin-bottom:8px;transition:all .15s}
    .btn-gcal:active,.btn-gcal.clicked{background:var(--green);color:#fff}
    .btn-reset{background:transparent;border:1px solid #333;border-radius:var(--r);color:var(--mt);font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px;width:100%;cursor:pointer}
  </style>
</head>
<body>
<header>
  <a class="bk" href="../schedule.html">←</a>
  <div class="hc"><div class="ht">Schedule Photos</div><div class="hs">#436 · TEMPE</div></div>
  <div class="clogo"><div class="cl1">COSTCO</div><div class="cl2">WHOLESALE</div></div>
</header>

<div id="content">

  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" accept="image/*" onchange="handleFile(this.files[0])">
    <div class="upload-icon">📸</div>
    <div class="upload-title">Upload Schedule Screenshot</div>
    <div class="upload-sub">Tap to choose photo from camera roll</div>
  </div>

  <div id="preview-wrap">
    <img id="preview-img" alt="Schedule preview">
  </div>

  <div id="results">
    <div class="results-title">Shifts Found</div>
    <div id="shift-list"></div>
    <div class="cal-section">
      <button class="btn-gcal" id="btn-add-all" onclick="addAllToCalendar()">Add All Shifts to Calendar</button>
      <button class="btn-reset" onclick="reset()">↺ Upload New Screenshot</button>
    </div>
  </div>

</div>

<script>
let parsedShifts = [];

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    document.getElementById('preview-img').src = dataUrl;
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('upload-zone').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function fmt12(t) {
  if (!t) return '—';
  const [h,m] = t.split(':').map(Number);
  return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function gcalUrl(shift) {
  if (shift.type === 'OFF' || !shift.start) return null;
  const dt = shift.date.replace(/-/g,'');
  const st = shift.start.replace(':','') + '00';
  const et = shift.end.replace(':','') + '00';
  const title = encodeURIComponent(`Costco Dept 61 — ${shift.type}`);
  const details = encodeURIComponent(`Dept 61 Meat | Costco Tempe | ${shift.type} shift`);
  const loc = encodeURIComponent('Costco Wholesale, Tempe, AZ');
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dt}T${st}/${dt}T${et}&details=${details}&location=${loc}`;
}

function addAllToCalendar() {
  const work = parsedShifts.filter(s => s.type !== 'OFF' && s.start);
  work.forEach((s, i) => {
    setTimeout(() => {
      const url = gcalUrl(s);
      if (url) window.open(url, '_blank');
    }, i * 400);
  });
  const btn = document.getElementById('btn-add-all');
  btn.textContent = `✓ Opened ${work.length} shifts in Google Calendar`;
  btn.classList.add('clicked');
}

function reset() {
  parsedShifts = [];
  document.getElementById('upload-zone').style.display = 'block';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('btn-add-all').textContent = 'Add All Shifts to Calendar';
  document.getElementById('btn-add-all').classList.remove('clicked');
  document.getElementById('file-input').value = '';
}
</script>
</body>
</html>
