<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Sync Schedule — Dept 61</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:#252525;--text:#fff;--dim:#aaa;--muted:#999;--amber:#e07b00;--green:#2e7d42;--red:#cc0000;--r:8px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100dvh;display:flex;flex-direction:column}
    header{background:var(--surface);border-bottom:3px solid var(--amber);padding:10px 14px 8px;flex-shrink:0;display:flex;align-items:center;gap:12px}
    .back{color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:11px;text-decoration:none;padding:5px 9px;border:1px solid #333;border-radius:4px;white-space:nowrap;flex-shrink:0}
    .htitle{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:3px;text-transform:uppercase}
    .hsub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px}
    #content{flex:1;overflow-y:auto;padding:14px 12px 40px;display:flex;flex-direction:column;gap:12px;max-width:480px;margin:0 auto;width:100%}
    /* UPLOAD ZONE */
    .upload-zone{background:var(--surface);border:2px dashed #333;border-radius:var(--r);padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative}
    .upload-zone:active,.upload-zone.drag{border-color:var(--amber)}
    .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-icon{font-size:40px;margin-bottom:10px}
    .upload-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--amber)}
    .upload-sub{font-size:13px;color:var(--muted);margin-top:4px}
    /* PREVIEW */
    #preview-wrap{display:none}
    #preview-img{width:100%;border-radius:var(--r);border:1px solid var(--border);max-height:260px;object-fit:contain;background:var(--surface2)}
    .btn-analyze{background:var(--amber);color:#000;border:none;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:2px;text-transform:uppercase;padding:15px;width:100%;cursor:pointer;margin-top:10px}
    .btn-analyze:active{background:#b86200}
    .btn-analyze:disabled{opacity:.5;cursor:not-allowed}
    /* LOADING */
    #loading{display:none;text-align:center;padding:24px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);letter-spacing:1px}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid #333;border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* RESULTS */
    #results{display:none}
    .results-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
    .shift-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
    .shift-date{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:1px;color:var(--text)}
    .shift-time{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--amber);margin-top:3px}
    .shift-type{font-size:12px;color:var(--dim);margin-top:2px}
    .shift-card.off{border-left-color:#333}
    .shift-card.off .shift-date{color:var(--dim)}
    /* CAL BUTTONS */
    .cal-section{margin-top:4px}
    .btn-gcal{display:block;background:transparent;border:2px solid var(--green);border-radius:var(--r);color:var(--green);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;padding:13px;text-align:center;text-decoration:none;cursor:pointer;margin-bottom:8px;transition:all .15s}
    .btn-gcal:active,.btn-gcal.clicked{background:var(--green);color:#fff}
    .btn-reset{background:transparent;border:1px solid #333;border-radius:var(--r);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:10px;width:100%;cursor:pointer}
    /* ERROR */
    .error-box{background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.3);border-radius:var(--r);padding:14px;font-size:14px;color:#ff8080;display:none}
  </style>
</head>
<body>
<header>
  <a class="back" href="schedule.html">← Schedule</a>
  <div>
    <div class="htitle">📸 Sync Schedule</div>
    <div class="hsub">SCREENSHOT → CALENDAR</div>
  </div>
</header>

<div id="content">

  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" accept="image/*" onchange="handleFile(this.files[0])">
    <div class="upload-icon">📸</div>
    <div class="upload-title">Upload Schedule Screenshot</div>
    <div class="upload-sub">Tap to choose photo from camera roll</div>
  </div>

  <div id="preview-wrap">
    <img id="preview-img" alt="Schedule preview">
    <button class="btn-analyze" id="btn-analyze" onclick="analyze()">▶ Extract Shifts</button>
  </div>

  <div id="loading">
    <div class="spinner"></div><br>
    Reading your schedule...
  </div>

  <div class="error-box" id="error-box"></div>

  <div id="results">
    <div class="results-title">Shifts Found</div>
    <div id="shift-list"></div>
    <div class="cal-section">
      <button class="btn-gcal" id="btn-add-all" onclick="addAllToCalendar()">Add All Shifts to Calendar</button>
      <button class="btn-reset" onclick="reset()">↺ Upload New Screenshot</button>
    </div>
  </div>

</div>

<script>
let imageBase64 = null;
let parsedShifts = [];

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    imageBase64 = dataUrl.split(',')[1];
    document.getElementById('preview-img').src = dataUrl;
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('upload-zone').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function analyze() {
  if (!imageBase64) return;
  const btn = document.getElementById('btn-analyze');
  btn.disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error-box').style.display = 'none';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: {type: 'base64', media_type: 'image/jpeg', data: imageBase64}
            },
            {
              type: 'text',
              text: `You are reading a Costco work schedule screenshot for employee Brandon, Dept 61 Meat, Costco Tempe. 
Extract all shifts from this image. For each day shown, identify:
- The date (as YYYY-MM-DD)
- Start time (24h format, e.g. "14:00")  
- End time (24h format, e.g. "22:00")
- Shift type: classify as "CLOSE" if end time is 22:00, "OPEN" if start 08:00 or earlier, "MIDDY" otherwise, or "OFF" if day off/vacation
- Day of week abbreviation (Mon, Tue, etc.)

IMPORTANT: Respond ONLY with valid JSON, no other text:
{
  "week_label": "e.g. Week of Jun 2",
  "shifts": [
    {"date": "2026-06-02", "day": "Mon", "start": "14:00", "end": "22:00", "type": "CLOSE"},
    {"date": "2026-06-03", "day": "Tue", "start": null, "end": null, "type": "OFF"}
  ]
}`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API error');

    const text = data.content[0].text.trim();
    const parsed = JSON.parse(text);
    parsedShifts = parsed.shifts;
    showResults(parsed);

  } catch(err) {
    const box = document.getElementById('error-box');
    box.textContent = 'Could not read schedule: ' + err.message + '. Make sure the screenshot is clear and shows shift times.';
    box.style.display = 'block';
    btn.disabled = false;
  }
  document.getElementById('loading').style.display = 'none';
}

function showResults(parsed) {
  document.getElementById('preview-wrap').style.display = 'none';
  const list = document.getElementById('shift-list');
  list.innerHTML = '';

  parsed.shifts.forEach(s => {
    const card = document.createElement('div');
    const isOff = s.type === 'OFF';
    card.className = 'shift-card' + (isOff ? ' off' : '');
    const timeStr = isOff ? 'Day Off' : `${fmt12(s.start)} – ${fmt12(s.end)}`;
    const typeColor = {CLOSE:'#e07b00',OPEN:'#4a90d9',MIDDY:'#9b4dca',OFF:'#555'}[s.type] || '#aaa';
    card.innerHTML = `
      <div class="shift-date">${s.day}, ${formatDate(s.date)}</div>
      <div class="shift-time">${timeStr}</div>
      <div class="shift-type" style="color:${typeColor}">${s.type}</div>
    `;
    list.appendChild(card);
  });

  document.getElementById('results').style.display = 'block';
}

function fmt12(t) {
  if (!t) return '—';
  const [h,m] = t.split(':').map(Number);
  return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function gcalUrl(shift) {
  if (shift.type === 'OFF' || !shift.start) return null;
  const dt = shift.date.replace(/-/g,'');
  const st = shift.start.replace(':','') + '00';
  const et = shift.end.replace(':','') + '00';
  const title = encodeURIComponent(`Costco Dept 61 — ${shift.type}`);
  const details = encodeURIComponent(`Dept 61 Meat | Costco Tempe | ${shift.type} shift`);
  const loc = encodeURIComponent('Costco Wholesale, Tempe, AZ');
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dt}T${st}/${dt}T${et}&details=${details}&location=${loc}`;
}

function addAllToCalendar() {
  const work = parsedShifts.filter(s => s.type !== 'OFF' && s.start);
  work.forEach((s, i) => {
    setTimeout(() => {
      const url = gcalUrl(s);
      if (url) window.open(url, '_blank');
    }, i * 400);
  });
  const btn = document.getElementById('btn-add-all');
  btn.textContent = `✓ Opened ${work.length} shifts in Google Calendar`;
  btn.classList.add('clicked');
}

function reset() {
  imageBase64 = null;
  parsedShifts = [];
  document.getElementById('upload-zone').style.display = 'block';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('btn-analyze').disabled = false;
  document.getElementById('btn-add-all').textContent = 'Add All Shifts to Calendar';
  document.getElementById('btn-add-all').classList.remove('clicked');
  document.getElementById('file-input').value = '';
}
</script>
</body>
</html>
