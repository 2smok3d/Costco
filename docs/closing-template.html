<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Closing Update — #436</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--sf:#111;--s2:#191919;--bd:#242424;--tx:#fff;--dm:#ccc;--mt:#888;--ft:#555;
      --dw:#e07b00;--lt:#c8a000;--oos:#cc2020;--r:8px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;height:100dvh}

    
    

    /* DATE BAR */
    .datebar{background:var(--sf);border-bottom:1px solid var(--bd);padding:8px 12px;flex-shrink:0;display:flex;align-items:center;gap:8px}
    #ct-date{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:14px;padding:7px 10px;outline:none}
    .btn-report{background:#cc1020;color:#fff;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;cursor:pointer;flex-shrink:0}

    /* SCROLL */
    #scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 10px 60px}

    /* SECTION */
    .sec{background:var(--sf);border:1px solid var(--bd);border-left:4px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
    .sec-hd{padding:12px 13px;cursor:pointer;display:flex;align-items:center;gap:10px;-webkit-user-select:none;user-select:none}
    .sec-hd:active{background:rgba(255,255,255,.03)}
    .sec-ico{font-size:18px;flex-shrink:0}
    .sec-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;flex:1}
    .sec-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:10px;flex-shrink:0}
    .sec-chev{color:var(--ft);font-size:11px;transition:transform .2s;flex-shrink:0}
    .sec.op .sec-chev{transform:rotate(180deg)}
    .sec-body{display:none;border-top:1px solid var(--bd)}
    .sec.op .sec-body{display:block}

    /* ITEM ROW */
    .item{padding:9px 12px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:6px}
    .item:last-child{border-bottom:none}
    .item-top{display:flex;align-items:center;gap:8px}
    .item-name{font-size:14px;color:var(--dm);flex:1;line-height:1.2}
    .item-name.is-dw{color:var(--dw)}
    .item-name.is-lt{color:var(--lt)}
    .item-name.is-oos{color:var(--oos);text-decoration:line-through}

    /* STATUS BUTTONS */
    .status-btns{display:flex;gap:3px;flex-shrink:0}
    .sb{border:1px solid #333;border-radius:4px;background:none;color:#555;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;padding:4px 7px;cursor:pointer;transition:all .12s;-webkit-user-select:none;user-select:none}
    .sb.active-na{background:#333;color:var(--dm);border-color:#555}
    .sb.active-dw{background:var(--dw);color:#fff;border-color:var(--dw)}
    .sb.active-lt{background:var(--lt);color:#000;border-color:var(--lt)}
    .sb.active-oos{background:var(--oos);color:#fff;border-color:var(--oos)}

    /* EXTRA FIELDS */
    .item-fields{display:flex;gap:8px;padding-top:2px}
    .field-group{display:flex;flex-direction:column;gap:3px}
    .field-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mt);letter-spacing:1px;text-transform:uppercase}
    .field-in{background:var(--s2);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:13px;padding:5px 8px;width:100px;outline:none}
    .field-in.wide{width:130px}

    /* NOTES */
    .notes-wrap{padding:8px 12px}
    .notes-in{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:14px;padding:9px 11px;outline:none;resize:none;height:70px}

    /* REPORT MODAL */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:flex-end}
    .modal-bg.op{display:flex}
    .modal{background:#111;border-radius:14px 14px 0 0;padding:16px 14px 40px;width:100%;max-height:85dvh;display:flex;flex-direction:column;gap:10px}
    .modal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#cc1020}
    .report-box{background:#0a0a0a;border:1px solid #333;border-radius:var(--r);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.9;padding:12px;white-space:pre-wrap;color:var(--tx);overflow-y:auto;flex:1}
    .modal-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .m-btn{border:none;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:12px;cursor:pointer}
    .m-btn.copy{background:#cc1020;color:#fff}
    .m-btn.adam{background:#1a6bb5;color:#fff}
    .m-btn.abe{background:#2a7040;color:#fff}
    .m-btn.close{background:#222;color:var(--mt)}
    .m-btn.copied{background:#2a7040}
      /* ─── UNIFIED HEADER ─── */
    header{position:relative;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;height:58px;background:#0a0a0a;border-bottom:1px solid #1e1e1e;flex-shrink:0}
    .bk{color:#666;font-family:'JetBrains Mono',monospace;font-size:11px;text-decoration:none;padding:5px 10px;border:1px solid #2a2a2a;border-radius:4px;white-space:nowrap;flex-shrink:0}
    .bk:active{background:#1a1a1a;color:#999}
    .hc{position:absolute;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;min-width:160px}
    .ht{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:#fff;letter-spacing:2px;text-transform:uppercase;line-height:1.1}
    .hs{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;letter-spacing:1.5px;margin-top:2px}
    .clogo{background:#8b0000;border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:3px 8px;text-align:center;flex-shrink:0;line-height:1.2}
    .cl1{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:#fff;letter-spacing:.08em}
    .cl2{font-size:7px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.2em;text-transform:uppercase;margin-top:1px}
  </style>
</head>
<body>
<header>
  <a class="bk" href="tools.html">← Back</a>
  <div class="hc"><div class="ht">Closing Update</div><div class="hs">#436 TEMPE</div></div>
  <div class="clogo"><div class="cl1">COSTCO</div><div class="cl2">WHOLESALE</div></div>
</header>

<div class="datebar">
  <input type="date" id="ct-date">
  <button class="btn-report" onclick="showReport()">Report</button>
</div>

<div id="scroll">
  <div id="sec-list"></div>
  <div class="sec" style="border-left-color:#555;margin-top:4px">
    <div class="sec-hd" onclick="this.closest('.sec').classList.toggle('op')">
      <span class="sec-ico">📋</span>
      <span class="sec-name">Notes</span>
      <span class="sec-chev">▼</span>
    </div>
    <div class="sec-body"><div class="notes-wrap">
      <textarea class="notes-in" id="ct-notes" placeholder="Additional notes for this close..."></textarea>
    </div></div>
  </div>
</div>

<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">Closing Update</div>
    <div class="report-box" id="report-box"></div>
    <div class="modal-btns">
      <button class="m-btn copy" id="btn-copy" onclick="copyRpt()">Copy</button>
      <button class="m-btn adam" onclick="sms('4805460784')">Adam</button>
      <button class="m-btn abe" onclick="sms('3233089971')">Abe</button>
    </div>
    <button class="m-btn close" style="width:100%" onclick="document.getElementById('modal').classList.remove('op')">Close</button>
  </div>
</div>

<script>
const SECS = [
  {id:'grinds',name:'Grinds',ico:'⚙️',color:'#6a5a4a',
   items:['OG','Wagyu','Bison']},
  {id:'beef-cuts',name:'Beef Cuts',ico:'🥩',color:'#8b1c1c',
   items:['Chuck Steak','Top Sirloin','New York','Ribeye','Tenderloin','Flap','Flank','Stew','Eye of Round','Rib Roast','Shabu-Shabu','Tri-Tip','Milanese','Prime Ribeye','Prime NY','Prime Tenderloin','Prime Tri-Tip','Prime Top Sirloin','Prime Tomahawk']},
  {id:'beef-cryo',name:'Beef Cryo',ico:'📦',color:'#7a2020',
   items:['Tenderloin','Ribeye','New York','Brisket','Ribs']},
  {id:'pork-cuts',name:'Pork Cuts',ico:'🐷',color:'#c05878',
   items:['Bone-In Chops','Boneless Chops','Thin Chops','Belly','Boneless Country-Style','Rib-Tips']},
  {id:'pork-cryo',name:'Pork Cryo',ico:'📦',color:'#a03a58',
   items:['Tenderloin','Boneless Loin','Back Ribs','Spare Ribs','Belly','Butt']},
  {id:'lamb',name:'Lamb',ico:'🐑',color:'#8a5a35',
   items:['Ribs','Leg','Loin Chops']},
  {id:'chicken',name:'Chicken',ico:'🐔',color:'#c9a000',
   items:['Whole Birds','B/S Breast','Tenders','B/S Thighs','Thighs','Drumsticks','Wings','OG Whole Bird','OG Breast','OG B/S Thighs','OG Drumstick','OG Tenders']},
  {id:'turkey',name:'Turkey',ico:'🦃',color:'#8a6800',
   items:['Butterball Grinds','OG Grinds']},
  {id:'seafood',name:'Seafood',ico:'🐟',color:'#1a6bb5',
   items:['Crab','Lobster','Atlantic Salmon','Steelhead','Tuna','Sea Bass','Catfish','Tilapia','Shrimp Bags','Shrimp Tray Pack']},
];

const KEY = () => 'ct_' + (document.getElementById('ct-date').value || today());
const STORE_KEY = 'ct_notes';
function today(){const d=new Date();return d.toISOString().slice(0,10);}
document.getElementById('ct-date').value = today();
document.getElementById('ct-date').addEventListener('change', load);

let STATE = {};

function load(){
  try{STATE = JSON.parse(localStorage.getItem(KEY())||'{}');}catch{STATE={};}
  document.getElementById('ct-notes').value = STATE._notes||'';
  render();
}

function save(){
  STATE._notes = document.getElementById('ct-notes').value;
  localStorage.setItem(KEY(), JSON.stringify(STATE));
}

function getItem(secId, name){return STATE[secId+'::'+name]||{status:'na',date:'',cases:''};}

function setItem(secId, name, field, val){
  const k = secId+'::'+name;
  if(!STATE[k]) STATE[k]={status:'na',date:'',cases:''};
  STATE[k][field] = val;
  save();
}

function setStatus(secId, name, status){
  const k = secId+'::'+name;
  if(!STATE[k]) STATE[k]={status:'na',date:'',cases:''};
  STATE[k].status = status;
  save();
  updateRow(secId, name);
  updateBadge(secId);
}

function updateRow(secId, name){
  const item = getItem(secId, name);
  const rowId = 'row-'+secId+'-'+name.replace(/\W/g,'_');
  const row = document.getElementById(rowId);
  if(!row) return;
  const nm = row.querySelector('.item-name');
  nm.className = 'item-name' + (item.status!='na' ? ' is-'+item.status : '');
  row.querySelectorAll('.sb').forEach(b => b.className = 'sb' + (b.dataset.s===item.status?' active-'+item.status:''));
  const fields = row.querySelector('.item-fields');
  if(fields){
    if(item.status==='dw'){
      fields.style.display='flex';
      fields.innerHTML = `
        <div class="field-group"><div class="field-label">Date Watch</div>
          <input class="field-in wide" type="date" value="${item.date||''}" onchange="setItem('${secId}','${name}','date',this.value)"></div>
        <div class="field-group"><div class="field-label">Cases</div>
          <input class="field-in" type="number" min="0" value="${item.cases||''}" placeholder="0" oninput="setItem('${secId}','${name}','cases',this.value)"></div>`;
    } else if(item.status==='light'){
      fields.style.display='flex';
      fields.innerHTML = `
        <div class="field-group"><div class="field-label">Cases on floor</div>
          <input class="field-in" type="number" min="0" value="${item.cases||''}" placeholder="0" oninput="setItem('${secId}','${name}','cases',this.value)"></div>`;
    } else {
      fields.style.display='none';
      fields.innerHTML='';
    }
  }
}

function updateBadge(secId){
  const sec = SECS.find(s=>s.id===secId);
  if(!sec) return;
  const count = sec.items.filter(n=>getItem(secId,n).status!=='na').length;
  const badge = document.getElementById('badge-'+secId);
  if(badge){
    badge.textContent = count ? count : '';
    badge.style.background = count ? '#333' : 'transparent';
    badge.style.color = count ? '#ccc' : 'transparent';
  }
}

function render(){
  const list = document.getElementById('sec-list');
  list.innerHTML = SECS.map(sec => {
    const count = sec.items.filter(n=>getItem(sec.id,n).status!=='na').length;
    const rows = sec.items.map(name => {
      const item = getItem(sec.id, name);
      const nameClass = item.status!='na' ? ' is-'+item.status : '';
      const statusBtns = ['na','dw','light','oos'].map(s => {
        const labels = {na:'N/A',dw:'DW',light:'LT',oos:'OOS'};
        const active = item.status===s ? ' active-'+s : '';
        return `<button class="sb${active}" data-s="${s}" onclick="setStatus('${sec.id}','${name}','${s}')">${labels[s]}</button>`;
      }).join('');
      let extraFields = '';
      if(item.status==='dw'){
        extraFields=`<div class="item-fields">
          <div class="field-group"><div class="field-label">Date Watch</div><input class="field-in wide" type="date" value="${item.date||''}" onchange="setItem('${sec.id}','${name}','date',this.value)"></div>
          <div class="field-group"><div class="field-label">Cases</div><input class="field-in" type="number" min="0" value="${item.cases||''}" placeholder="0" oninput="setItem('${sec.id}','${name}','cases',this.value)"></div>
        </div>`;
      } else if(item.status==='light'){
        extraFields=`<div class="item-fields"><div class="field-group"><div class="field-label">Cases on floor</div><input class="field-in" type="number" min="0" value="${item.cases||''}" placeholder="0" oninput="setItem('${sec.id}','${name}','cases',this.value)"></div></div>`;
      } else {
        extraFields='<div class="item-fields" style="display:none"></div>';
      }
      return `<div class="item" id="row-${sec.id}-${name.replace(/\W/g,'_')}">
        <div class="item-top">
          <span class="item-name${nameClass}">${name}</span>
          <div class="status-btns">${statusBtns}</div>
        </div>
        ${extraFields}
      </div>`;
    }).join('');

    return `<div class="sec" style="border-left-color:${sec.color}">
      <div class="sec-hd" onclick="this.closest('.sec').classList.toggle('op')">
        <span class="sec-ico">${sec.ico}</span>
        <span class="sec-name">${sec.name}</span>
        <span class="sec-badge" id="badge-${sec.id}" style="background:${count?'#333':'transparent'};color:${count?'#ccc':'transparent'}">${count||''}</span>
        <span class="sec-chev">▼</span>
      </div>
      <div class="sec-body">${rows}</div>
    </div>`;
  }).join('');

  document.getElementById('ct-notes').addEventListener('input', save);
}

function showReport(){
  const d = document.getElementById('ct-date').value || today();
  const dFmt = new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  let lines = [`Closing Update — ${dFmt}`, ''];

  let hasAny = false;
  SECS.forEach(sec => {
    const active = sec.items.filter(n => getItem(sec.id,n).status !== 'na');
    if(!active.length) return;
    hasAny = true;
    lines.push(sec.name.toUpperCase());
    active.forEach(name => {
      const item = getItem(sec.id, name);
      if(item.status==='dw'){
        const dwDate = item.date ? new Date(item.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—';
        const cs = item.cases ? ` · ${item.cases}cs` : '';
        lines.push(`  ${name}: Date Watch ${dwDate}${cs}`);
      } else if(item.status==='light'){
        const cs = item.cases ? ` · ${item.cases}cs` : '';
        lines.push(`  ${name}: Light${cs}`);
      } else if(item.status==='oos'){
        lines.push(`  ${name}: OOS`);
      }
    });
    lines.push('');
  });

  if(!hasAny) lines.push('All clear.');

  const notes = (document.getElementById('ct-notes').value||'').trim();
  if(notes){ lines.push(''); lines.push('Notes: '+notes); }

  document.getElementById('report-box').textContent = lines.join('\n');
  document.getElementById('modal').classList.add('op');
}

function copyRpt(){
  const text = document.getElementById('report-box').textContent;
  const btn = document.getElementById('btn-copy');
  navigator.clipboard?.writeText(text).catch(()=>{});
  btn.textContent='✓ Copied'; btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='Copy'; btn.classList.remove('copied');},2000);
}

function sms(num){
  const text = encodeURIComponent(document.getElementById('report-box').textContent);
  window.location.href = `sms:${num}?body=${text}`;
}

function closeModal(e){ if(e.target===document.getElementById('modal')) document.getElementById('modal').classList.remove('op'); }

load();
window.addEventListener('beforeinstallprompt',e=>e.preventDefault());
</script>
</body>
</html>
