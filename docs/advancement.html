<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advancement — Costco #436</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;--sf:#141414;--s2:#1e1e1e;--s3:#252525;
    --bd:#2a2a2a;--bd-lite:#222;
    --tx:#fff;--dm:#ccc;--mt:#999;--ft:#666;--xt:#444;
    --brand:#8b0000;
    --red:#cc0000;--red-dk:#8b1010;--amber:#e07b00;--amber-dk:#8a6020;
    --green:#00c87a;--green-dk:#2e7d42;--blue:#1a6bb5;--blue-lt:#4a90d9;
    --teal:#007a6e;--purple:#8850c8;--purple-dk:#5a3a8a;--pink:#c05878;
    --gold:#c8a000;--gold-lt:#e8c97a;--brown:#8a5a35;
    --prime:#c8960c;--choice:#4a7fbf;--wagyu:#9b4dca;
    --beef-cryo:#7a1c1c;--pork-clr:#c05878;--poultry:#c9a000;--turkey:#8a6800;
    --seafood:#1a6bb5;--grinds:#6a5a4a;--lamb-clr:#8a5a35;
    --st-dw:#e07b00;--st-lt:#c8a000;--st-oos:#cc0000;--st-na:#555;
    --sp-xs:4px;--sp-sm:8px;--sp-md:12px;--sp-lg:16px;--sp-xl:24px;
    --r-sm:6px;--r:8px;--r-lg:12px;--r-pill:999px;
    --sh-sm:0 1px 4px rgba(0,0,0,.4);--sh:0 2px 10px rgba(0,0,0,.5);
    --header-h:58px;
    --font-body:'Montserrat',sans-serif;--font-mono:'JetBrains Mono',monospace;
    --accent:#cc0000;--accent-bg:rgba(204,0,0,.10);--accent-bd:rgba(204,0,0,.25);
  }
  :root{--accent:var(--purple);--accent-bg:rgba(136,80,200,.10);--accent-bd:rgba(136,80,200,.25)}

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--tx);
    font-family: var(--font-body);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ─── UNIFIED HEADER ─── */
  header{position:relative;display:flex;align-items:center;height:var(--header-h);padding:0 14px;background:var(--bg);border-bottom:1px solid var(--bd);gap:10px;flex-shrink:0}
  .bk{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:1px solid var(--bd);border-radius:var(--r-sm);color:var(--ft);font-size:18px;line-height:1;text-decoration:none;flex-shrink:0;transition:background .15s}
  .bk:active{background:var(--sf)}
  .hc{position:absolute;left:0;right:0;text-align:center;pointer-events:none}
  .ht{font-family:var(--font-body);font-weight:700;font-size:15px;font-style:italic;color:var(--tx);letter-spacing:.02em;line-height:1.1}
  .hs{font-family:var(--font-body);font-weight:500;font-size:10px;color:var(--xt);letter-spacing:.08em;margin-top:2px}
  .clogo{background:var(--brand);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 9px;text-align:center;flex-shrink:0;line-height:1.2;box-shadow:0 0 14px rgba(139,0,0,.55),0 0 4px rgba(139,0,0,.9)}
  .cl1{font-family:var(--font-body);font-weight:800;font-size:15px;color:#fff;letter-spacing:.05em;text-shadow:0 0 10px rgba(255,150,150,.45)}
  .cl2{font-family:var(--font-body);font-weight:600;font-size:7px;color:rgba(255,255,255,.5);letter-spacing:.22em;text-transform:uppercase;margin-top:2px}

  /* ─── SCROLL CONTAINER ─── */
  #scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px 12px 60px;
    max-width: 540px;
    margin: 0 auto;
    width: 100%;
  }

  /* ─── SECTION LABEL ─── */
  .sec-label {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 800;
    font-style: italic;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 14px 0 8px;
    border-bottom: 1px solid var(--bd);
    margin-bottom: 10px;
  }

  /* ─── CAREER PATH ─── */
  .path {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 12px 4px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 8px;
    scrollbar-width: none;
  }
  .path::-webkit-scrollbar { display: none; }

  .step {
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }
  .step-pill {
    background: var(--s2);
    border: 1.5px solid var(--bd);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 700;
    font-style: italic;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--mt);
    white-space: nowrap;
  }
  .step-pill.active {
    background: var(--purple);
    border-color: var(--purple);
    color: #fff;
    box-shadow: 0 0 10px rgba(136,80,200,.3);
  }
  .step-pill.done {
    border-color: var(--green);
    color: var(--green);
  }
  .step-arrow {
    color: var(--bd);
    font-size: 14px;
    padding: 0 4px;
    flex-shrink: 0;
  }

  /* ─── PROGRESS BAR ─── */
  .prog-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--mt);
    text-align: right;
    margin-bottom: 4px;
  }
  .prog-wrap {
    background: var(--s2);
    border-radius: 999px;
    height: 6px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .prog-bar {
    height: 100%;
    background: var(--purple);
    border-radius: 999px;
    transition: width .3s;
  }

  /* ─── CHECKLIST ─── */
  .chk-group {
    background: var(--sf);
    border: 1px solid var(--bd);
    border-radius: var(--r);
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .chk-group-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--mt);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--bd);
  }
  .chk-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .chk-item:last-child { border-bottom: none; }
  .chk-box {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--bd);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    background: var(--s2);
    transition: background .15s, border-color .15s;
  }
  .chk-item.done .chk-box {
    background: var(--purple);
    border-color: var(--purple);
    color: #fff;
  }
  .chk-item.done .chk-label {
    color: var(--mt);
    text-decoration: line-through;
  }
  .chk-label {
    font-size: 13px;
    color: var(--dm);
    flex: 1;
    line-height: 1.3;
  }

  /* ─── NOTES ─── */
  .notes-ta {
    width: 100%;
    background: var(--s2);
    border: 1px solid var(--bd);
    border-radius: var(--r);
    color: var(--tx);
    font-family: var(--font-body);
    font-size: 13px;
    padding: 10px 12px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    line-height: 1.5;
  }
  .notes-ta:focus { border-color: var(--purple); }
  .notes-ta::placeholder { color: var(--ft); }
</style>
</head>
<body>

<header>
  <a class="bk" href="career.html">&#8592;</a>
  <div class="hc">
    <div class="ht">Advancement</div>
    <div class="hs">#436 · TEMPE</div>
  </div>
  <div class="clogo">
    <div class="cl1">COSTCO</div>
    <div class="cl2">WHOLESALE</div>
  </div>
</header>

<div id="scroll">

  <!-- ─── SECTION 1: Career Path ─── -->
  <div class="sec-label">Career Path</div>
  <div class="path">
    <div class="step">
      <div class="step-pill active">Meat Wrapper</div>
    </div>
    <div class="step-arrow">›</div>
    <div class="step">
      <div class="step-pill">Lead Meat</div>
    </div>
    <div class="step-arrow">›</div>
    <div class="step">
      <div class="step-pill">SIT</div>
    </div>
    <div class="step-arrow">›</div>
    <div class="step">
      <div class="step-pill">Supervisor</div>
    </div>
  </div>

  <!-- ─── SECTION 2: SIT Checklist ─── -->
  <div class="sec-label">SIT Checklist</div>

  <div class="prog-label" id="prog-label">0 / 24 complete</div>
  <div class="prog-wrap">
    <div class="prog-bar" id="prog-bar" style="width:0%"></div>
  </div>

  <div id="chk-container"></div>

  <!-- ─── SECTION 3: Notes ─── -->
  <div class="sec-label">Notes</div>
  <textarea
    class="notes-ta"
    id="notes-ta"
    rows="5"
    placeholder="Personal goals, dates, manager feedback…"
  ></textarea>

</div>

<script>
  const SIT_KEY   = 'adv_sit_v1';
  const NOTES_KEY = 'adv_notes';

  const GROUPS = [
    {
      title: 'Production Skills',
      items: [
        'Grind operation',
        'Band saw operation',
        'Packaging machine',
        'Case wrapping & dating',
        'Tray pack production',
        'Label printing',
        'Trim & bone-out',
        'Yield tracking'
      ]
    },
    {
      title: 'Department Knowledge',
      items: [
        'STK daily review',
        'DSL sales tracking',
        'ITMW item lookup',
        'RF 11 on-hand scan',
        'RF 72 shrink entry',
        'Receiving verification (RHI)',
        'Case reset & rotation',
        'Ordering process'
      ]
    },
    {
      title: 'Leadership',
      items: [
        'Open/close procedures',
        'Department walk',
        'Cooler organization',
        'Team communication',
        'Training new employees',
        'Safety & sanitation',
        'Markdown decisions',
        'Inventory count'
      ]
    }
  ];

  // ─── Load state ───
  var state = {};
  try {
    var raw = localStorage.getItem(SIT_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}

  function saveState() {
    try { localStorage.setItem(SIT_KEY, JSON.stringify(state)); } catch(e) {}
  }

  // ─── Build checklist ───
  var container = document.getElementById('chk-container');

  GROUPS.forEach(function(group, gi) {
    var wrap = document.createElement('div');
    wrap.className = 'chk-group';

    var titleEl = document.createElement('div');
    titleEl.className = 'chk-group-title';
    titleEl.textContent = group.title;
    wrap.appendChild(titleEl);

    group.items.forEach(function(label, ii) {
      var key = gi + '_' + ii;
      var row = document.createElement('div');
      row.className = 'chk-item' + (state[key] ? ' done' : '');

      var box = document.createElement('div');
      box.className = 'chk-box';
      box.innerHTML = state[key] ? '&#10003;' : '';

      var lbl = document.createElement('div');
      lbl.className = 'chk-label';
      lbl.textContent = label;

      row.appendChild(box);
      row.appendChild(lbl);
      wrap.appendChild(row);

      row.addEventListener('click', function() {
        state[key] = !state[key];
        saveState();
        if (state[key]) {
          row.classList.add('done');
          box.innerHTML = '&#10003;';
        } else {
          row.classList.remove('done');
          box.innerHTML = '';
        }
        updateProgress();
      });
    });

    container.appendChild(wrap);
  });

  // ─── Progress bar ───
  var totalItems = GROUPS.reduce(function(acc, g) { return acc + g.items.length; }, 0);

  function updateProgress() {
    var done = Object.values(state).filter(Boolean).length;
    var pct  = totalItems > 0 ? (done / totalItems) * 100 : 0;
    document.getElementById('prog-bar').style.width  = pct + '%';
    document.getElementById('prog-label').textContent = done + ' / ' + totalItems + ' complete';
  }

  updateProgress();

  // ─── Notes ───
  var ta = document.getElementById('notes-ta');
  try {
    var saved = localStorage.getItem(NOTES_KEY);
    if (saved) ta.value = saved;
  } catch(e) {}

  ta.addEventListener('input', function() {
    try { localStorage.setItem(NOTES_KEY, ta.value); } catch(e) {}
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  });

  if (ta.value) {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  }
</script>

</body>
</html>
