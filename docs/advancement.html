<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Advancement — Costco #436</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--sf:#111;--s2:#181818;--bd:#1e1e1e;--tx:#fff;--dm:#ccc;--mt:#888;--ft:#333;--pu:#8850c8;--grn:#00c87a;--amb:#e07b00;--blue:#1a6bb5;--red:#cc1020;--r:8px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;height:100dvh}
    /* ─── UNIFIED HEADER ─── */
    header{position:relative;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;height:58px;background:#0a0a0a;border-bottom:1px solid #1e1e1e;flex-shrink:0}
    .bk{color:#666;font-family:'JetBrains Mono',monospace;font-size:11px;text-decoration:none;padding:5px 10px;border:1px solid #2a2a2a;border-radius:4px;white-space:nowrap;flex-shrink:0}
    .hc{position:absolute;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;min-width:160px}
    .ht{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:#fff;letter-spacing:2px;text-transform:uppercase;line-height:1.1}
    .hs{font-family:'JetBrains Mono',monospace;font-size:9px;color:#444;letter-spacing:1.5px;margin-top:2px}
    .clogo{background:#8b0000;border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:3px 8px;text-align:center;flex-shrink:0;line-height:1.2}
    .cl1{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:#fff;letter-spacing:.08em}
    .cl2{font-size:7px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.2em;text-transform:uppercase;margin-top:1px}
    #scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 50px;max-width:540px;margin:0 auto;width:100%}
    .sl{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;letter-spacing:3px;text-transform:uppercase;padding:14px 0 5px 10px;border-left:3px solid var(--pu);color:var(--pu);margin-top:4px;margin-bottom:6px}
    .sl.grn{color:var(--grn);border-left-color:var(--grn)}
    .sl.amb{color:var(--amb);border-left-color:var(--amb)}
    .sl.red{color:var(--red);border-left-color:var(--red)}
    .sl.blue{color:var(--blue);border-left-color:var(--blue)}
    .path{display:flex;flex-direction:column;gap:0;margin-bottom:10px}
    .step{background:var(--sf);border:1px solid var(--bd);border-left:4px solid #333;border-radius:var(--r);padding:13px 14px;margin-bottom:6px;cursor:pointer;-webkit-user-select:none;user-select:none}
    .step.current{border-left-color:var(--grn)}
    .step.next{border-left-color:var(--pu)}
    .step.future{border-left-color:#333}
    .step-hd{display:flex;align-items:center;gap:10px}
    .step-icon{font-size:20px;flex-shrink:0}
    .step-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;flex:1}
    .step-tag{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 7px;border-radius:3px;flex-shrink:0;font-weight:700;letter-spacing:.5px}
    .tag-now{background:rgba(0,200,122,.15);color:var(--grn);border:1px solid rgba(0,200,122,.3)}
    .tag-next{background:rgba(136,80,200,.15);color:var(--pu);border:1px solid rgba(136,80,200,.3)}
    .tag-future{background:rgba(60,60,60,.4);color:#555;border:1px solid #333}
    .step-sub{font-size:12px;color:var(--mt);margin-top:3px}
    .step-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);flex-direction:column;gap:5px}
    .step.op .step-body{display:flex}
    .step-chev{color:#333;font-size:11px;transition:transform .2s;flex-shrink:0}
    .step.op .step-chev{transform:rotate(180deg)}
    .sec{background:var(--sf);border:1px solid var(--bd);border-left:4px solid #333;border-radius:var(--r);margin-bottom:8px;overflow:hidden}
    .sec-hd{padding:13px 14px;cursor:pointer;display:flex;align-items:center;gap:11px;-webkit-user-select:none;user-select:none}
    .sec-hd:active{background:rgba(255,255,255,.02)}
    .sec-ico{font-size:18px;flex-shrink:0}
    .sec-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;flex:1;color:#fff}
    .sec-chev{color:#333;font-size:12px;transition:transform .2s;flex-shrink:0}
    .sec.op .sec-chev{transform:rotate(180deg)}
    .sec-body{display:none;border-top:1px solid var(--bd);padding:11px 13px 13px;flex-direction:column;gap:5px}
    .sec.op .sec-body{display:flex}
    .note{font-size:13px;color:var(--dm);line-height:1.5;display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--bd)}
    .note:last-child{border-bottom:none}
    .note::before{content:"›";color:#333;flex-shrink:0}
    .progress-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
    .progress-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mt);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
    .progress-pct{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--pu)}
    .progress-bar{height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--pu),var(--grn));border-radius:3px;transition:width .4s ease}
    .check-list{display:flex;flex-direction:column;gap:5px}
    .check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)}
    .check-item:last-child{border-bottom:none}
    .check-box{width:20px;height:20px;border:1px solid #333;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin-top:1px}
    .check-box.done{background:var(--grn);border-color:var(--grn)}
    .check-box.done::after{content:"✓";color:#000;font-size:12px;font-weight:900}
    .check-label{font-size:13px;color:var(--dm);line-height:1.4;flex:1}
    .check-label.done{color:#444;text-decoration:line-through}
    .check-tag{font-family:'JetBrains Mono',monospace;font-size:9px;color:#555;margin-top:2px}
    .timeline{display:flex;flex-direction:column;gap:0;margin-bottom:10px}
    .tl-item{display:flex;gap:12px;padding:0 0 18px 0}
    .tl-item:last-child{padding-bottom:0}
    .tl-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:36px}
    .tl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:3px}
    .tl-dot.done{background:var(--grn)}
    .tl-dot.active{background:var(--pu);box-shadow:0 0 8px var(--pu)}
    .tl-dot.pending{background:#1a1a1a;border:1px solid #333}
    .tl-line{flex:1;width:1px;background:#1e1e1e;margin-top:4px}
    .tl-item:last-child .tl-line{display:none}
    .tl-right{flex:1;padding-bottom:4px}
    .tl-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:#444;letter-spacing:1px;margin-bottom:2px}
    .tl-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;letter-spacing:1px;text-transform:uppercase}
    .tl-desc{font-size:12px;color:var(--mt);line-height:1.4;margin-top:2px}
    .info-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:13px 14px;margin-bottom:8px}
    .ic-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--dm);margin-bottom:8px}
    kbd{font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(0,200,122,.1);border:1px solid rgba(0,200,122,.2);border-radius:3px;padding:1px 5px;color:var(--grn)}
  </style>
</head>
<body>
<header>
  <a class="bk" href="career.html">← Back</a>
  <div class="hc"><div class="ht">Advancement</div><div class="hs">#436 TEMPE</div></div>
  <div class="clogo"><div class="cl1">COSTCO</div><div class="cl2">WHOLESALE</div></div>
</header>
<p>Content</p>
</body>
</html>
