<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <title>Costco Warehouse #436</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600&family=Cormorant+SC:wght@500;600;700&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#000;--sf:#0e0e0e;--bd:#222;--tx:#fff;--dm:#ccc;--mt:#666;--r:10px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;height:100dvh}

    /* ─── HUB HEADER ─── */
    header{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 14px;background:#000;
      border-bottom:2px solid #cc1020;flex-shrink:0;
      gap:12px;
    }
    /* Logo wrapper — takes all available width left of warehouse info */
    .logo-wrap{flex:1;min-width:0;background:#f0f0f0;border-radius:8px;padding:6px 10px;display:flex;align-items:center}
    .hlogo{width:100%;height:auto;display:block}
    /* Warehouse + location — right side, stacked */
    .wr{flex-shrink:0;text-align:right}
    .wn{font-family:'Cormorant SC',serif;font-size:15px;font-weight:700;color:#cc1020;letter-spacing:4px;text-transform:uppercase;line-height:1}
    .wsub{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:#888;letter-spacing:1px;display:block;margin-top:4px}

    /* ─── MAIN ─── */
    #main{flex:1;display:flex;flex-direction:column;padding:10px 12px 8px;min-height:0;overflow:hidden}

    /* FIELD GUIDE */
    .fg{display:flex;align-items:center;gap:14px;background:var(--sf);border:1.5px solid #6b1015;border-radius:var(--r);padding:13px 15px;text-decoration:none;color:var(--tx);flex-shrink:0;transition:transform .12s;box-shadow:0 0 18px rgba(107,16,21,.25)}
    .fg:active{transform:scale(.98)}
    .fg-ico{font-size:26px;flex-shrink:0}
    .fg-name{
      font-family:'Cinzel Decorative',serif;font-size:17px;font-weight:700;
      color:#e8c97a;letter-spacing:1.5px;line-height:1;
      text-shadow:0 0 18px rgba(232,196,100,.45),0 0 40px rgba(232,196,100,.15);
    }
    .fg-desc{font-size:12px;color:var(--dm);margin-top:3px;font-family:'Barlow',sans-serif}
    .fg-tag{margin-left:auto;background:#6b1015;color:rgba(255,255,255,.6);font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:3px;flex-shrink:0}

    /* SEARCH */
    .sw{flex-shrink:0;padding:9px 0}
    .si{position:relative;display:flex;align-items:center}
    .si-ico{position:absolute;left:12px;color:var(--mt);font-size:14px;pointer-events:none}
    #hs{width:100%;background:var(--sf);border:1px solid rgba(255,255,255,.42);border-radius:22px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:15px;padding:10px 14px 10px 36px;outline:none;-webkit-appearance:none;transition:border-color .15s}
    #hs::placeholder{color:var(--mt)}
    #hs:focus{border-color:rgba(255,255,255,.82)}
    .sh{display:none;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mt);padding:5px 4px 0;text-align:center}
    .sh a{color:#cc1020;text-decoration:none}

    /* TILE GRID */
    .gg{height:3px;flex-shrink:0}
    .grid{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:8px;min-height:0}
    .tile{
      background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);
      padding:8px 6px;text-decoration:none;color:var(--tx);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;position:relative;transition:transform .12s;overflow:hidden;min-height:0;
    }
    .tile:active{transform:scale(.97)}
    .tile.hd{display:none}
    .ti{font-size:20px;line-height:1;flex-shrink:0;margin-bottom:18px}
    .tn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;letter-spacing:1px;text-transform:uppercase;line-height:1.1;margin-bottom:15px}
    .td{font-size:10px;color:var(--dm);line-height:1.3}
  </style>
</head>
<body>
<header>
  <div class="logo-wrap">
    <img src="img/costco-logo.png" alt="Costco Wholesale" class="hlogo">
  </div>
  <div class="wr">
    <div class="wn">Warehouse</div>
    <span class="wsub">#436 · Tempe</span>
  </div>
</header>

<div id="main">
  <a class="fg" href="field-guide.html" data-n="field guide plu commands cut specs procedures reference">
    <span class="fg-ico">📖</span>
    <div>
      <div class="fg-name">Field Guide</div>
      <div class="fg-desc">PLUs · Commands · Cut Specs · Procedures</div>
    </div>
    <span class="fg-tag">MAIN</span>
  </a>

  <div class="sw">
    <div class="si">
      <span class="si-ico">⌕</span>
      <input id="hs" type="search" placeholder="Search   PLUs, tools, commands…" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="sh" id="sh">No match — <a href="field-guide.html">search Field Guide ↗</a></div>
  </div>

  <div class="gg"></div>

  <div class="grid">
    <a class="tile" style="border-color:#00c87a;box-shadow:0 0 8px rgba(0,200,122,.1)" href="as400.html" data-n="as400 commands ibm terminal rf scanner">
      <span class="ti">🖥</span><span class="tn">AS400</span><span class="td">Commands · RF · Dept Sheets</span>
    </a>
    <a class="tile" style="border-color:#c05878;box-shadow:0 0 8px rgba(192,88,120,.1)" href="depts.html" data-n="depts departments meat produce deli bakery front end">
      <span class="ti">🏪</span><span class="tn">Depts</span><span class="td">All Departments</span>
    </a>
    <a class="tile" style="border-color:#1a6bb5;box-shadow:0 0 8px rgba(26,107,181,.1)" href="blue-book.html" data-n="blue book supervisor register procedures">
      <span class="ti">📘</span><span class="tn">Blue Book</span><span class="td">Supervisor Reference</span>
    </a>
    <a class="tile" style="border-color:#e07b00;box-shadow:0 0 8px rgba(224,123,0,.1)" href="tools.html" data-n="tools closing template retail cases plu cut specs cut log">
      <span class="ti">🔧</span><span class="tn">Tools</span><span class="td">Close · Cases · PLU · Cuts</span>
    </a>
    <a class="tile" style="border-color:#b8860b;box-shadow:0 0 8px rgba(184,134,11,.1)" href="docs-page.html" data-n="files docs manuals operations equipment">
      <span class="ti">📁</span><span class="tn">Files</span><span class="td">Manuals · References</span>
    </a>
    <a class="tile" style="border-color:#8850c8;box-shadow:0 0 8px rgba(136,80,200,.1)" href="career.html" data-n="career goals sit supervisor schedule shifts ukg">
      <span class="ti">🎯</span><span class="tn">Career</span><span class="td">Goals · Schedule · SIT</span>
    </a>
  </div>
</div>

<script>
const hs=document.getElementById('hs'),sh=document.getElementById('sh');
const tiles=document.querySelectorAll('.tile,.fg');
hs.addEventListener('input',()=>{
  const q=hs.value.trim().toLowerCase();
  let any=false;
  tiles.forEach(t=>{const n=(t.dataset.n||'').toLowerCase();const show=!q||n.includes(q);t.classList.toggle('hd',!show);if(show&&t.classList.contains('tile'))any=true;});
  sh.style.display=(q&&!any)?'block':'none';
});
window.addEventListener('beforeinstallprompt',e=>e.preventDefault());
</script>
</body>
</html>
