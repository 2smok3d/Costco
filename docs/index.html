<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <title>Costco Warehouse #436</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=JetBrains+Mono:wght@400;500;600&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0a;--sf:#141414;--s2:#1e1e1e;--s3:#252525;
      --bd:#2a2a2a;--bd-lite:#222;
      --tx:#fff;--dm:#ccc;--mt:#999;--ft:#666;--xt:#444;
      --brand:#8b0000;
      --red:#cc0000;--red-dk:#8b1010;--amber:#e07b00;--amber-dk:#8a6020;
      --green:#00c87a;--green-dk:#2e7d42;--blue:#1a6bb5;--blue-lt:#4a90d9;
      --teal:#007a6e;--purple:#8850c8;--purple-dk:#5a3a8a;--pink:#c05878;
      --gold:#c8a000;--gold-lt:#e8c97a;--brown:#8a5a35;
      --prime:#c8960c;--choice:#4a7fbf;--wagyu:#9b4dca;
      --beef-cryo:#7a1c1c;--pork-clr:#c05878;--poultry:#c9a000;--turkey:#8a6800;
      --seafood:#1a6bb5;--grinds:#6a5a4a;--lamb-clr:#8a5a35;
      --st-dw:#e07b00;--st-lt:#c8a000;--st-oos:#cc0000;--st-na:#555;
      --sp-xs:4px;--sp-sm:8px;--sp-md:12px;--sp-lg:16px;--sp-xl:24px;
      --r-sm:6px;--r:8px;--r-lg:12px;--r-pill:999px;
      --sh-sm:0 1px 4px rgba(0,0,0,.4);--sh:0 2px 10px rgba(0,0,0,.5);
      --header-h:58px;
      --font-body:'Montserrat',sans-serif;--font-mono:'JetBrains Mono',monospace;
      --accent:#cc0000;--accent-bg:rgba(204,0,0,.10);--accent-bd:rgba(204,0,0,.25);
    }
    :root{--accent:#cc1020;--accent-bg:rgba(204,16,32,.10);--accent-bd:rgba(204,16,32,.25)}

    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--tx);font-family:var(--font-body);display:flex;flex-direction:column;height:100dvh}

    /* ─── HUB HEADER ─── */
    header{
      display:flex;align-items:center;justify-content:space-between;
      padding:1px 14px;background:#000;
      border-bottom:2px solid #cc1020;flex-shrink:0;
      gap:12px;
    }
    .hlogo{height:62px;width:auto;display:block}
    .wr{flex-shrink:0;text-align:right}
    .wn{font-family:var(--font-body);font-size:14px;font-weight:800;color:#cc0000;letter-spacing:.08em;text-transform:uppercase;line-height:1}
    .wsub{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:#005DAA;letter-spacing:1px;display:block;margin-top:4px}

    /* ─── MAIN ─── */
    #main{flex:1;display:flex;flex-direction:column;padding:10px 100px 8px;min-height:0;overflow:hidden}

    /* FIELD GUIDE */
    .fg{display:flex;align-items:center;gap:14px;background:var(--sf);border:1.5px solid #6b1015;border-radius:var(--r);padding:13px 15px;text-decoration:none;color:var(--tx);flex-shrink:0;transition:transform .12s;box-shadow:0 0 18px rgba(107,16,21,.25);margin:15px 0}
    .fg:active{transform:scale(.98)}
    .fg.hd{display:none}
    .fg-ico{font-size:26px;flex-shrink:0}
    .fg-name{
      font-family:'Cinzel Decorative',serif;font-size:17px;font-weight:700;
      color:#e8c97a;letter-spacing:1.5px;line-height:1;
      text-shadow:0 0 18px rgba(232,196,100,.45),0 0 40px rgba(232,196,100,.15);
    }
    .fg-desc{font-size:12px;color:var(--dm);margin-top:3px;font-family:var(--font-body)}
    .fg-tag{margin-left:auto;background:#6b1015;color:rgba(255,255,255,.6);font-family:var(--font-mono);font-size:8px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:3px;flex-shrink:0}

    /* SEARCH */
    .sw{flex-shrink:0;padding:9px 0}
    .si{position:relative;display:flex;align-items:center}
    .si-ico{position:absolute;left:12px;color:var(--mt);font-size:14px;pointer-events:none}
    #hs{width:100%;background:var(--sf);border:1px solid rgba(255,255,255,.42);border-radius:22px;color:var(--tx);font-family:var(--font-body);font-size:15px;padding:10px 14px 10px 36px;outline:none;-webkit-appearance:none;transition:border-color .15s}
    #hs::placeholder{color:var(--mt)}
    #hs:focus{border-color:rgba(255,255,255,.82)}
    .sh{display:none;font-family:var(--font-mono);font-size:10px;color:var(--mt);padding:5px 4px 0;text-align:center}
    .sh a{color:#cc1020;text-decoration:none}

    /* TILE GRID */
    .gg{height:3px;flex-shrink:0}
    .grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:68px 68px 68px;gap:10px 50px;flex-shrink:0}

    .tile{
      background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);
      padding:4px 4px;text-decoration:none;color:var(--tx);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;position:relative;transition:transform .12s;overflow:hidden;min-height:0;
    }
    .tile:active{transform:scale(.97)}
    .tile.hd{display:none}

    .tile-wide{grid-column:1/-1}

    .ti{font-size:32px;line-height:1;flex-shrink:0;margin-bottom:4px}
    .tn{font-family:var(--font-body);font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;line-height:1.1;margin-bottom:0}
    .td{display:none}
    .td{font-size:10px;color:var(--dm);font-family:var(--font-body);font-weight:400;line-height:1.3}
  </style>
</head>
<body>
<header>
  <img src="img/costco-logo.png" alt="Costco Wholesale" class="hlogo">
  <div class="wr">
    <div class="wn">Warehouse</div>
    <span class="wsub">#436 · Tempe</span>
  </div>
</header>

<div id="main">
  <a class="fg" href="field-guide.html" data-n="field guide plu commands cut specs procedures reference">
    <span class="fg-ico">📖</span>
    <div>
      <div class="fg-name">Field Guide</div>
      <div class="fg-desc">PLUs · Commands · Cut Specs · Procedures</div>
    </div>
    <span class="fg-tag">MAIN</span>
  </a>

  <div class="sw">
    <div class="si">
      <span class="si-ico">⌕</span>
      <input id="hs" type="search" placeholder="Search PLUs, tools, commands…" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="sh" id="sh">No match — <a href="field-guide.html">search Field Guide ↗</a></div>
  </div>

  <div class="gg"></div>

  <div class="grid">
    <a class="tile" style="border-color:#00c87a;box-shadow:0 0 10px rgba(0,200,122,.12)" href="as400.html" data-n="as400 commands ibm terminal rf scanner dept sheets">
      <span class="ti">🖥</span>
      <span class="tn">AS400</span>
      <span class="td">Commands · RF · Dept Sheets</span>
    </a>
    <a class="tile" style="border-color:#c05878;box-shadow:0 0 10px rgba(192,88,120,.12)" href="depts.html" data-n="depts departments meat produce deli bakery front end">
      <span class="ti">🏪</span>
      <span class="tn">Depts</span>
      <span class="td">Departments</span>
    </a>
    <a class="tile" style="border-color:#e07b00;box-shadow:0 0 10px rgba(224,123,0,.12)" href="tools.html" data-n="tools closing production template retail cases plu cut specs">
      <span class="ti">🔧</span>
      <span class="tn">Tools</span>
      <span class="td">Closing · Production</span>
    </a>
    <a class="tile" style="border-color:#b8860b;box-shadow:0 0 10px rgba(184,134,11,.12)" href="docs-page.html" data-n="docs files manuals reference blue book supervisor operations">
      <span class="ti">📁</span>
      <span class="tn">Docs</span>
      <span class="td">Reference · Blue Book</span>
    </a>
    <a class="tile tile-wide" style="border-color:#8850c8;box-shadow:0 0 10px rgba(136,80,200,.12)" href="career.html" data-n="career goals schedule advancement sit supervisor ukg shifts">
      <span class="ti">🎯</span>
      <span class="tn">Career</span>
      <span class="td">Goals · Schedule · Advancement</span>
    </a>
  </div>
</div>

<script>
const hs=document.getElementById('hs'),sh=document.getElementById('sh');
const tiles=document.querySelectorAll('.tile,.fg');
hs.addEventListener('input',()=>{
  const q=hs.value.trim().toLowerCase();
  let any=false;
  tiles.forEach(t=>{const n=(t.dataset.n||'').toLowerCase();const show=!q||n.includes(q);t.classList.toggle('hd',!show);if(show&&t.classList.contains('tile'))any=true;});
  sh.style.display=(q&&!any)?'block':'none';
});
window.addEventListener('beforeinstallprompt',e=>e.preventDefault());
</script>
</body>
</html>
